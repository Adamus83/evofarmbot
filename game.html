<html lang="id">

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
    html,body{width:100%;height:100vh;height:100dvh;overflow:hidden;background:#1a3c2e;display:flex;justify-content:center;align-items:center}
    .game-container{width:100%;height:100vh;height:100dvh;max-width:100%;background:rgba(255,248,235,0.96);display:flex;flex-direction:column;overflow:hidden;border:2px solid #c9a45b}
    .header{display:flex;justify-content:space-between;align-items:center;background:#2d5e3b;padding:8px 12px;color:#f7e3b2;font-weight:bold;font-size:0.75rem;flex-shrink:0;border-bottom:2px solid #e7b42c}
    .badge{padding:4px 8px;border-radius:18px;font-size:0.65rem;display:flex;align-items:center;gap:2px}
    .profit-badge{background:#f3c13a;color:#2d3e1f}
    .saldo-badge{background:#7ec8e3;color:#0a2f3c}
    .energy-badge{background:#ff8a8a;color:#3c0a0a}
    .nav-tabs{display:flex;gap:3px;background:#2d5e3b;padding:4px;overflow-x:auto;flex-shrink:0}
    .nav-tab{flex:1;padding:7px 4px;text-align:center;font-weight:700;font-size:0.6rem;cursor:pointer;background:transparent;color:#f7e3b2;border:none;border-radius:22px;white-space:nowrap}
    .nav-tab.active{background:#f3c13a;color:#2d3e1f}
    .content-area{flex:1;overflow-y:auto;padding:8px}
    .farm-area{background:#b6d7a8;border-radius:20px;padding:8px;background-image:radial-gradient(circle at 30% 40%,#d4e8b0,#7fa35b);box-shadow:inset 0 -3px 0 rgba(0,0,0,0.2);border:2px solid #5a7940;min-height:100px;display:flex;flex-wrap:wrap;align-items:center;justify-content:center;gap:5px}
    .creature-card{background:#fef9e7;border-radius:14px;padding:5px 3px;width:62px;display:flex;flex-direction:column;align-items:center;box-shadow:0 4px 0 #8b6f4c;border:2px solid #dbb45c;cursor:pointer;font-size:0.45rem;flex-shrink:0}
    .creature-card.selected{border:2px solid #ffd966;box-shadow:0 0 12px gold}
    .creature-emoji{font-size:1.6rem}
    .creature-name{font-weight:700;font-size:0.42rem;background:#e6c468;padding:1px 5px;border-radius:8px;color:#2d3a1f}
    .stars-row{display:flex;gap:1px;margin-top:1px}
    .star{font-size:0.4rem}
    .star.filled{color:#f3c13a}
    .star.empty{color:#ccc}
    .btn{background:#f7eac8;border:none;padding:6px 8px;border-radius:20px;font-weight:700;font-size:0.55rem;color:#2c4720;box-shadow:0 2px 0 #b4944c;border:1px solid #e7b42c;cursor:pointer;flex:1;min-width:45px;text-align:center}
    .btn-gold{background:#f7b05e}
    .btn-purple{background:#c68ef0}
    .btn-blue{background:#7ec8e3}
    .btn-red{background:#ff8a8a}
    .btn-green{background:#a8e6cf}
    .controls{display:flex;gap:4px;flex-wrap:wrap;justify-content:center;margin-top:6px}
    .hidden{display:none!important}
    .log{background:#2b4127;padding:5px 10px;color:#f3e3b0;font-size:0.55rem;text-align:center;border:1px solid #b4944c;flex-shrink:0}
    .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);display:flex;align-items:center;justify-content:center;z-index:1000}
    .modal{background:#fef9e7;border-radius:18px;padding:14px;max-width:350px;width:100%;text-align:center;border:3px solid #c9a45b;max-height:80vh;overflow-y:auto}
    .modal h3{color:#2d3e1f;margin-bottom:6px;font-size:0.9rem}
    .modal input,.modal select{width:100%;padding:8px;border-radius:12px;border:2px solid #c9a45b;font-size:0.7rem;text-align:center;margin:4px 0;background:#fffaed}
    .code-display{background:#2d3e1f;color:#f7e3b2;font-size:1.2rem;letter-spacing:3px;padding:8px;border-radius:12px;margin:6px 0;font-weight:900;font-family:monospace}
    .battle-card{background:#fff3cd;border-radius:12px;padding:6px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;border:1px solid #c9a45b;font-size:0.6rem}
    .shop-card{display:inline-block;background:#fef9e7;border-radius:14px;padding:5px;margin:3px;text-align:center;border:2px solid #dbb45c;cursor:pointer;width:65px;font-size:0.45rem}
    .toast{position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#2d3e1f;color:#f7e3b2;padding:8px 16px;border-radius:20px;font-weight:bold;z-index:2000;font-size:0.7rem}
    .admin-btn{position:fixed;bottom:15px;right:15px;z-index:999;width:45px;height:45px;border-radius:50%;background:#c94b4b;color:white;border:2px solid #fff;font-size:1.2rem;cursor:pointer;box-shadow:0 4px 10px rgba(0,0,0,0.5)}
  </style>
</head>
<body>
<div class="game-container">
  <div class="header">
    <span>🌿 EVO FARM</span>
    <div style="display:flex;gap:3px;flex-wrap:wrap;">
      <span class="badge profit-badge">💰<span id="profitDisplay">0</span></span>
      <span class="badge saldo-badge">💎<span id="saldoDisplay">0</span></span>

    </div>
  </div>
  <div class="nav-tabs">
    <button class="nav-tab active" data-tab="farm">🌾Farm</button>

  </div>
  <div class="content-area" id="contentArea">
    <div id="tabFarm"><div class="farm-area" id="farmContainer"></div><div class="controls"><button class="btn btn-gold" id="breedButton">🐣Breed</button><button class="btn btn-purple" id="evolveButton">✨Evolve</button><button class="btn" id="sellButton">💵Sell</button></div><div class="controls"><button class="btn btn-blue" id="topupButton">🛒Beli 💎</button><button class="btn btn-green" id="claimButton">🎁Klaim</button><button class="btn btn-red" id="fillStarsBtn">⭐Isi ⭐</button></div></div>
    <div id="tabFeed" class="hidden"><h3 style="text-align:center;color:#2d3e1f;">🍖 Feeding</h3><select id="feedTargetSelect" style="width:100%;padding:6px;border-radius:10px;margin:4px 0;font-size:0.6rem;"><option value="">Pilih makhluk...</option></select><div style="display:flex;gap:4px;"><button class="btn" onclick="feedCreature('basic')">🍞💰5</button><button class="btn btn-gold" onclick="feedCreature('meat')">🥩💰15</button><button class="btn btn-blue" onclick="feedCreature('premium')">🍰💎1</button></div></div>
    <div id="tabBattle" class="hidden"><h3 style="text-align:center;color:#2d3e1f;">⚔️ Battle</h3><select id="battleCreatureSelect" style="width:100%;padding:6px;border-radius:10px;margin:4px 0;font-size:0.6rem;"><option value="">Pilih makhluk...</option></select><div id="opponentList"></div></div>
    <div id="tabShop" class="hidden"><h3 style="text-align:center;color:#2d3e1f;">🛍️ Beli Makhluk</h3><div id="botShopList" style="display:flex;flex-wrap:wrap;justify-content:center;gap:4px;"></div></div>
    <div id="tabMarket" class="hidden"><h3 style="text-align:center;color:#2d3e1f;">🏪 Pasar</h3><div class="controls"><button class="btn btn-gold" id="sellMarketBtn">📤Jual</button><button class="btn btn-blue" id="refreshMarketBtn">🔄Refresh</button></div><div id="marketListings"></div></div>
    <div id="tabEvent" class="hidden"><h3 style="text-align:center;color:#2d3e1f;">🎪 Event</h3><button class="btn btn-gold" id="enterGiveawayBtn">🎟️Giveaway</button><div id="limitedShop"></div><div class="code-display" id="refLink" style="font-size:0.6rem;">-</div><button class="btn btn-green" id="copyRefBtn">📋Copy Link</button></div>
  </div>
  <div class="log" id="logMessage">🌱 Selamat datang!</div>
</div>

<div class="modal-overlay hidden" id="buyModal"><div class="modal"><h3>🛒 Beli Koin</h3><p>Rp10.000 = 100💎</p><div class="code-display" id="generatedCode">----</div><p style="font-size:0.5rem;">BCA 1234567890 a.n. <b>NAMA ANDA</b></p><p style="font-size:0.5rem;">WA: <b>08xxxxxxxxxx</b></p><button class="btn btn-blue" id="copyCodeBtn">📋Copy</button><button class="btn" id="closeBuyModal">❌Tutup</button></div></div>
<div class="modal-overlay hidden" id="claimModal"><div class="modal"><h3>🎁 Klaim</h3><input type="text" id="claimCodeInput" placeholder="EVO-XXXXXX"><button class="btn btn-green" id="submitClaimBtn">✅Klaim 100💎</button><button class="btn" id="closeClaimModal">❌Tutup</button><p id="claimStatus"></p></div></div>
<div class="modal-overlay hidden" id="battleResultModal"><div class="modal" id="battleResultContent"></div></div>
<div class="modal-overlay hidden" id="adminLoginModal"><div class="modal"><h3>🔐 Admin</h3><input type="password" id="adminPassword" placeholder="Password"><button class="btn btn-gold" id="adminLoginBtn">🔓Masuk</button><button class="btn" id="closeAdminLogin">❌Tutup</button><p id="adminLoginStatus"></p></div></div>
<div class="modal-overlay hidden" id="adminPanelModal"><div class="modal"><h3>🔑 Panel Admin</h3><div id="pendingPayments" style="max-height:150px;overflow-y:auto;font-size:0.6rem;text-align:left;"></div><input type="text" id="adminCodeInput" placeholder="Kode manual"><button class="btn btn-green" id="adminActivateBtn">✅Aktifkan</button><button class="btn" id="closeAdminPanel">❌Tutup</button></div></div>
<button class="admin-btn hidden" id="adminPanelBtn">🔑</button>

<script>
var tg=window.Telegram.WebApp;tg.expand();tg.ready();
var userId=tg.initDataUnsafe?.user?.id?'tg_'+tg.initDataUnsafe.user.id:(localStorage.getItem('evo_user_id')||'user_'+Math.random().toString(36).substr(2,9));
localStorage.setItem('evo_user_id',userId);
var tgUsername=tg.initDataUnsafe?.user?.username||tg.initDataUnsafe?.user?.first_name||'Player';

var firebaseConfig={apiKey:"AIZaSyC2Gb6WtY1bn05fI_3K9x3",authDomain:"evo-farm-game.firebaseapp.com",databaseURL:"https://evo-farm-game-default-rtdb.asia-southeast1.firebasedatabase.app",projectId:"evo-farm-game",storageBucket:"evo-farm-game.appspot.com",messagingSenderId:"870289339504",appId:"1:870289339504:web:154c283a0e8b5d4c28a3e"};
firebase.initializeApp(firebaseConfig);var db=firebase.database();

var ORDOS={herbisida:{name:"🌿Herbisida",emoji:"🌿",color:"#4caf50",strong:"akuatik",weak:"magma,aerial"},aerial:{name:"🦅Aerial",emoji:"🦅",color:"#87ceeb",strong:"herbisida",weak:"akuatik,mystic"},akuatik:{name:"💧Akuatik",emoji:"💧",color:"#2196f3",strong:"magma",weak:"herbisida,aerial"},magma:{name:"🔥Magma",emoji:"🔥",color:"#f44336",strong:"herbisida,aerial",weak:"akuatik,mystic"},mystic:{name:"🔮Mystic",emoji:"🔮",color:"#9c27b0",strong:"aerial,magma",weak:"mystic"}};

function genCreatures(){var a=[],id=0;var sd=[{s:1,hp:30,atk:6,def:2,spd:3,v:5,n:"Sprout"},{s:2,hp:50,atk:12,def:5,spd:5,v:15,n:"Bloom"},{s:3,hp:75,atk:22,def:10,spd:6,v:40,n:"Giant"},{s:4,hp:110,atk:38,def:16,spd:8,v:100,n:"Lord"}];var ok=Object.keys(ORDOS);var on={herbisida:["Weed","Thorn","Vine","Briar","Mandrake"],aerial:["Gust","Storm","Cloud","Zephyr","Typhoon"],akuatik:["Drop","Coral","Tide","Reef","Abyss"],magma:["Ember","Lava","Flare","Cinder","Inferno"],mystic:["Wisp","Rune","Shade","Echo","Void"]};sd.forEach(function(s){ok.forEach(function(o){on[o].forEach(function(n,i){var v=i/4;a.push({id:id++,name:n+" "+s.n,emoji:ORDOS[o].emoji,stage:s.s,ordo:o,ordoName:ORDOS[o].name,ordoColor:ORDOS[o].color,strong:ORDOS[o].strong,weak:ORDOS[o].weak,hp:Math.floor(s.hp*(1+v*0.5)),atk:Math.floor(s.atk*(1+v*0.6)),def:Math.floor(s.def*(1+v*0.4)),spd:Math.floor(s.spd*(1+v*0.5)),value:Math.floor(s.v*(1+v*0.8)),skill:getSkill(o,s.s),limited:false})})})});a.push({id:id++,name:"Unicorn",emoji:"🦄",stage:3,ordo:"mystic",ordoName:ORDOS.mystic.name,ordoColor:ORDOS.mystic.color,strong:"aerial,magma",weak:"mystic",hp:80,atk:28,def:12,spd:16,value:80,skill:"RainbowHeal",limited:true});a.push({id:id++,name:"PhoenixLtd",emoji:"🔥",stage:4,ordo:"magma",ordoName:ORDOS.magma.name,ordoColor:ORDOS.magma.color,strong:"herbisida,aerial",weak:"akuatik,mystic",hp:120,atk:50,def:14,spd:20,value:200,skill:"Rebirth",limited:true});return a}
function getSkill(o,s){var sk={herbisida:{1:"PoisonI",2:"PoisonII",3:"PoisonIII",4:"PoisonIV"},aerial:{1:"PierceI",2:"PierceII",3:"CritUp",4:"ChainHit"},akuatik:{1:"RegenI",2:"RegenII",3:"Shield",4:"RegenIV"},magma:{1:"BurnI",2:"BurnII",3:"Fury",4:"Meteor"},mystic:{1:"Steal",2:"Copy",3:"Buff",4:"Void"}};return sk[o]?sk[o][s]||"?":"?"}
var creatures=genCreatures();

var farm=[],profit=20,saldo=0,energy=15,selected=[],isAdmin=false,ADMIN_PASS="evofarm2024";

function updateUI(){renderFarm();document.getElementById('profitDisplay').textContent=profit;document.getElementById('saldoDisplay').textContent=saldo;document.getElementById('energyDisplay').textContent=energy;saveData()}
function getStats(c){var s=c.stars||0,sm=1+s*0.12,h=c.hunger||100,hm=h>=90?1.15:h>=60?1:0.75;return{hp:Math.floor(c.hp*sm*hm),atk:Math.floor(c.atk*sm*hm),def:Math.floor(c.def*sm*hm),spd:Math.floor(c.spd*sm*hm)}}
function renderFarm(){var co=document.getElementById('farmContainer');if(!farm.length){co.innerHTML='<div style="color:#3b5526;">🌾 Kosong</div>';return}co.innerHTML=farm.map(function(c,i){var sel=selected.indexOf(i)>=0?'selected':'',st=c.stars||0,h=c.hunger||100,hc=h>=90?'#4caf50':h>=50?'#ff9800':'#f44336',sh='';for(var s=0;s<5;s++)sh+='<span class="star '+(s<st?'filled':'empty')+'">'+(s<st?'⭐':'☆')+'</span>';return'<div class="creature-card '+sel+'" data-index="'+i+'" style="border-left:3px solid '+(c.ordoColor||'#ccc')+'">'+(c.limited?'<span style="position:absolute;top:-5px;right:-5px;background:red;color:white;font-size:0.35rem;padding:1px 3px;border-radius:5px;">LTD</span>':'')+'<span class="creature-emoji">'+c.emoji+'</span><span class="creature-name">'+c.name+'</span><div class="stars-row">'+sh+'</div></div>'}).join('');document.querySelectorAll('.creature-card').forEach(function(card){card.addEventListener('click',function(){var i=parseInt(this.dataset.index),p=selected.indexOf(i);if(p>=0)selected.splice(p,1);else if(selected.length<2)selected.push(i);else showToast('⚠️Max 2!');updateUI()})})}
function showToast(m){var t=document.createElement('div');t.style.cssText='position:fixed;top:10px;left:50%;transform:translateX(-50%);background:#2d3e1f;color:#f7e3b2;padding:8px 16px;border-radius:20px;font-weight:bold;z-index:2000;font-size:0.7rem;';t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},1800)}
function setLog(m){document.getElementById('logMessage').textContent=m}
function saveData(){db.ref('users/'+userId).set({farm,profit,saldo,energy,username:tgUsername,lastActive:Date.now()})}
function loadData(){db.ref('users/'+userId).once('value').then(function(snap){if(snap.exists()){var d=snap.val();farm=d.farm||[];profit=d.profit||20;saldo=d.saldo||0;energy=d.energy||15}else{farm=[{...creatures[0],stars:0,hunger:100},{...creatures[5],stars:0,hunger:90},{...creatures[10],stars:0,hunger:80}]}updateUI()})}

function breedCreatures(){if(selected.length!==2){showToast('Pilih 2!');return}if(energy<2){showToast('⚡Kurang');return}var sorted=[...selected].sort(function(a,b){return b-a}),p1=farm[sorted[0]],p2=farm[sorted[1]];if(p1.stage>=4||p2.stage>=4){showToast('Stage4 gabisa');return}if((p1.hunger||100)<30||(p2.hunger||100)<30){showToast('Lapar');return}for(var i=0;i<sorted.length;i++)farm.splice(sorted[i],1);var ns=Math.floor((p1.stage+p2.stage)/2)+1;if(ns>4)ns=4;var po=Math.random()<0.5?p1.ordo:p2.ordo;var cand=creatures.filter(function(c){return c.ordo===po&&c.stage===ns&&!c.limited});if(!cand.length)cand=creatures.filter(function(c){return c.stage===ns&&!c.limited});var baby=cand[Math.floor(Math.random()*cand.length)]||creatures[0];farm.push({...baby,stars:0,hunger:70});energy-=2;selected=[];updateUI();showToast('🐣'+baby.emoji)}
function evolveCreature(){if(selected.length!==1){showToast('Pilih 1!');return}var idx=selected[0],cr=farm[idx];if(cr.stage>=4){showToast('Max!');return}if((cr.stars||0)<5){showToast('⭐'+(cr.stars||0)+'/5');return}if(profit<10){showToast('💰Kurang');return}var next=creatures.filter(function(c){return c.ordo===cr.ordo&&c.stage===cr.stage+1&&!c.limited});if(!next.length)next=creatures.filter(function(c){return c.stage===cr.stage+1&&!c.limited});if(!next.length){showToast('Gabisa');return}profit-=10;var ev=next[Math.floor(Math.random()*next.length)];farm[idx]={...ev,stars:0,hunger:100};selected=[];updateUI();showToast('✨'+ev.emoji)}
function sellCreatures(){if(!selected.length){showToast('Pilih!');return}var sorted=[...selected].sort(function(a,b){return b-a}),tot=0;for(var i=0;i<sorted.length;i++){tot+=farm[sorted[i]].value;farm.splice(sorted[i],1)}profit+=tot;selected=[];updateUI();showToast('💵+'+tot)}
function feedCreature(type){var idx=parseInt(document.getElementById('feedTargetSelect').value);if(isNaN(idx)||!farm[idx]){showToast('Pilih!');return}if(energy<1){showToast('⚡Habis');return}var cost,hg,sc;if(type==='basic'){cost=5;hg=35;sc=0.25;if(profit<cost){showToast('💰Kurang');return}profit-=cost}else if(type==='meat'){cost=15;hg=65;sc=0.45;if(profit<cost){showToast('💰Kurang');return}profit-=cost}else{cost=1;hg=100;sc=0.7;if(saldo<cost){showToast('💎Kurang');return}saldo-=cost}farm[idx].hunger=Math.min(100,(farm[idx].hunger||50)+hg);if(Math.random()<sc&&(farm[idx].stars||0)<5){farm[idx].stars=(farm[idx].stars||0)+1;showToast('⭐+'+(farm[idx].stars)+'/5')}energy--;updateUI();updateAllTabs()}

function loadBotShop(){var sc=[{...creatures[0],price:10},{...creatures[5],price:15},{...creatures[25],price:50},{...creatures[50],price:80},{...creatures[75],price:120},{...creatures[100],price:200,limited:true},{...creatures[101],price:300,limited:true}];document.getElementById('botShopList').innerHTML=sc.map(function(c){return'<div class="shop-card" onclick="buyFromBot('+c.id+','+c.price+')"><span class="creature-emoji">'+c.emoji+'</span><br><span class="creature-name">'+c.name+'</span><br><span style="font-size:0.4rem;">💎'+c.price+'</span></div>'}).join('')}
function buyFromBot(cid,price){if(saldo<price){showToast('💎Kurang');return}var c=creatures.find(function(x){return x.id===cid});if(!c)return;saldo-=price;farm.push({...c,stars:5,hunger:100});updateUI();showToast('🛍️'+c.emoji)}

function loadOpponents(){db.ref('users').once('value').then(function(snap){var users=snap.val()||{},html='';Object.entries(users).forEach(function(e){var uid=e[0],ud=e[1];if(uid===userId)return;if(!ud.farm||!ud.farm.length)return;ud.farm.forEach(function(c,i){var st=getStats(c);html+='<div class="battle-card"><div>'+c.emoji+' <b>'+c.name+'</b><br><small>S'+c.stage+' ⭐'+(c.stars||0)+' | ❤️'+st.hp+'</small></div><button class="btn btn-red" onclick="startBattle(\''+uid+'\','+i+')" style="font-size:0.45rem;padding:3px 6px;">⚔️</button></div>'})});document.getElementById('opponentList').innerHTML=html||'<p>Tidak ada lawan</p>'})}

function loadMarket(){db.ref('market').orderByChild('timestamp').limitToLast(20).once('value').then(function(snap){var l=snap.val()||{};document.getElementById('marketListings').innerHTML=Object.entries(l).map(function(e){var k=e[0],v=e[1];return'<div class="battle-card"><div>'+v.emoji+' <b>'+v.name+'</b> S'+v.stage+'</div><div>💎'+v.price+' '+(v.sold?'✅':'<button class="btn btn-blue" onclick="buyMarket(\''+k+'\','+v.price+')">Beli</button>')+'</div></div>'}).join('')||'<p>Kosong</p>'})}
function buyMarket(key,price){if(saldo<price)return;db.ref('market/'+key).once('value').then(function(snap){var l=snap.val();if(!l||l.sold||l.sellerId===userId)return;var fee=Math.floor(price*0.1);saldo-=price;farm.push({name:l.name,emoji:l.emoji,stage:l.stage,ordo:l.ordo,ordoName:l.ordoName,ordoColor:l.ordoColor,hp:l.hp,atk:l.atk,def:l.def,spd:l.spd,value:l.value,skill:l.skill,limited:l.limited,stars:l.stars||0,hunger:80});db.ref(
