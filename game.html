<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Evolution Farm</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
    body{background:#1a3c2e;display:flex;justify-content:center;align-items:center;height:100vh;padding:10px}
    .container{width:100%;max-width:400px;background:#fef9e7;border-radius:28px;padding:16px;border:3px solid #c9a45b;text-align:center}
    h2{color:#2d3e1f;margin-bottom:10px}
    .farm{background:#b6d7a8;border-radius:20px;padding:12px;min-height:120px;display:flex;flex-wrap:wrap;justify-content:center;align-items:center;gap:8px;margin:10px 0;border:2px solid #5a7940}
    .card{background:white;border-radius:14px;padding:8px;width:70px;text-align:center;border:2px solid #dbb45c;cursor:pointer;box-shadow:0 3px 0 #8b6f4c;font-size:0.65rem}
    .card:active{transform:translateY(2px);box-shadow:0 1px 0 #8b6f4c}
    .card.selected{border-color:gold;box-shadow:0 0 10px gold}
    .emoji{font-size:2rem}
    .btn{background:#f7eac8;border:none;padding:10px;border-radius:20px;font-weight:bold;font-size:0.7rem;margin:4px;cursor:pointer;box-shadow:0 2px 0 #b4944c;border:1px solid #e7b42c;min-width:60px}
    .btn:active{transform:translateY(1px);box-shadow:0 1px 0 #b4944c}
    .btn-gold{background:#f7b05e}
    .btn-purple{background:#c68ef0}
    .log{background:#2d3e1f;color:#f7e3b2;padding:6px;border-radius:12px;font-size:0.6rem;margin-top:8px}
    .info{display:flex;justify-content:space-around;margin:6px 0;font-weight:bold;font-size:0.65rem}
  </style>
</head>
<body>
<div class="container">
  <h2>🌿 EVOLUTION FARM</h2>
  <div class="info">
    <span>💰 Profit: <span id="profit">20</span></span>
    <span>💎 Saldo: <span id="saldo">0</span></span>
    <span>⚡ Energi: <span id="energi">15</span></span>
  </div>
  
  <div class="farm" id="farmArea"></div>
  
  <p style="font-size:0.5rem;color:#5a7940;">Klik makhluk untuk pilih (max 2)</p>
  
  <div>
    <button class="btn btn-gold" onclick="breed()">🐣 Breed</button>
    <button class="btn btn-purple" onclick="evolve()">✨ Evolve</button>
    <button class="btn" onclick="sell()">💵 Sell</button>
  </div>
  <div>
    <button class="btn" onclick="addRandom()">➕ Tambah</button>
    <button class="btn" onclick="reset()">🔄 Reset</button>
  </div>
  
  <div class="log" id="log">🌱 Klik Breed untuk mulai!</div>
</div>

<script>
var makhluk = [
  {nama:"Sprout", emoji:"🌱", stage:1, value:5},
  {nama:"Bloom", emoji:"🌸", stage:2, value:15},
  {nama:"Treant", emoji:"🌳", stage:3, value:40},
  {nama:"Dragon", emoji:"🐉", stage:4, value:120}
];

var farm = [
  {nama:"Sprout", emoji:"🌱", stage:1, value:5},
  {nama:"Sprout", emoji:"🌱", stage:1, value:5},
  {nama:"Bloom", emoji:"🌸", stage:2, value:15}
];

var profit = 20;
var saldo = 0;
var energi = 15;
var selected = [];

function render() {
  var html = '';
  for(var i=0; i<farm.length; i++) {
    var c = farm[i];
    var sel = selected.indexOf(i) >= 0 ? 'selected' : '';
    html += '<div class="card '+sel+'" onclick="klik('+i+')">';
    html += '<div class="emoji">'+c.emoji+'</div>';
    html += '<b>'+c.nama+'</b><br>';
    html += 'S'+c.stage+' | 💰'+c.value;
    html += '</div>';
  }
  document.getElementById('farmArea').innerHTML = html || '<span style="color:#555;">Ladang kosong</span>';
  document.getElementById('profit').textContent = profit;
  document.getElementById('saldo').textContent = saldo;
  document.getElementById('energi').textContent = energi;
}

function klik(i) {
  var pos = selected.indexOf(i);
  if(pos >= 0) { selected.splice(pos, 1); }
  else if(selected.length < 2) { selected.push(i); }
  render();
  log('Dipilih: ' + selected.length + '/2');
}

function breed() {
  if(selected.length !== 2) { log('⚠️ Pilih 2 makhluk!'); return; }
  if(energi < 2) { log('⚡ Energi kurang!'); return; }
  
  var sorted = selected.slice().sort(function(a,b){return b-a});
  var p1 = farm[sorted[0]], p2 = farm[sorted[1]];
  
  farm.splice(sorted[0], 1);
  farm.splice(sorted[1], 1);
  
  var ns = Math.floor((p1.stage + p2.stage) / 2) + 1;
  if(ns > 4) ns = 4;
  
  var candidates = makhluk.filter(function(c){return c.stage === ns});
  var baby = candidates[Math.floor(Math.random()*candidates.length)] || makhluk[0];
  
  farm.push({nama:baby.nama, emoji:baby.emoji, stage:baby.stage, value:baby.value});
  energi -= 2;
  selected = [];
  render();
  log('🐣 Dapat: ' + baby.emoji + ' ' + baby.nama + '!');
}

function evolve() {
  if(selected.length !== 1) { log('⚠️ Pilih 1 makhluk!'); return; }
  var idx = selected[0], cr = farm[idx];
  if(cr.stage >= 4) { log('🔮 Sudah maksimal!'); return; }
  if(profit < 10) { log('💰 Profit kurang!'); return; }
  
  profit -= 10;
  var next = makhluk.filter(function(c){return c.stage === cr.stage + 1});
  var ev = next[Math.floor(Math.random()*next.length)] || makhluk[cr.stage];
  
  farm[idx] = {nama:ev.nama, emoji:ev.emoji, stage:ev.stage, value:ev.value};
  selected = [];
  render();
  log('✨ Evolusi: ' + ev.emoji + ' ' + ev.nama + '!');
}

function sell() {
  if(selected.length === 0) { log('⚠️ Pilih makhluk!'); return; }
  var sorted = selected.slice().sort(function(a,b){return b-a});
  var total = 0;
  for(var i=sorted.length-1; i>=0; i--) {
    total += farm[sorted[i]].value;
    farm.splice(sorted[i], 1);
  }
  profit += total;
  selected = [];
  render();
  log('💵 Terjual! +'+total+' profit');
}

function addRandom() {
  var r = makhluk[Math.floor(Math.random()*makhluk.length)];
  farm.push({nama:r.nama, emoji:r.emoji, stage:r.stage, value:r.value});
  render();
  log('➕ Dapat: ' + r.emoji + ' ' + r.nama);
}

function reset() {
  farm = [
    {nama:"Sprout", emoji:"🌱", stage:1, value:5},
    {nama:"Sprout", emoji:"🌱", stage:1, value:5},
    {nama:"Bloom", emoji:"🌸", stage:2, value:15}
  ];
  profit = 20; saldo = 0; energi = 15; selected = [];
  render();
  log('🔄 Game di-reset!');
}

function log(msg) {
  document.getElementById('log').textContent = msg;
}

render();
</script>
</body>
</html>
