<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Evo Cards v7.6</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,sans-serif}
body{background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:440px;background:#1e293b;min-height:100vh;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#0f172a;border-bottom:2px solid #334155;cursor:pointer}
.logo{font-weight:900;font-size:16px}
.stats{display:flex;gap:4px;flex-wrap:wrap}
.badge{background:#334155;padding:4px 7px;border-radius:10px;font-size:10px;font-weight:700;display:flex;align-items:center;gap:2px}
.tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155;overflow-x:auto}
.tab{flex:1;padding:8px 4px;text-align:center;font-weight:700;font-size:10px;cursor:pointer;color:#94a3b8;border-bottom:3px solid transparent;white-space:nowrap;min-width:45px}
.tab.active{color:#facc15;border-color:#facc15}
.content{flex:1;overflow-y:auto;padding:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:linear-gradient(160deg,#1e293b,#0f172a);border:2px solid #475569;border-radius:12px;padding:6px;text-align:center;position:relative;cursor:pointer;transition:0.15s}
.card:active{transform:scale(0.93)}
.card.selected{border-color:#facc15!important;box-shadow:0 0 12px rgba(250,204,21,0.5)}
.rarity-common{border-color:#64748b}.rarity-rare{border-color:#60a5fa}.rarity-epic{border-color:#a78bfa}.rarity-legendary{border-color:#facc15}
.emoji{font-size:28px}.name{font-size:9px;font-weight:800;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-row{font-size:8px;color:#94a3b8}.lvl{position:absolute;top:3px;left:3px;background:#0f172a;padding:1px 4px;border-radius:5px;font-size:8px}
.stars{display:flex;gap:1px;justify-content:center;margin-top:2px}
.stars span{font-size:7px}.stars .on{color:#facc15}.stars .off{color:#475569}
.hunger-bar{width:100%;height:3px;background:#334155;border-radius:2px;margin-top:3px}
.hunger-fill{height:100%;border-radius:2px;transition:0.3s}
.btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;background:#334155;color:#e2e8f0;margin:3px 0}
.btn-primary{background:#facc15;color:#0f172a}.btn-green{background:#22c55e;color:#0f172a}.btn-red{background:#ef4444;color:white}.btn-blue{background:#3b82f6;color:white}.btn-gold{background:#f59e0b;color:white}.btn-purple{background:#8b5cf6;color:white}
.log{text-align:center;padding:5px;font-size:9px;color:#94a3b8;background:#0f172a;min-height:24px}
input,select{width:100%;padding:10px;margin:4px 0;border-radius:8px;border:none;background:#0f172a;color:#e2e8f0;font-size:13px}
.codebox{background:#0f172a;padding:8px;border-radius:8px;font-family:monospace;word-break:break-all;margin:5px 0;text-align:center;font-size:14px}
.hidden{display:none!important}
.feed-opt{display:flex;gap:4px;margin:5px 0}
.feed-opt button{flex:1;padding:8px 4px;font-size:9px}
.battle-card{background:#1e293b;border:1px solid #475569;border-radius:10px;padding:6px;margin:3px 0;display:flex;justify-content:space-between;align-items:center;font-size:10px}
.pack-title{color:#facc15;font-weight:bold;margin:6px 0 3px;text-align:center;font-size:11px}
.feeding-info{background:#1e3a2e;border:1px solid #22c55e;border-radius:8px;padding:8px;margin:6px 0;font-size:9px;text-align:center}
</style>
</head><body>

<div class="app" id="gameApp">
  <div class="top" onclick="tapLogo()"><div class="logo">⚡ EVO CARDS v7.6</div>
    <div class="stats"><div class="badge">💰<span id="pf">80</span></div><div class="badge">💎<span id="dm">30</span></div><div class="badge">⚡<span id="en">12</span>/<span id="me">20</span></div></div>
  </div>
  <div class="tabs" id="tabBar">
    <div class="tab active" data-tab="cards">🃏Kartu</div><div class="tab" data-tab="feed">🍖Feed</div><div class="tab" data-tab="breed">🧬Breed</div><div class="tab" data-tab="battle">⚔️Battle</div><div class="tab" data-tab="market">🏪Pasar</div><div class="tab" data-tab="shop">🛒Shop</div>
  </div>
  <div class="content" id="ct"></div>
  <div class="log" id="lg">✅ v7.6 Ready - 50 Pets</div>
</div>

<div class="app hidden" id="adminApp">
  <div class="top"><div class="logo">🔐 ADMIN</div><div class="badge" onclick="closeAdmin()" style="cursor:pointer">❌</div></div>
  <div class="content">
    <div id="adminLogin"><h3>🔑 Login</h3><input id="adminPass" type="password" placeholder="Kode"><button class="btn btn-primary" onclick="adminLogin()">Masuk</button></div>
    <div id="adminPanel" class="hidden"><h3>🎟️ Generate</h3><input id="genDia" type="number" value="120"><input id="genNote" placeholder="Nama"><button class="btn btn-primary" onclick="genCode()">Generate</button><div id="genOut"></div><h4>📜 Riwayat</h4><div id="histList" style="font-size:9px"></div><h4>💰 Fee</h4><div id="feeDisplay" style="font-size:12px;color:#facc15">0 💎</div><h4>💸 WD</h4><div id="wdList" style="font-size:9px"></div></div>
  </div>
</div>

<script src="app.js"></script>
</body></html>
