<script>
// ===== CONFIG =====
const ADMIN_CODE = '727277';
const SECRET = 'evo2026'+ADMIN_CODE;
const GOPAY = '088989727277';
const WA = '6288989727277';

// ===== FIREBASE INIT =====
const firebaseConfig = {
  apiKey: "AIZaSyC2Gb6WtY1bn05fI_3K9x3",
  authDomain: "evo-farm-game.firebaseapp.com",
  databaseURL: "https://evo-farm-game-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "evo-farm-game",
  storageBucket: "evo-farm-game.appspot.com",
  messagingSenderId: "870289339504",
  appId: "1:870289339504:web:154c283a0e8b5d4c28a3e"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ===== TELEGRAM INIT =====
const tg = window.Telegram?.WebApp; if(tg) tg.expand();

// User ID dari Telegram
let uid = localStorage.getItem('evo_uid_v5');
if(!uid) { uid = 'user_' + Math.random().toString(36).substr(2,9); localStorage.setItem('evo_uid_v5', uid); }
try { if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) { uid = 'tg_' + tg.initDataUnsafe.user.id; } } catch(e) {}

// ===== ADMIN TAP =====
let tapCount=0;
function tapLogo(){ tapCount++; if(tapCount>=5){ document.getElementById('gameApp').classList.add('hidden'); document.getElementById('adminApp').classList.remove('hidden'); tapCount=0; } setTimeout(()=>tapCount=0,2000); }
function closeAdmin(){ document.getElementById('adminApp').classList.add('hidden'); document.getElementById('gameApp').classList.remove('hidden'); updateUI(); }

// ===== GAME DATA =====
const POOL = [
  {id:'sprout',name:'Sprout',emoji:'🌱',rarity:'common',atk:5,def:2,hp:30,stage:1},
  {id:'bloom',name:'Bloom',emoji:'🌸',rarity:'common',atk:12,def:5,hp:50,stage:2},
  {id:'cactus',name:'Cactus',emoji:'🌵',rarity:'common',atk:8,def:8,hp:40,stage:1},
  {id:'treant',name:'Treant',emoji:'🌳',rarity:'rare',atk:22,def:12,hp:80,stage:3},
  {id:'wolf',name:'Wolf',emoji:'🐺',rarity:'rare',atk:28,def:8,hp:70,stage:2},
  {id:'dragon',name:'Dragon',emoji:'🐉',rarity:'epic',atk:40,def:18,hp:120,stage:4},
  {id:'phoenix',name:'Phoenix',emoji:'🔥',rarity:'epic',atk:45,def:15,hp:110,stage:3},
  {id:'zeus',name:'Zeus',emoji:'⚡',rarity:'legendary',atk:65,def:20,hp:140,stage:4}
];

let state = {profit:80,diamonds:30,energy:12,cards:[],selected:[],marketListings:[]};

function newCard(t,lvl=1){ const m=1+(lvl-1)*0.08; return {...t,uid:Math.random().toString(36).slice(2,9),level:lvl,atk:Math.floor(t.atk*m),def:Math.floor(t.def*m),hp:Math.floor(t.hp*m),stars:0,hunger:80}; }

// ===== SAVE/LOAD CLOUD =====
function save(){ 
  // Backup lokal
  localStorage.setItem('evoV5', JSON.stringify(state));
  // Simpan ke Firebase
  try { db.ref('users/' + uid).set(state); showSaveDot(); } catch(e) {}
  updateUI(); 
}

function showSaveDot(){
  let dot = document.getElementById('saveDot');
  dot.style.opacity = '1';
  setTimeout(function(){ dot.style.opacity = '0'; }, 1500);
}

function loadData(){
  // Load dari Firebase dulu
  db.ref('users/' + uid).once('value').then(function(snap) {
    if(snap.exists()) {
      state = snap.val();
      if(!state.marketListings) state.marketListings = [];
      if(!state.selected) state.selected = [];
    } else {
      loadLocalFallback();
    }
    if(!state.cards || state.cards.length===0){ 
      state.cards=[newCard(POOL[0],2),newCard(POOL[0],2),newCard(POOL[1],1),newCard(POOL[2],1)]; 
    }
    save(); 
    updateUI();
    switchTab('cards',document.querySelector('.tab'));
  }).catch(function() {
    loadLocalFallback();
    if(!state.cards || state.cards.length===0){ 
      state.cards=[newCard(POOL[0],2),newCard(POOL[0],2),newCard(POOL[1],1),newCard(POOL[2],1)]; 
    }
    save(); 
    updateUI();
    switchTab('cards',document.querySelector('.tab'));
  });
}

function loadLocalFallback(){
  let local = JSON.parse(localStorage.getItem('evoV5')||'null');
  if(local) state = local;
}

function updateUI(){ 
  document.getElementById('profit').textContent=state.profit; 
  document.getElementById('diamonds').textContent=state.diamonds; 
  document.getElementById('energy').textContent=state.energy; 
}

function toast(m){ 
  document.getElementById('log').textContent=m; 
  setTimeout(function(){ document.getElementById('log').textContent='☁️ Cloud Save Active'; },2500);
}

// ===== TABS =====
function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(function(x){x.classList.remove('active')}); 
  el.classList.add('active');
  const c=document.getElementById('content');
  
  if(t==='cards'){
    c.innerHTML='<p style="font-size:11px;color:#94a3b8;margin-bottom:6px;">🖱️ Klik kartu untuk pilih (max 2)</p><div class="grid">'+state.cards.map(function(card,i){
      let sel = state.selected.indexOf(i)>=0 ? ' selected':'';
      let sh=''; for(let s=0;s<5;s++) sh+='<span class="'+(s<(card.stars||0)?'on':'off')+'">'+(s<(card.stars||0)?'⭐':'☆')+'</span>';
      return '<div class="card rarity-'+card.rarity+sel+'" onclick="tapCard('+i+')"><div class="lvl">Lv'+card.level+'</div><div class="emoji">'+card.emoji+'</div><div class="name">'+card.name+'</div><div class="stars">'+sh+'</div><div class="stats-row">⚔'+card.atk+' 🛡'+card.def+' 🍖'+(card.hunger||80)+'%</div></div>';
    }).join('')+'</div><button class="btn btn-green" onclick="evolveCard()">✨ Evolve (⭐5)</button><button class="btn btn-red" onclick="sellCard()">💵 Sell</button>';
  }
  
  if(t==='breed'){
    c.innerHTML='<p style="font-size:11px;color:#94a3b8;margin-bottom:6px;">Pilih 2 kartu di tab Kartu, lalu klik Breed</p><button class="btn btn-primary" onclick="breedCards()">🧬 Breed (⚡2)</button><p style="font-size:10px;color:#94a3b8;margin-top:6px;">Stage anak = rata-rata + 1</p>';
  }
  
  if(t==='feed'){
    c.innerHTML='<h4 style="margin-bottom:8px;">🍖 Feeding</h4><select id="feedTarget"><option value="">Pilih makhluk...</option>'+state.cards.map(function(c,i){return'<option value="'+i+'">'+c.emoji+' '+c.name+' Lv'+c.level+' 🍖'+(c.hunger||80)+'%</option>';}).join('')+'</select><div class="feed-opt"><button class="btn" onclick="doFeed(\'basic\')">🍞Roti 💰5</button><button class="btn btn-primary" onclick="doFeed(\'meat\')">🥩Daging 💰15</button><button class="btn btn-blue" onclick="doFeed(\'premium\')">🍰Premium 💎1</button></div>';
  }
  
  if(t==='battle'){
    c.innerHTML='<h4 style="margin-bottom:8px;">⚔️ Battle</h4><select id="battleCard"><option value="">Pilih kartumu...</option>'+state.cards.map(function(c,i){return'<option value="'+i+'">'+c.emoji+' '+c.name+' ⚔'+c.atk+'</option>';}).join('')+'</select><button class="btn btn-green" onclick="startBattle()">Battle (⚡3)</button><p style="font-size:10px;color:#94a3b8;margin-top:6px;">Menang: +15💰 +2💎 +2⭐</p>';
  }
  
  if(t==='market'){
    c.innerHTML='<h4 style="margin-bottom:8px;">🏪 Pasar</h4><button class="btn btn-primary" onclick="listToMarket()">📤 Jual ke Pasar</button><input id="marketPrice" type="number" value="10" placeholder="Harga 💎"><div id="marketList" style="margin-top:8px;">'+renderMarket()+'</div>';
  }
  
  if(t==='shop'){
    c.innerHTML='<button class="btn btn-primary" onclick="buyPack()">🎁 Buka Pack - 10💎</button><div id="packRes" style="text-align:center;margin:10px"></div><button class="btn btn-blue" onclick="buyDiamond()">💰 Beli 120💎 (Rp15.000)</button><button class="btn" onclick="redeem()">🎟️ Redeem Kode</button><p style="font-size:10px;color:#94a3b8;margin-top:6px;">Transfer GoPay '+GOPAY+' lalu minta kode ke admin</p>';
  }
}

// ===== CARD ACTIONS =====
function tapCard(i){
  let pos=state.selected.indexOf(i);
  if(pos>=0) state.selected.splice(pos,1); else if(state.selected.length<2) state.selected.push(i); else toast('⚠️ Maks 2!');
  switchTab('cards',document.querySelector('.tab.active'));
}
function breedCards(){
  if(state.selected.length!==2) return toast('⚠️ Pilih 2 kartu!');
  if(state.energy<2) return toast('⚡ Energi kurang!');
  let s=state.selected.slice().sort(function(a,b){return b-a}), p1=state.cards[s[0]], p2=state.cards[s[1]];
  state.cards.splice(s[0],1); state.cards.splice(s[1],1);
  let ns=Math.floor((p1.level+p2.level)/2)+1; if(ns>4)ns=4;
  let cand=POOL.filter(function(c){return c.stage===ns||c.level===ns}); if(!cand.length) cand=POOL;
  let baby=newCard(cand[Math.floor(Math.random()*cand.length)],ns);
  state.cards.push(baby); state.energy-=2; state.selected=[]; save();
  toast('🧬 '+baby.emoji+' '+baby.name+' Lv'+baby.level+'!');
}
function evolveCard(){
  if(state.selected.length!==1) return toast('⚠️ Pilih 1 kartu!');
  let i=state.selected[0], c=state.cards[i];
  if((c.stars||0)<5) return toast('⭐ Butuh 5 bintang! ('+(c.stars||0)+'/5)');
  if(state.profit<10) return toast('💰 Profit kurang!');
  state.profit-=10; c.level=Math.min(4,c.level+1); c.atk=Math.floor(c.atk*1.15); c.def=Math.floor(c.def*1.15); c.hp=Math.floor(c.hp*1.15); c.stars=0; c.hunger=100; state.selected=[]; save();
  toast('✨ '+c.emoji+' naik ke Lv'+c.level+'!');
}
function sellCard(){
  if(!state.selected.length) return toast('⚠️ Pilih kartu!');
  let s=state.selected.slice().sort(function(a,b){return b-a}), tot=0;
  s.forEach(function(i){ tot+=state.cards[i].atk+state.cards[i].def; state.cards.splice(i,1); });
  state.profit+=tot; state.selected=[]; save(); toast('💵 Terjual +💰'+tot);
}

// ===== FEEDING =====
function doFeed(type){
  let i=parseInt(document.getElementById('feedTarget').value);
  if(isNaN(i)||!state.cards[i]) return toast('Pilih makhluk!');
  let c=state.cards[i], cost, hg, sc;
  if(type==='basic'){ cost=5; hg=30; sc=.25; if(state.profit<cost)return toast('💰Kurang'); state.profit-=cost; }
  else if(type==='meat'){ cost=15; hg=60; sc=.45; if(state.profit<cost)return toast('💰Kurang'); state.profit-=cost; }
  else{ cost=1; hg=100; sc=.7; if(state.diamonds<cost)return toast('💎Kurang'); state.diamonds-=cost; }
  c.hunger=Math.min(100,(c.hunger||50)+hg);
  if(Math.random()<sc&&(c.stars||0)<5){ c.stars=(c.stars||0)+1; toast('⭐ +1! ('+c.stars+'/5)'); }
  if(state.energy>0) state.energy--; save(); switchTab('feed',document.querySelector('.tab.active'));
  toast('🍖 Kenyang +'+hg+'%');
}

// ===== BATTLE =====
function startBattle(){
  let i=parseInt(document.getElementById('battleCard').value);
  if(isNaN(i)||!state.cards[i]) return toast('Pilih kartumu!');
  if(state.energy<3) return toast(
