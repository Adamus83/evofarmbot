<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#0b0f19;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:480px;background:#151b2b;min-height:100vh;display:flex;flex-direction:column;position:relative}

.badge{background:#1e293b;padding:6px 10px;border-radius:12px;font-size:11px;font-weight:800;display:flex;align-items:center;gap:4px;color:#facc15;font-family:monospace;border:1px solid #334155}

.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:900;font-size:12px;cursor:pointer;background:#334155;color:#e2e8f0;margin:4px 0;transition:all .2s}

.feed-opt{display:flex;gap:6px;margin:6px 0}.feed-opt button{flex:1;padding:10px 4px;font-size:10px}

.vs{font-size:24px;font-weight:900;color:#ef4444;display:inline-block;vertical-align:middle}

.ad-banner{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid #f59e0b;border-radius:12px;padding:12px;margin:8px 0;text-align:center;cursor:pointer}
.ad-banner .ad-label{font-size:9px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;font-weight:900;margin-bottom:4px}

.daily-streak{display:flex;justify-content:space-between;margin:12px 0;gap:4px}
.streak-day{flex:1;text-align:center;padding:8px 4px;background:#1e293b;border-radius:8px;font-size:10px;border:2px solid transparent}
.streak-day.active{border-color:#facc15;background:#0f172a}.streak-day.claimed{border-color:#22c55e;opacity:.6}
.streak-day .day-num{font-weight:900;font-size:12px}.streak-day .day-reward{color:#facc15;font-size:9px}

.referral-box{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px dashed #facc15;border-radius:12px;padding:16px;text-align:center;margin:12px 0}
.referral-code{font-size:24px;font-weight:900;color:#facc15;font-family:monospace;letter-spacing:2px}
input,select{width:100%;padding:10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px;margin:4px 0}
input:focus,select:focus{outline:none;border-color:#facc15}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.8);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity .3s}.modal.active{opacity:1;pointer-events:all}
.modal-content{background:#1e293b;border:2px solid #334155;border-radius:16px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;text-align:center}
.modal-title{font-size:18px;font-weight:900;margin-bottom:12px;color:#facc15}
.modal-text{font-size:13px;color:#94a3b8;margin-bottom:16px;line-height:1.6}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#0f172a;border:2px solid #22c55e;color:#22c55e;padding:12px 24px;border-radius:12px;font-weight:900;font-size:13px;z-index:2000;transition:transform .3s}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:#ef4444;color:#ef4444}
.pack-opening{display:flex;justify-content:center;gap:12px;margin:20px 0;min-height:80px;align-items:center}
.pack-card{font-size:48px;animation:packPop .5s ease-out}

.pity-counter{font-size:10px;color:#64748b;text-align:center;margin-top:4px}
.leaderboard-item{display:flex;align-items:center;gap:10px;padding:8px;background:#1e293b;border-radius:8px;margin:4px 0;font-size:12px}
.leaderboard-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;background:#334155;color:#94a3b8}

.hidden{display:none!important}
.version-tag{position:fixed;bottom:4px;right:8px;font-size:9px;color:#334155;font-weight:700;z-index:50}

<script>
// ============================================
// EVO CARDS v9.0 — FULLY WORKING VERSION
// ============================================

const CONFIG = {
  MAX_ENERGY: 20,
  ENERGY_REGEN_MINUTES: 5,
  HUNGER_DECAY_MINUTES: 10,
  HUNGER_DECAY_AMOUNT: 5,
  MAX_BATTLE_DAY: 30,
  BATTLE_COST: 3,
  BATTLE_REWARD_BASE: 10,
  EVOLVE_COST: 50,
  EVOLVE_STARS_REQ: 5,
  BREED_COST_ENERGY: 3,
  BREED_MIN_HUNGER: 30,
  MARKET_TAX_RATE: 0.1,
  AD_REWARD_ENERGY: 5,
  AD_REWARD_GOLD: 25,
  DAILY_STREAK_MAX: 7,
  PITY_LEGENDARY: 50,
  PITY_MYTHIC: 200,
  REFERRAL_REWARD_GEM: 10,
  REFERRAL_REWARD_GOLD: 100,
  QUEST_DAILY_RESET: 24
};

const PETS_BASE = [
  {id:'sprout',name:'Sprout',emoji:'🌱',rarity:'common',atk:8,def:3,hp:35,stage:1,evoTo:'bloom'},
  {id:'bloom',name:'Bloom',emoji:'🌸',rarity:'common',atk:15,def:6,hp:55,stage:2,evoTo:'treant'},
  {id:'cactus',name:'Cactus',emoji:'🌵',rarity:'common',atk:10,def:10,hp:45,stage:1,evoTo:null},
  {id:'treant',name:'Treant',emoji:'🌳',rarity:'rare',atk:25,def:15,hp:90,stage:3,evoTo:null},
  {id:'wolf',name:'Wolf',emoji:'🐺',rarity:'rare',atk:32,def:10,hp:75,stage:2,evoTo:null},
  {id:'dragon',name:'Dragon',emoji:'🐉',rarity:'epic',atk:45,def:22,hp:130,stage:4,evoTo:null},
  {id:'phoenix',name:'Phoenix',emoji:'🔥',rarity:'epic',atk:50,def:18,hp:120,stage:3,evoTo:null},
  {id:'zeus',name:'Zeus',emoji:'⚡',rarity:'legendary',atk:70,def:25,hp:150,stage:4,evoTo:null},
  {id:'inferno',name:'Inferno',emoji:'👹',rarity:'mythic',atk:95,def:35,hp:200,stage:5,evoTo:null}
];

const RARITY_WEIGHTS = {common:50,rare:30,epic:15,legendary:4.5,mythic:0.5};

// ============================================
// SECURITY & STATE MANAGEMENT
// ============================================

class SecurityManager {
  static generateChecksum(obj) {
    const str = JSON.stringify(obj,(k,v)=>k==='checksum'?undefined:v);
    let hash = 0;
    for(let i=0;i<str.length;i++){const c=str.charCodeAt(i);hash=((hash<<5)-hash)+c;hash|=0}
    return Math.abs(hash).toString(36);
  }
  
  static sanitizeState(state) {
    if(!state) return this.getDefaultState();
    state.gold = Math.max(0,Math.min(999999,Math.floor(state.gold||0)));
    state.gem = Math.max(0,Math.min(99999,Math.floor(state.gem||0)));
    state.energy = Math.max(0,Math.min(50,Math.floor(state.energy||CONFIG.MAX_ENERGY)));
    state.maxEnergy = Math.max(10,Math.min(50,Math.floor(state.maxEnergy||CONFIG.MAX_ENERGY)));
    if(!Array.isArray(state.cards)) state.cards=[];
    if(!Array.isArray(state.market)) state.market=[];
    if(!Array.isArray(state.selected)) state.selected=[];
    if(!Array.isArray(state.quests)) state.quests=[];
    if(!state.questProgress) state.questProgress={};
    state.cards.forEach(c=>{
      c.level=Math.max(1,Math.min(10,Math.floor(c.level||1)));
      c.stars=Math.max(0,Math.min(5,Math.floor(c.stars||0)));
      c.hunger=Math.max(0,Math.min(100,Math.floor(c.hunger||100)));
      c.xp=Math.max(0,Math.min(c.level*100,Math.floor(c.xp||0)));
    });
    return state;
  }
  
  static getDefaultState() {
    return {
      gold:100,gem:20,energy:15,maxEnergy:CONFIG.MAX_ENERGY,
      cards:[],selected:[],market:[],
      battleCount:0,battleDate:'',lastEnergyRegen:Date.now(),
      lastHungerDecay:Date.now(),dailyStreak:0,lastDailyClaim:'',
      quests:[],questProgress:{},referralCode:'',referredBy:'',
      referrals:[],totalSpent:0,totalEarned:0,pityCounter:0,
      adWatchedToday:0,adDate:'',version:'9.0',checksum:''
    };
  }
}

// ============================================
// ECONOMY MANAGER
// ============================================

class EconomyManager {
  constructor(game){this.game=game;}
  
  canAfford(gold=0,gem=0,energy=0){
    const s=this.game.state;
    return s.gold>=gold && s.gem>=gem && s.energy>=energy;
  }
  
  spend(gold=0,gem=0,energy=0,reason=''){
    const s=this.game.state;
    if(!this.canAfford(gold,gem,energy)){
      this.game.log(`❌ Tidak cukup! Butuh ${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`);
      return false;
    }
    s.gold-=gold; s.gem-=gem; s.energy-=energy;
    if(gem>0) s.totalSpent+=gem;
    this.game.log(`💸 ${reason}: -${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`);
    this.game.updateUI();
    return true;
  }
  
  earn(gold=0,gem=0,energy=0,reason=''){
    const s=this.game.state;
    s.gold+=gold; s.gem+=gem; s.energy=Math.min(s.maxEnergy,s.energy+energy);
    if(gold>0) s.totalEarned+=gold;
    this.game.log(`🎉 ${reason}: +${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`);
    this.game.showToast(`+${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`, gem>0?'premium':'');
    this.game.updateUI();
    return true;
  }
}

// ============================================
// CARD MANAGER
// ============================================

class CardManager {
  constructor(game){this.game=game;}
  
  createCard(baseId,level=1,bonusStars=0){
    const base = PETS_BASE.find(p=>p.id===baseId);
    if(!base) return null;
    const mult = 1+(level-1)*0.1;
    return {
      uid: 'c_'+Math.random().toString(36).substr(2,9)+'_'+Date.now().toString(36),
      baseId:base.id, name:base.name, emoji:base.emoji, rarity:base.rarity,
      stage:base.stage, level:level,
      atk:Math.floor(base.atk*mult), def:Math.floor(base.def*mult), 
      hp:Math.floor(base.hp*mult), maxHp:Math.floor(base.hp*mult),
      stars:bonusStars, hunger:100, xp:0, created:Date.now()
    };
  }
  
  getRarityRoll(){
    const s=this.game.state;
    s.pityCounter++;
    if(s.pityCounter >= CONFIG.PITY_MYTHIC){s.pityCounter=0; return 'mythic';}
    if(s.pityCounter >= CONFIG.PITY_LEGENDARY && Math.random()<0.3){s.pityCounter=0; return 'legendary';}
    const r=Math.random()*100; let cum=0;
    for(const[rar,w] of Object.entries(RARITY_WEIGHTS)){
      cum+=w; if(r<=cum) return rar;
    }
    return 'common';
  }
  
  openPack(count,costGem,type='silver'){
    if(!this.game.economy.spend(0,costGem,0,`Pack ${type}`)) return null;
    const results=[];
    for(let i=0;i<count;i++){
      const rarity=this.getRarityRoll();
      const pool=PETS_BASE.filter(p=>p.rarity===rarity);
      const base=pool.length?pool[Math.floor(Math.random()*pool.length)]:PETS_BASE[0];
      const bonus=Math.random()<0.15?1:0;
      const card=this.createCard(base.id,1,bonus);
      this.game.state.cards.push(card);
      results.push(card);
    }
    if(type==='platinum' && count>=5){
      const rarePool=PETS_BASE.filter(p=>['epic','legendary'].includes(p.rarity));
      const bonusBase=rarePool[Math.floor(Math.random()*rarePool.length)]||PETS_BASE[6];
      const bonusCard=this.createCard(bonusBase.id,Math.floor(Math.random()*2)+2,1);
      this.game.state.cards.push(bonusCard);
      results.push({...bonusCard,isBonus:true});
    }
    this.game.saveState();
    return results;
  }
  
  removeByIndex(indices){
    const sorted=[...indices].sort((a,b)=>b-a);
    const removed=[];
    sorted.forEach(idx=>{
      if(idx>=0 && idx<this.game.state.cards.length){
        removed.push(this.game.state.cards[idx]);
        this.game.state.cards.splice(idx,1);
      }
    });
    return removed;
  }
  
  breed(idx1,idx2){
    const s=this.game.state;
    if(idx1===idx2 || idx1<0 || idx2<0 || idx1>=s.cards.length || idx2>=s.cards.length){
      this.game.log('❌ Pilih 2 kartu berbeda!');
      return null;
    }
    if(!this.game.economy.spend(0,0,CONFIG.BREED_COST_ENERGY,'Breed')) return null;
    
    const p1=s.cards[idx1], p2=s.cards[idx2];
    if(p1.hunger<CONFIG.BREED_MIN_HUNGER || p2.hunger<CONFIG.BREED_MIN_HUNGER){
      this.game.log('❌ Kartu terlalu lapar! Feed dulu.');
      return null;
    }
    
    const removed=this.removeByIndex([idx1,idx2]);
    if(removed.length!==2) return null;
    
    const [parent1,parent2]=removed;
    const newStage=Math.min(5,Math.max(parent1.stage,parent2.stage)+1);
    const pool=PETS_BASE.filter(p=>p.stage===newStage);
    const candidates=pool.length?pool:PETS_BASE.filter(p=>p.stage>=newStage-1);
    const base=candidates[Math.floor(Math.random()*candidates.length)];
    const avgLevel=Math.floor((parent1.level+parent2.level)/2);
    const inheritStars=Math.floor((parent1.stars+parent2.stars)/4);
    
    const child=this.createCard(base.id,Math.max(1,avgLevel),inheritStars);
    s.cards.push(child);
    s.selected=[];
    this.game.log(`🧬 ${parent1.emoji} + ${parent2.emoji} = ${child.emoji} ${child.name}!`);
    this.game.saveState();
    return child;
  }
  
  evolve(idx){
    const s=this.game.state;
    if(idx<0 || idx>=s.cards.length) return null;
    const c=s.cards[idx];
    if(c.stars<CONFIG.EVOLVE_STARS_REQ){
      this.game.log(`❌ Butuh ${CONFIG.EVOLVE_STARS_REQ}⭐ (punya ${c.stars})`);
      return null;
    }
    if(!this.game.economy.spend(CONFIG.EVOLVE_COST,0,0,'Evolve')) return null;
    
    const base=PETS_BASE.find(p=>p.id===c.baseId);
    if(base && base.evoTo){
      const newBase=PETS_BASE.find(p=>p.id===base.evoTo);
      if(newBase){
        c.baseId=newBase.id; c.name=newBase.name; c.emoji=newBase.emoji;
        c.rarity=newBase.rarity; c.stage=newBase.stage;
      }
    }
    c.level=Math.min(10,c.level+1); c.stars=0; c.hunger=100; c.xp=0;
    const mult=1+(c.level-1)*0.1;
    const currentBase=PETS_BASE.find(p=>p.id===c.baseId)||base;
    c.atk=Math.floor(currentBase.atk*mult);
    c.def=Math.floor(currentBase.def*mult);
    c.hp=Math.floor(currentBase.hp*mult); c.maxHp=c.hp;
    s.selected=[];
    this.game.log(`✨ ${c.emoji} Evolved → Lv${c.level} ${c.name}!`);
    this.game.saveState();
    return c;
  }
  
  sell(indices){
    const cards=this.removeByIndex(indices);
    let total=0;
    cards.forEach(c=>{
      const val=Math.floor((c.atk+c.def+c.hp/5)*(1+c.level*0.2)*(1+c.stars*0.5));
      total+=val;
    });
    if(total>0) this.game.economy.earn(total,0,0,'Sell Cards');
    this.game.state.selected=[];
    this.game.saveState();
    return total;
  }
  
  feed(idx,foodType){
    const s=this.game.state;
    if(idx<0 || idx>=s.cards.length) return false;
    const c=s.cards[idx];
    const foods={
      bread:{cost:10,hunger:25,xp:5,gold:true},
      meat:{cost:25,hunger:50,xp:15,gold:true},
      premium:{cost:2,hunger:100,xp:30,gold:false,dm:true}
    };
    const f=foods[foodType];
    if(!f) return false;
    
    if(f.gold && !this.game.economy.spend(f.cost,0,0,`Feed ${foodType}`)) return false;
    if(f.dm && !this.game.economy.spend(0,f.cost,0,`Feed ${foodType}`)) return false;
    
    c.hunger=Math.min(100,c.hunger+f.hunger);
    c.xp=Math.min(c.level*100,c.xp+f.xp);
    if(c.xp>=c.level*100){
      c.level++; c.xp=0; c.maxHp=Math.floor(c.maxHp*1.1); c.hp=c.maxHp;
      c.atk=Math.floor(c.atk*1.1); c.def=Math.floor(c.def*1.1);
      this.game.log(`📈 ${c.emoji} Level Up! Lv${c.level}`);
    }
    if(Math.random()<0.2 && c.stars<5){
      c.stars++; this.game.log(`⭐ ${c.emoji} +1 Star!`);
    }
    this.game.saveState();
    return true;
  }
}

// ============================================
// BATTLE SYSTEM
// ============================================

class BattleSystem {
  constructor(game){this.game=game;}
  
  calculatePower(card){
    return Math.floor(card.atk*1.5+card.def+card.hp*0.3+card.level*5+card.stars*10);
  }
  
  simulateBattle(playerCardIdx){
    const s=this.game.state;
    if(playerCardIdx<0 || playerCardIdx>=s.cards.length) return null;
    
    const today=new Date().toDateString();
    if(s.battleDate!==today){s.battleDate=today; s.battleCount=0;}
    if(s.battleCount>=CONFIG.MAX_BATTLE_DAY){
      this.game.log(`❌ Max ${CONFIG.MAX_BATTLE_DAY} battle/hari!`);
      return null;
    }
    if(!this.game.economy.spend(0,0,CONFIG.BATTLE_COST,'Battle')) return null;
    
    const pc=s.cards[playerCardIdx];
    if(pc.hunger<20){this.game.log('❌ Kartu terlalu lapar!'); return null;}
    
    const pPower=this.calculatePower(pc);
    const oPower=Math.floor(pPower*(0.7+Math.random()*0.6));
    const oHp=Math.floor(oPower*0.6); const oAtk=Math.floor(oPower*0.4);
    
    let pHp=pc.hp, oHpCur=oHp, round=0;
    const logs=[];
    
    while(pHp>0 && oHpCur>0 && round<20){
      round++;
      let dmg=Math.max(1,Math.floor(pc.atk*(0.8+Math.random()*0.4)));
      let isCrit=Math.random()<0.1+pc.stars*0.02;
      if(isCrit){dmg=Math.floor(dmg*1.5); logs.push(`⚔️ R${round}: 💥 CRIT ${dmg}dmg!`);}
      else{logs.push(`⚔️ R${round}: You deal ${dmg}dmg`);}
      oHpCur-=dmg;
      if(oHpCur<=0) break;
      
      let odmg=Math.max(1,Math.floor(oAtk*(0.7+Math.random()*0.6)));
      let oCrit=Math.random()<0.08;
      if(oCrit){odmg=Math.floor(odmg*1.5); logs.push(`🛡️ R${round}: 💥 Enemy CRIT ${odmg}!`);}
      else{logs.push(`🛡️ R${round}: Enemy deals ${odmg}`);}
      pHp-=odmg;
    }
    
    const win=pHp>0;
    const rewardGold=win?Math.floor(CONFIG.BATTLE_REWARD_BASE*(1+pc.level*0.2)+oPower*0.1):Math.floor(CONFIG.BATTLE_REWARD_BASE*0.3);
    const rewardGem=win?Math.floor(1+pc.stars*0.5):0;
    const rewardXp=win?20:5;
    
    pc.hunger=Math.max(0,pc.hunger-15);
    pc.xp=Math.min(pc.level*100,pc.xp+rewardXp);
    s.battleCount++;
    
    this.game.economy.earn(rewardGold,rewardGem,0,win?'Victory':'Defeat');
    if(win && Math.random()<0.3 && pc.stars<5){
      pc.stars++; this.game.log(`⭐ Battle Star +1!`);
    }
    this.game.saveState();
    
    return {win,rounds:round,playerHp:pHp,enemyHp:Math.max(0,oHpCur),logs,rewardGold,rewardGem};
  }
}

class QuestManager {
  constructor(game){this.game=game; this.initQuests();}
  
  initQuests(){
    if(!this.game.state.quests || !this.game.state.quests.length){
      this.game.state.quests=this.generateDailyQuests();
    }
  }
  
  generateDailyQuests(){
    return [
      {id:'feed3',text:'Feed pet 3x',target:3,rewardGold:50,rewardGem:2,progress:0,completed:false},
      {id:'battle5',text:'Win 5 battles',target:5,rewardGold:100,rewardGem:5,progress:0,completed:false},
      {id:'breed1',text:'Breed 1 pet',target:1,rewardGold:75,rewardGem:3,progress:0,completed:false},
      {id:'sell2',text:'Sell 2 cards',target:2,rewardGold:40,rewardGem:1,progress:0,completed:false},
      {id:'openPack',text:'Open 1 pack',target:1,rewardGold:30,rewardGem:2,progress:0,completed:false}
    ];
  }
  
  checkQuest(action,count=1){
    const s=this.game.state;
    if(!s.quests) s.quests=this.generateDailyQuests();
    s.quests.forEach(q=>{
      if(q.completed) return;
      if(q.id===action || (action==='feed' && q.id==='feed3') || (action==='battle' && q.id==='battle5')){
        q.progress=Math.min(q.target,q.progress+count);
        if(q.progress>=q.target){
          q.completed=true;
          this.game.economy.earn(q.rewardGold,q.rewardGem,0,'Quest Complete');
          this.game.showToast(`Quest Done! +${q.rewardGem}💎`,'premium');
        }
      }
    });
    this.game.saveState();
  }
  
  resetDaily(){
    this.game.state.quests=this.generateDailyQuests();
    this.game.log('📋 Daily quests reset!');
  }
}

// MONETIZATION MANAGER
// ============================================

class MonetizationManager {
  constructor(game){this.game=game;}
  
  watchAd(type='energy'){
    const s=this.game.state;
    const today=new Date().toDateString();
    if(s.adDate!==today){s.adDate=today; s.adWatchedToday=0;}
    if(s.adWatchedToday>=10){this.game.log('❌ Max 10 ads/hari!'); return false;}
    
    this.game.showModal('Menonton Iklan...','⏱️ Simulasi: Tonton video 30 detik untuk reward.<br><br>Di production, ini akan memanggil Ad SDK.','Tutup',()=>{
      s.adWatchedToday++;
      if(type==='energy') this.game.economy.earn(0,0,CONFIG.AD_REWARD_ENERGY,'Ad Reward');
      else if(type==='gold') this.game.economy.earn(CONFIG.AD_REWARD_GOLD,0,0,'Ad Reward');
      else if(type==='gem') this.game.economy.earn(0,1,0,'Ad Reward');
      this.game.log(`📺 Ad watched! (${s.adWatchedToday}/10)`);
      this.game.saveState();
    });
    return true;
  }
  
  processReferral(code){
    const s=this.game.state;
    if(!code || code===s.referralCode){this.game.log('❌ Kode invalid!'); return false;}
    if(s.referredBy){this.game.log('❌ Sudah pernah menggunakan referral!'); return false;}
    
    s.referredBy=code;
    this.game.economy.earn(CONFIG.REFERRAL_REWARD_GOLD,CONFIG.REFERRAL_REWARD_GEM,0,'Referral Bonus');
    this.game.log(`🎁 Referral bonus! +${CONFIG.REFERRAL_REWARD_GEM}💎`);
    this.game.saveState();
    return true;
  }
  
  generateReferralCode(){
    const s=this.game.state;
    if(!s.referralCode){
      s.referralCode='EVO'+Math.random().toString(36).substr(2,5).toUpperCase();
    }
    return s.referralCode;
  }
  
  claimDailyStreak(){
    const s=this.game.state;
    const today=new Date().toDateString();
    const yesterday=new Date(Date.now()-86400000).toDateString();
    
    if(s.lastDailyClaim===today){this.game.log('✅ Sudah claim hari ini!'); return false;}
    
    if(s.lastDailyClaim===yesterday){s.dailyStreak=Math.min(CONFIG.DAILY_STREAK_MAX,s.dailyStreak+1);}
    else{s.dailyStreak=1;}
    
    s.lastDailyClaim=today;
    const rewards=[{g:50,d:1},{g:75,d:2},{g:100,d:3},{g:150,d:4},{g:200,d:5},{g:300,d:7},{g:500,d:10}];
    const rw=rewards[Math.min(s.dailyStreak-1,6)];
    this.game.economy.earn(rw.g,rw.d,0,`Streak Day ${s.dailyStreak}`);
    this.game.showToast(`Streak ${s.dailyStreak} 🔥 +${rw.d}💎`,'premium');
    this.game.saveState();
    return true;
  }
}

    <div class="section-title" style="font-size:12px">🤝 Referral Program</div>
    <div class="referral-box">
      <div style="font-size:10px;color:#94a3b8;margin-bottom:4px">Your Code</div>
      <div class="referral-code">${refCode}</div>
      <div style="font-size:10px;color:#64748b;margin-top:8px">Invite friends → +${CONFIG.REFERRAL_REWARD_GEM}💎 each!</div>
    </div>
    <input type="text" id="refInput" placeholder="Masukkan kode referral...">
    <button class="btn btn-blue" onclick="window.gameApp.ui.useReferral()">🎁 Claim Referral</button>
    
    <div class="section-title" style="font-size:12px">💸 Withdraw</div>
    <div class="panel">
      <div class="info-text">Min withdraw: 500💎 → Rp50.000 (Rate: 1💎 = Rp100)</div>
      <button class="btn btn-red" onclick="window.gameApp.ui.withdraw()">💸 Withdraw</button>
    </div>`;
    
    c.innerHTML=h;
  }
  
  useReferral(){
    const code=document.getElementById('refInput').value.trim();
    if(code) this.game.monetize.processReferral(code);
  }
  
  withdraw(){
    const s=this.game.state;
    if(s.gem<500){this.game.log('❌ Min 500💎!'); return;}
    const amt=Math.floor(s.gem/500)*500;
    const rp=(amt/500)*50000;
    const rek=prompt(`Withdraw ${amt}💎 = Rp${rp.toLocaleString()}\n\nMasukkan nomor GoPay/Dana:`);
    if(rek && confirm(`Konfirmasi withdraw Rp${rp.toLocaleString()} ke ${rek}?`)){
      s.gem-=amt;
      this.game.saveState();
      this.game.log('✅ Withdrawal diproses (1x24 jam)');
      this.game.showToast('Withdrawal submitted!');
    }
  }
  
  renderShop(c){
    const s=this.game.state;
    let h=`<div class="section-title">🛒 Premium Shop</div>
    
    <div class="section-title" style="font-size:12px">🎁 Booster Packs</div>
    <div class="panel" style="text-align:center">
      <div style="font-size:48px;margin:8px 0">🎲</div>
      <div class="pity-counter">Pity: ${s.pityCounter}/${CONFIG.PITY_LEGENDARY} (Legendary)</div>
    </div>
    <button class="btn" onclick="window.gameApp.ui.openPack('bronze',1,10)">🥉 Bronze Pack — 1 Card — 10💎</button>
    <button class="btn btn-primary" onclick="window.gameApp.ui.openPack('silver',3,25)">🥈 Silver Pack — 3 Cards — 25💎</button>
    <button class="btn btn-gold" onclick="window.gameApp.ui.openPack('gold',5,45)">🥇 Gold Pack — 5 Cards — 45💎</button>
    <button class="btn btn-purple" onclick="window.gameApp.ui.openPack('platinum',5,80)">💎 Platinum — 5+1 Epic+ — 80💎</button>
    
    <div class="section-title" style="font-size:12px">⚡ Resources</div>
    <button class="btn btn-blue" onclick="window.gameApp.ui.buyResource('energy')">⚡ +20 Energy — 5💎</button>
    <button class="btn btn-green" onclick="window.gameApp.ui.buyResource('gold')">💰 +1000 Gold — 15💎</button>
    
    <div class="section-title" style="font-size:12px">🎟️ Redeem Code</div>
    <input type="text" id="redeemCode" placeholder="Enter code...">
    <button class="btn btn-premium" onclick="window.gameApp.ui.redeem()">🎟️ Redeem</button>
    
    <div id="packResult" class="pack-opening"></div>`;
    
    c.innerHTML=h;
  }
  
  openPack(type,count,cost){
    const result=this.game.cards.openPack(count,cost,type);
    if(!result) return;
    
    const el=document.getElementById('packResult');
    el.innerHTML=result.map((card,i)=>`<div class="pack-card" style="animation-delay:${i*0.1}s">${card.emoji}</div>`).join('')+(result.find(c=>c.isBonus)?'<div style="width:100%;margin-top:8px;font-size:12px;color:#facc15;font-weight:900">🎁 BONUS CARD!</div>':'');
    
    this.game.quests.checkQuest('openPack');
    setTimeout(()=>{if(el) el.innerHTML='';},4000);
  }
  
  buyResource(type){
    if(type==='energy'){
      if(this.game.economy.spend(0,5,0,'Buy Energy')){
        this.game.state.energy=Math.min(this.game.state.maxEnergy,this.game.state.energy+20);
        this.game.saveState();
      }
    }else if(type==='gold'){
      if(this.game.economy.spend(0,15,0,'Buy Gold')){
        this.game.economy.earn(1000,0,0,'Shop');
      }
    }
  }
  
  redeem(){
    const code=document.getElementById('redeemCode').value.trim().toUpperCase();
    if(!code){this.game.log('❌ Masukkan kode!'); return;}
    
    const now=Date.now();
    const key='evo9_redeem_'+code;
    const last=parseInt(localStorage.getItem(key+'_last')||0);
    if(now-last < 60000){this.game.log('⏱️ Tunggu 1 menit!'); return;}
    localStorage.setItem(key+'_last',now.toString());
    
    let gem=5, gold=0;
    if(code.startsWith('VIP')){gem=50; gold=500;}
    else if(code.startsWith('MEGA')){gem=100; gold=1000;}
    else if(code.length < 6){this.game.log('❌ Kode invalid!'); return;}
    
    const used=JSON.parse(localStorage.getItem('evo9_used_codes')||'[]');
    if(used.includes(code)){this.game.log('⚠️ Kode sudah digunakan!'); return;}
    
    used.push(code);
    localStorage.setItem('evo9_used_codes',JSON.stringify(used));
    
    this.game.economy.earn(gold,gem,0,'Redeem Code');
    this.game.saveState();
    this.game.showToast(`🎉 +${gem}💎 +${gold}💰`,'premium');
  }
}

// ============================================
// MAIN GAME ENGINE
// ============================================

class GameEngine {
  constructor(){
    this.state=SecurityManager.getDefaultState();
    this.economy=new EconomyManager(this);
    this.cards=new CardManager(this);
    this.battle=new BattleSystem(this);
    this.quests=new QuestManager(this);
    this.monetize=new MonetizationManager(this);
    this.ui=new UIManager(this);
    this.currentTab='cards';
  }
  
  init(){
    this.loadState();
    
    // Starter cards if empty
    if(!this.state.cards || !this.state.cards.length){
      this.state.cards=[
        this.cards.createCard('sprout',1,0),
        this.cards.createCard('cactus',1,0),
        this.cards.createCard('sprout',2,1)
      ];
      this.log('🎁 Starter pack diberikan!');
    }
    
    this.monetize.generateReferralCode();
    this.quests.initQuests();
    this.saveState();
    this.startLoops();
    this.ui.renderTab('cards');
    this.updateUI();
    this.log('✅ v9.0 Ready! Pilih tab untuk mulai.');
  }
  
  startLoops(){
    // Energy regen
    setInterval(()=>{
      if(this.state.energy < this.state.maxEnergy){
        this.state.energy=Math.min(this.state.maxEnergy,this.state.energy+1);
        this.saveState(); this.updateUI();
      }
    },CONFIG.ENERGY_REGEN_MINUTES*60000);
    
    // Hunger decay
    setInterval(()=>{
      this.state.cards.forEach(c=>{c.hunger=Math.max(0,c.hunger-CONFIG.HUNGER_DECAY_AMOUNT)});
      this.saveState(); this.updateUI();
    },CONFIG.HUNGER_DECAY_MINUTES*60000);
  }
  
  saveState(){
    this.state.checksum=SecurityManager.generateChecksum(this.state);
    localStorage.setItem('evo9_state',JSON.stringify(this.state));
  }
  
  loadState(){
    try{
      const raw=localStorage.getItem('evo9_state');
      if(raw){
        const parsed=JSON.parse(raw);
        this.state=SecurityManager.sanitizeState(parsed);
        this.log('✅ Save loaded!');
      }
    }catch(e){
      this.log('⚠️ New game started!');
    }
  }
  
  selectCard(idx){
    const p=this.state.selected.indexOf(idx);
    if(p>=0) this.state.selected.splice(p,1);
    else if(this.state.selected.length<2) this.state.selected.push(idx);
    this.ui.renderTab(this.currentTab);
  }
  
  log(msg){document.getElementById('log').textContent=msg;}
  
  showToast(msg,type=''){
    const t=document.getElementById('toast');
    t.textContent=msg;
    t.className='toast '+(type==='error'?'error':'')+' show';
    setTimeout(()=>t.className='toast',2500);
  }
  
  showModal(title,html,btnText='OK',callback=null){
    const m=document.getElementById('modal'), c=document.getElementById('modalContent');
    c.innerHTML=`<div class="modal-title">${title}</div><div class="modal-text">${html}</div><button class="btn btn-primary" onclick="window.gameApp.closeModal()">${btnText}</button>`;
    m.classList.add('active');
    this._modalCallback=callback;
  }
  
  closeModal(){
    document.getElementById('modal').classList.remove('active');
    if(this._modalCallback){
      this._modalCallback();
      this._modalCallback=null;
    }
  }
  
  updateUI(){
    document.getElementById('res-gold').textContent=this.state.gold;
    document.getElementById('res-gem').textContent=this.state.gem;
    document.getElementById('res-energy').textContent=this.state.energy;
    document.getElementById('res-maxenergy').textContent=this.state.maxEnergy;
  }
}

// ============================================
// INITIALIZATION
// ============================================

let tg = window.Telegram?.WebApp;
if(tg){
  tg.expand();
  tg.ready();
}

// Global reference untuk onclick handlers
window.gameApp = null;

document.addEventListener('DOMContentLoaded',()=>{
  window.gameApp = new GameEngine();
  
  // Tab switching
  document.getElementById('tabBar').addEventListener('click',(e)=>{
    if(e.target.classList.contains('tab')){
      window.gameApp.ui.renderTab(e.target.dataset.tab);
    }
  });
  
  // Modal close on backdrop
  document.getElementById('modal').addEventListener('click',(e)=>{
    if(e.target.id==='modal') window.gameApp.closeModal();
  });
  
  // Start game
  window.gameApp.init();
});
</script>
</body>
