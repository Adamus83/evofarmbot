<!DOCTYPE html>
<html lang="id"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Evo Cards v5.2 - Telegram Ready</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:440px;background:#1e293b;min-height:100vh;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;background:#0f172a;border-bottom:2px solid #334155;cursor:pointer}
.logo{font-weight:900;font-size:18px}
.stats{display:flex;gap:5px;flex-wrap:wrap}
.badge{background:#334155;padding:5px 8px;border-radius:10px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:3px}
.tabs{display:flex;background:#0f172a;border-bottom:1px solid #334155;overflow-x:auto}
.tab{flex:1;padding:9px 6px;text-align:center;font-weight:700;font-size:11px;cursor:pointer;color:#94a3b8;border-bottom:3px solid transparent;white-space:nowrap;min-width:50px}
.tab.active{color:#facc15;border-color:#facc15}
.content{flex:1;overflow-y:auto;padding:12px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:linear-gradient(160deg,#1e293b,#0f172a);border:2px solid #475569;border-radius:14px;padding:8px;text-align:center;position:relative;cursor:pointer;transition:0.15s}
.card:active{transform:scale(0.93)}
.card.selected{border-color:#facc15!important;box-shadow:0 0 15px rgba(250,204,21,0.5)}
.rarity-common{border-color:#64748b}.rarity-rare{border-color:#60a5fa}.rarity-epic{border-color:#a78bfa}.rarity-legendary{border-color:#facc15}
.emoji{font-size:32px}.name{font-size:10px;font-weight:800;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-row{font-size:9px;color:#94a3b8}.lvl{position:absolute;top:5px;left:5px;background:#0f172a;padding:1px 5px;border-radius:6px;font-size:9px}
.stars{display:flex;gap:1px;justify-content:center;margin-top:3px}
.stars span{font-size:8px}.stars .on{color:#facc15}.stars .off{color:#475569}
.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:800;font-size:13px;cursor:pointer;background:#334155;color:#e2e8f0;margin:4px 0}
.btn-primary{background:#facc15;color:#0f172a}.btn-green{background:#22c55e;color:#0f172a}.btn-red{background:#ef4444;color:white}.btn-blue{background:#3b82f6;color:white}
.log{text-align:center;padding:7px;font-size:11px;color:#94a3b8;background:#0f172a;min-height:28px}
.modal{position:fixed;inset:0;background:rgba(0,0,0,0.8);display:flex;align-items:center;justify-content:center;z-index:2000;padding:20px}
.modal-box{background:#1e293b;border:2px solid #475569;border-radius:16px;padding:18px;max-width:340px;width:100%;text-align:center}
input,select{width:100%;padding:12px;margin:6px 0;border-radius:8px;border:none;background:#0f172a;color:#e2e8f0;font-size:14px}
.codebox{background:#0f172a;padding:10px;border-radius:8px;font-family:monospace;word-break:break-all;margin:8px 0;text-align:center;font-size:16px}
.hidden{display:none!important}
.feed-opt{display:flex;gap:6px;margin:8px 0}
.feed-opt button{flex:1;padding:10px 6px;font-size:10px}
.battle-card{background:#1e293b;border:1px solid #475569;border-radius:10px;padding:8px;margin:4px 0;display:flex;justify-content:space-between;align-items:center;font-size:11px}
.save-dot{position:fixed;top:8px;right:8px;font-size:10px;background:#22c55e;color:white;padding:3px 8px;border-radius:10px;z-index:999;opacity:0;transition:0.3s}
</style></head><body>

<div class="app" id="gameApp">
  <div class="top" onclick="tapLogo()">
    <div class="logo">⚡ EVO CARDS v5.2</div>
    <div class="stats">
      <div class="badge">💰<span id="profit">0</span></div>
      <div class="badge">💎<span id="diamonds">0</span></div>
      <div class="badge">⚡<span id="energy">0</span></div>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" onclick="switchTab('cards',this)">🃏Kartu</div>
    <div class="tab" onclick="switchTab('breed',this)">🧬Breed</div>
    <div class="tab" onclick="switchTab('feed',this)">🍖Feed</div>
    <div class="tab" onclick="switchTab('battle',this)">⚔️Battle</div>
    <div class="tab" onclick="switchTab('market',this)">🏪Pasar</div>
    <div class="tab" onclick="switchTab('shop',this)">🛒Shop</div>
  </div>
  <div class="content" id="content"><p style="text-align:center;padding:40px;">⏳ Loading...</p></div>
  <div class="log" id="log">☁️ Syncing cloud data...</div>
</div>
<div class="save-dot" id="saveDot">💾 Saved</div>

<!-- ADMIN -->
<div class="app hidden" id="adminApp">
  <div class="top"><div class="logo">🔐 ADMIN</div><div class="badge" onclick="closeAdmin()" style="cursor:pointer">❌Tutup</div></div>
  <div class="content">
    <div id="adminLogin">
      <h3>🔑 Masuk Admin</h3>
      <input id="adminPass" type="password" placeholder="Kode autentikasi">
      <button class="btn btn-primary" onclick="adminLogin()">Login</button>
      <p style="font-size:11px;color:#94a3b8;margin-top:10px">Kode: 727277</p>
    </div>
    <div id="adminPanel" class="hidden">
      <h3>🎟️ Generator Kode</h3>
      <input id="genDiamonds" type="number" value="120">
      <input id="genNote" placeholder="Nama pembeli">
      <button class="btn btn-primary" onclick="generateCode()">Generate</button>
      <div id="genOut"></div>
      <h4 style="margin-top:20px">📜 Riwayat</h4>
      <div id="history" style="font-size:11px"></div>
    </div>
  </div>
</div>
<div id="modal" style="display:none"></div>

<script>
// ===== CONFIG =====
var ADMIN_CODE = '727277';
var SECRET = 'evo2026' + ADMIN_CODE;
var GOPAY = '088989727277';
var WA = '6288989727277';

// ===== TELEGRAM =====
var tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg) { tg.expand(); tg.ready(); }

// ===== USER ID =====
var uid = localStorage.getItem('evo_uid_v52');
if(!uid) { uid = 'user_' + Math.random().toString(36).substr(2,9); localStorage.setItem('evo_uid_v52', uid); }
try { if(tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) { uid = 'tg_' + tg.initDataUnsafe.user.id; } } catch(e) {}

// ===== FIREBASE =====
var db = null;
try {
  firebase.initializeApp({
    apiKey: "AIZaSyC2Gb6WtY1bn05fI_3K9x3",
    authDomain: "evo-farm-game.firebaseapp.com",
    databaseURL: "https://evo-farm-game-default-rtdb.asia-southeast1.firebasedatabase.app",
    projectId: "evo-farm-game",
    storageBucket: "evo-farm-game.appspot.com",
    messagingSenderId: "870289339504",
    appId: "1:870289339504:web:154c283a0e8b5d4c28a3e"
  });
  db = firebase.database();
} catch(e) { console.log('Firebase init error'); }

// ===== GAME DATA =====
var POOL = [
  {id:'sprout',name:'Sprout',emoji:'🌱',rarity:'common',atk:5,def:2,hp:30,stage:1},
  {id:'bloom',name:'Bloom',emoji:'🌸',rarity:'common',atk:12,def:5,hp:50,stage:2},
  {id:'cactus',name:'Cactus',emoji:'🌵',rarity:'common',atk:8,def:8,hp:40,stage:1},
  {id:'treant',name:'Treant',emoji:'🌳',rarity:'rare',atk:22,def:12,hp:80,stage:3},
  {id:'wolf',name:'Wolf',emoji:'🐺',rarity:'rare',atk:28,def:8,hp:70,stage:2},
  {id:'dragon',name:'Dragon',emoji:'🐉',rarity:'epic',atk:40,def:18,hp:120,stage:4},
  {id:'phoenix',name:'Phoenix',emoji:'🔥',rarity:'epic',atk:45,def:15,hp:110,stage:3},
  {id:'zeus',name:'Zeus',emoji:'⚡',rarity:'legendary',atk:65,def:20,hp:140,stage:4}
];

var state = {profit:80,diamonds:30,energy:12,cards:[],selected:[],marketListings:[]};

function newCard(t,lvl){ lvl = lvl || 1; var m = 1 + (lvl-1)*0.08; return {id:t.id,name:t.name,emoji:t.emoji,rarity:t.rarity,atk:Math.floor(t.atk*m),def:Math.floor(t.def*m),hp:Math.floor(t.hp*m),stage:t.stage,level:lvl,uid:Math.random().toString(36).slice(2,9),stars:0,hunger:80}; }

// ===== SAVE =====
function save(){ 
  localStorage.setItem('evoV52', JSON.stringify(state));
  if(db) { try { db.ref('users/' + uid).set(state); } catch(e) {} }
  updateUI();
  var dot = document.getElementById('saveDot'); dot.style.opacity='1'; setTimeout(function(){dot.style.opacity='0'},1200);
}

// ===== LOAD =====
function loadData(){
  if(!db) { loadLocal(); return; }
  db.ref('users/' + uid).once('value').then(function(snap){
    if(snap.exists()){ state = snap.val(); if(!state.marketListings) state.marketListings=[]; if(!state.selected) state.selected=[]; }
    else { loadLocal(); }
    checkCards(); save(); updateUI(); switchTab('cards',document.querySelector('.tab'));
  }).catch(function(){ loadLocal(); checkCards(); save(); updateUI(); switchTab('cards',document.querySelector('.tab')); });
}

function loadLocal(){ var local = JSON.parse(localStorage.getItem('evoV52')||'null'); if(local) state = local; }
function checkCards(){ if(!state.cards||state.cards.length===0){ state.cards=[newCard(POOL[0],2),newCard(POOL[0],2),newCard(POOL[1],1),newCard(POOL[2],1)]; } }

// ===== UI =====
function updateUI(){ 
  document.getElementById('profit').textContent = state.profit || 0;
  document.getElementById('diamonds').textContent = state.diamonds || 0;
  document.getElementById('energy').textContent = state.energy || 0;
}
function toast(m){ document.getElementById('log').textContent=m; }

// ===== TABS =====
function switchTab(t,el){
  var tabs = document.querySelectorAll('.tab');
  for(var i=0;i<tabs.length;i++){ tabs[i].classList.remove('active'); }
  el.classList.add('active');
  var c = document.getElementById('content');
  
  if(t==='cards'){
    var h='<p style="font-size:11px;color:#94a3b8;margin-bottom:6px;">🖱️ Klik kartu (max 2)</p><div class="grid">';
    for(var i=0;i<state.cards.length;i++){
      var card=state.cards[i], sel=state.selected.indexOf(i)>=0?' selected':'', sh='';
      for(var s=0;s<5;s++){ sh+='<span class="'+(s<(card.stars||0)?'on':'off')+'">'+(s<(card.stars||0)?'⭐':'☆')+'</span>'; }
      h+='<div class="card rarity-'+card.rarity+sel+'" onclick="tapCard('+i+')"><div class="lvl">Lv'+card.level+'</div><div class="emoji">'+card.emoji+'</div><div class="name">'+card.name+'</div><div class="stars">'+sh+'</div><div class="stats-row">⚔'+card.atk+' 🛡'+card.def+' 🍖'+(card.hunger||80)+'%</div></div>';
    }
    h+='</div><button class="btn btn-green" onclick="evolveCard()">✨ Evolve (⭐5)</button><button class="btn btn-red" onclick="sellCard()">💵 Sell</button>';
    c.innerHTML=h;
  }
  if(t==='breed'){ c.innerHTML='<p style="font-size:11px;color:#94a3b8;">Pilih 2 kartu di tab Kartu</p><button class="btn btn-primary" onclick="breedCards()">🧬 Breed (⚡2)</button>'; }
  if(t==='feed'){
    var opts='<option value="">Pilih...</option>';
    for(var i=0;i<state.cards.length;i++){ opts+='<option value="'+i+'">'+state.cards[i].emoji+' '+state.cards[i].name+' 🍖'+(state.cards[i].hunger||80)+'%</option>'; }
    c.innerHTML='<h4>🍖 Feeding</h4><select id="feedTarget">'+opts+'</select><div class="feed-opt"><button class="btn" onclick="doFeed(\'basic\')">🍞💰5</button><button class="btn btn-primary" onclick="doFeed(\'meat\')">🥩💰15</button><button class="btn btn-blue" onclick="doFeed(\'premium\')">🍰💎1</button></div>';
  }
  if(t==='battle'){
    var opts2='<option value="">Pilih...</option>';
    for(var i=0;i<state.cards.length;i++){ opts2+='<option value="'+i+'">'+state.cards[i].emoji+' '+state.cards[i].name+' ⚔'+state.cards[i].atk+'</option>'; }
    c.innerHTML='<h4>⚔️ Battle</h4><select id="battleCard">'+opts2+'</select><button class="btn btn-green" onclick="startBattle()">Battle (⚡3)</button><p style="font-size:10px;color:#94a3b8;">Menang +15💰 +2💎 +2⭐</p>';
  }
  if(t==='market'){
    var mh='<h4>🏪 Pasar</h4><button class="btn btn-primary" onclick="listToMarket()">📤 Jual</button><input id="marketPrice" type="number" value="10" placeholder="Harga 💎">';
    if(state.marketListings.length){
      for(var i=0;i<state.marketListings.length;i++){ var l=state.marketListings[i]; mh+='<div class="battle-card"><div>'+l.emoji+' '+l.name+' Lv'+l.level+'</div><div>💎'+l.price+' <button class="btn btn-green" style="padding:4px 8px;font-size:10px;width:auto" onclick="buyMarket('+i+')">Beli</button></div></div>'; }
    } else { mh+='<p style="font-size:10px;color:#94a3b8;">Kosong</p>'; }
    c.innerHTML=mh;
  }
  if(t==='shop'){
    c.innerHTML='<button class="btn btn-primary" onclick="buyPack()">🎁 Buka Pack - 10💎</button><div id="packRes" style="text-align:center;margin:10px"></div><button class="btn btn-blue" onclick="buyDiamond()">💰 Beli 120💎</button><button class="btn" onclick="redeem()">🎟️ Redeem</button><p style="font-size:10px;color:#94a3b8;">GoPay: '+GOPAY+'</p>';
  }
}

// ===== ACTIONS =====
function tapCard(i){ var p=state.selected.indexOf(i); if(p>=0) state.selected.splice(p,1); else if(state.selected.length<2) state.selected.push(i); else toast('⚠️ Max 2'); switchTab('cards',document.querySelector('.tab.active')); }
function breedCards(){
  if(state.selected.length!==2) return toast('⚠️ Pilih 2!'); if(state.energy<2) return toast('⚡ Kurang');
  var s=state.selected.slice().sort(function(a,b){return b-a}), p1=state.cards[s[0]], p2=state.cards[s[1]];
  state.cards.splice(s[0],1); state.cards.splice(s[1],1);
  var ns=Math.floor((p1.level+p2.level)/2)+1; if(ns>4)ns=4;
  var cand=POOL.filter(function(c){return c.stage===ns}); if(!cand.length)cand=POOL;
  var baby=newCard(cand[Math.floor(Math.random()*cand.length)],ns);
  state.cards.push(baby); state.energy-=2; state.selected=[]; save(); toast('🧬 '+baby.emoji+' '+baby.name+'!');
}
function evolveCard(){
  if(state.selected.length!==1) return toast('⚠️ Pilih 1!'); var i=state.selected[0], c=state.cards[i];
  if((c.stars||0)<5) return toast('⭐ '+(c.stars||0)+'/5'); if(state.profit<10) return toast('💰 Kurang');
  state.profit-=10; c.level=Math.min(4,c.level+1); c.atk=Math.floor(c.atk*1.15); c.def=Math.floor(c.def*1.15); c.hp=Math.floor(c.hp*1.15); c.stars=0; c.hunger=100; state.selected=[]; save(); toast('✨ Naik Lv'+c.level+'!');
}
function sellCard(){
  if(!state.selected.length) return toast('⚠️ Pilih!'); var s=state.selected.slice().sort(function(a,b){return b-a}), tot=0;
  s.forEach(function(i){ tot+=state.cards[i].atk+state.cards[i].def; state.cards.splice(i,1); });
  state.profit+=tot; state.selected=[]; save(); toast('💵 +'+tot);
}
function doFeed(type){
  var i=parseInt(document.getElementById('feedTarget').value); if(isNaN(i)||!state.cards[i]) return toast('Pilih!');
  var c=state.cards[i], cost, hg, sc;
  if(type==='basic'){ cost=5; hg=30; sc=.25; if(state.profit<cost)return; state.profit-=cost; }
  else if(type==='meat'){ cost=15; hg=60; sc=.45; if(state.profit<cost)return; state.profit-=cost; }
  else{ cost=1; hg=100; sc=.7; if(state.diamonds<cost)return; state.diamonds-=cost; }
  c.hunger=Math.min(100,(c.hunger||50)+hg);
  if(Math.random()<sc&&(c.stars||0)<5){ c.stars=(c.stars||0)+1; toast('⭐ +1'); }
  if(state.energy>0)state.energy--; save(); switchTab('feed',document.querySelector('.tab.active'));
}
function startBattle(){
  var i=parseInt(document.getElementById('battleCard').value); if(isNaN(i)||!state.cards[i]) return toast('Pilih!');
  if(state.energy<3) return toast('⚡ Kurang'); state.energy-=3; state.profit+=15; state.diamonds+=2;
  var c=state.cards[i]; if((c.stars||0)<5)c.stars=Math.min(5,(c.stars||0)+2); save(); toast('🏆 +15💰 +2💎');
}
function listToMarket(){
  if(!state.selected.length) return toast('Pilih!'); var p=parseInt(document.getElementById('marketPrice').value)||10;
  var s=state.selected.slice().sort(function(a,b){return b-a});
  s.forEach(function(i){ state.marketListings.push({...state.cards[i],price:p}); state.cards.splice(i,1); });
  state.selected=[]; save(); switchTab('market',document.querySelector('.tab.active'));
}
function buyMarket(idx){
  var l=state.marketListings[idx]; if(!l||state.diamonds<l.price) return toast('💎 Kurang');
  state.diamonds-=l.price; state.cards.push({...l}); state.marketListings.splice(idx,1); save(); switchTab('market',document.querySelector('.tab.active'));
}
function buyPack(){ if(state.diamonds<10) return; state.diamonds-=10; var c=newCard(POOL[Math.floor(Math.random()*POOL.length)]); state.cards.push(c); document.getElementById('packRes').innerHTML='<div style="font-size:40px">'+c.emoji+'</div>'+c.name; save(); }
function buyDiamond(){
  var code='EVO'+Math.floor(Math.random()*9000+1000);
  document.getElementById('modal').innerHTML='<div class="modal"><div class="modal-box"><b>Transfer Rp15.000</b><br>GoPay: '+GOPAY+'<br>Catatan: '+code+'<br><br><button class="btn btn-primary" onclick="window.open(\'https://wa.me/'+WA+'?text=Sudah%20transfer%20'+code+'\')">Chat WA Admin</button><button class="btn" onclick="document.getElementById(\'modal\').style.display=\'none\'">Tutup</button></div></div>';
  document.getElementById('modal').style.display='block';
}
function redeem(){
  var code=prompt('Kode redeem:'); if(!code) return;
  try{
    var raw=atob(code), parts=raw.split('|'), diamonds=parts[0], ts=parts[1];
    var check=btoa(diamonds+'|'+ts+'|'+SECRET).replace(/=/g,'');
    if(check!==code) return toast('❌ Salah');
    var used=JSON.parse(localStorage.getItem('evoUsed')||'[]');
    if(used.indexOf(code)>=0) return toast('⚠️ Sudah dipakai');
    state.diamonds+=parseInt(diamonds); used.push(code); localStorage.setItem('evoUsed',JSON.stringify(used)); save(); toast('🎉 +'+diamonds+'💎');
  }catch(e){ toast('❌ Error'); }
}

// ===== ADMIN =====
var tapCount=0;
function tapLogo(){ tapCount++; if(tapCount>=5){ document.getElementById('gameApp').classList.add('hidden'); document.getElementById('adminApp').classList.remove('hidden'); tapCount=0; } setTimeout(function(){tapCount=0},2000); }
function closeAdmin(){ document.getElementById('adminApp').classList.add('hidden'); document.getElementById('gameApp').classList.remove('hidden'); }
function adminLogin(){ if(document.getElementById('adminPass').value===ADMIN_CODE){ document.getElementById('adminLogin').classList.add('hidden'); document.getElementById('adminPanel').classList.remove('hidden'); loadAdmin(); } }
function generateCode(){
  var d=document.getElementById('genDiamonds').value||120, n=document.getElementById('genNote').value||'', ts=Date.now();
  var code=btoa(d+'|'+ts+'|'+SECRET).replace(/=/g,'');
  document.getElementById('genOut').innerHTML='<div class="codebox">'+code+'</div><button class="btn" onclick="navigator.clipboard.writeText(\''+code+'\')">📋 Copy</button>';
  var hist=JSON.parse(localStorage.getItem('evoHist')||'[]'); hist.unshift({code,d,note:n,time:new Date().toLocaleString()}); localStorage.setItem('evoHist',JSON.stringify(hist.slice(0,50))); loadAdmin();
}
function loadAdmin(){ document.getElementById('history').innerHTML=JSON.parse(localStorage.getItem('evoHist')||'[]').map(function(h){return'<div style="padding:4px;border-bottom:1px solid #334155">'+h.time+' - '+h.d+'💎 - '+h.note+'<br><span style="font-size:9px">'+h.code+'</span></div>';}).join(''); }

// ===== START =====
window.addEventListener('load', function(){
  setTimeout(function(){ loadData(); }, 600);
});
</script></body></html>
