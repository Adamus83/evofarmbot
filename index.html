<script>

if(!S.cd||S.cd.length===0){S.cd=[nC(POOL[0],2),nC(POOL[0],2),nC(POOL[1],1),nC(POOL[2],1)];sv()}
if(!S.me)S.me=20;if(S.en>S.me)S.en=S.me;

      '<button class="btn btn-green" onclick="bE()">⚡ 10 Energi (5💎)</button>'+
      '<button class="btn btn-gold" onclick="bG()">🪙 500 Profit (10💎)</button>'+
      '<button class="btn" onclick="rd()">🎟️ Redeem</button>'+
      '<hr style="border-color:#334155;margin:8px 0">'+

// ===== CARD ACTIONS =====
function tC(i){var p=S.sl.indexOf(i);if(p>=0)S.sl.splice(p,1);else if(S.sl.length<2)S.sl.push(i);st('cards',document.querySelector('.tab.active'))}
function brC(){if(S.sl.length!==2)return ts('⚠️ Pilih 2!');if(S.en<2)return ts('⚡ Kurang!');var s=S.sl.slice().sort(function(a,b){return b-a}),p1=S.cd[s[0]],p2=S.cd[s[1]];S.cd.splice(s[0],1);S.cd.splice(s[1],1);var ns=Math.floor((p1.level+p2.level)/2)+1;if(ns>4)ns=4;var cand=POOL.filter(function(c){return c.stage===ns});if(!cand.length)cand=POOL;var b=nC(cand[Math.floor(Math.random()*cand.length)],ns);S.cd.push(b);S.en-=2;S.sl=[];sv();ts('🧬 '+b.emoji+' '+b.name)}
function evC(){if(S.sl.length!==1)return ts('⚠️ Pilih 1!');var i=S.sl[0],c=S.cd[i];if((c.st||0)<5)return ts('⭐ '+(c.st||0)+'/5');if(S.pf<10)return ts('💰 Kurang!');S.pf-=10;c.level=Math.min(4,c.level+1);c.atk=Math.floor(c.atk*1.15);c.def=Math.floor(c.def*1.15);c.hp=Math.floor(c.hp*1.15);c.st=0;c.hu=100;S.sl=[];sv();ts('✨ Lv'+c.level+'!')}

// ===== MARKET =====
