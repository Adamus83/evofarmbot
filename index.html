<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Evo Cards v9.4 — Premium Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-primary: #0b0f19;
  --bg-secondary: #151b2b;
  --bg-tertiary: #0f172a;
  --bg-card: #1e293b;
  --border-primary: #1e293b;
  --border-secondary: #334155;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --gold: #facc15;
  --gold-dark: #f59e0b;
  --red: #f43f5e;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --premium: #ec4899;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg-primary);color:var(--text-primary);display:flex;justify-content:center;min-height:100vh;overscroll-behavior:none}
.app{width:100%;max-width:480px;background:var(--bg-secondary);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{background:linear-gradient(180deg,var(--bg-tertiary),var(--bg-secondary));padding:12px 16px;border-bottom:2px solid var(--border-primary);position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;position:relative}
.logo-badge{position:absolute;top:-8px;right:-12px;background:var(--red);color:white;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;-webkit-text-fill-color:white}
.premium-badge{background:linear-gradient(135deg,var(--premium),#be185d);color:white;padding:2px 8px;border-radius:10px;font-size:8px;font-weight:900;margin-left:8px;-webkit-text-fill-color:white;display:inline-block}
.resource-bar{display:flex;gap:8px;flex-wrap:wrap}
.resource{background:var(--bg-card);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;border:1px solid var(--border-secondary);font-family:monospace}
.resource.gold{color:var(--gold)}
.resource.gem{background:linear-gradient(135deg,#4c1d95,#6d28d9);border-color:var(--purple);color:white}
.resource.energy{color:var(--blue)}
.resource span{color:var(--text-primary);font-family:monospace;font-weight:900}
.nav{display:flex;background:var(--bg-tertiary);border-bottom:1px solid var(--border-primary);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{flex:1;min-width:55px;padding:10px 6px;text-align:center;font-weight:800;font-size:10px;cursor:pointer;color:var(--text-muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s;position:relative}
.nav-item.active{color:var(--gold);border-color:var(--gold);background:var(--bg-card)}
.badge-notif{position:absolute;top:2px;right:2px;background:var(--red);color:white;font-size:8px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900}
.content{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:linear-gradient(160deg,var(--bg-card),var(--bg-tertiary));border:2px solid var(--border-secondary);border-radius:14px;padding:8px;text-align:center;position:relative;cursor:pointer;transition:all 0.2s;overflow:hidden}
.card:active{transform:scale(0.95)}
.card.selected{border-color:var(--gold)!important;box-shadow:0 0 20px rgba(250,204,21,0.4);transform:translateY(-2px)}
.rarity-common{border-color:#475569}.rarity-rare{border-color:#60a5fa}.rarity-epic{border-color:#a78bfa}.rarity-legendary{border-color:#facc15;box-shadow:0 0 15px rgba(250,204,21,0.4)}.rarity-mythic{border-color:#f43f5e;box-shadow:0 0 20px rgba(244,63,94,0.5)}
.card-emoji{font-size:32px;display:block;margin:4px 0}
.card-name{font-size:10px;font-weight:900;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:0.5px}
.card-stats{font-size:9px;color:var(--text-secondary);font-weight:600}
.card-level{position:absolute;top:4px;left:4px;background:var(--bg-tertiary);padding:2px 6px;border-radius:6px;font-size:9px;font-weight:900;border:1px solid var(--border-secondary)}
.card-stars{display:flex;gap:2px;justify-content:center;margin-top:3px}
.card-stars span{font-size:9px}
.star-on{color:var(--gold)}.star-off{color:var(--border-secondary)}
.progress-bar{width:100%;height:4px;background:var(--border-secondary);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.hunger-fill{background:var(--green)}.hunger-fill.warning{background:var(--gold-dark)}.hunger-fill.danger{background:var(--red)}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;background:var(--bg-card);color:var(--text-primary);margin:4px 0;transition:all 0.2s}
.btn:active{transform:scale(0.98)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--bg-tertiary)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
.btn-pink{background:linear-gradient(135deg,#ec4899,#db2777);color:white}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.btn-otp{background:linear-gradient(135deg,var(--red),#e11d48);color:white;box-shadow:0 4px 12px rgba(244,63,94,0.3)}
.btn-dark{background:var(--bg-tertiary);border:2px solid var(--border-secondary);color:var(--text-muted)}
.panel{background:var(--bg-tertiary);border:1px solid var(--border-primary);border-radius:12px;padding:12px;margin:8px 0}
.section-title{font-size:14px;font-weight:900;margin:16px 0 8px;color:var(--gold);display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border-primary)}
.premium-banner{background:linear-gradient(135deg,#ec4899,#be185d);border:2px solid var(--premium);border-radius:16px;padding:20px;margin:12px 0;text-align:center;cursor:pointer;transition:0.3s}
.premium-banner:hover{transform:scale(1.02)}
.premium-icon{font-size:48px;margin-bottom:8px}
.premium-title{font-size:18px;font-weight:900;color:white;margin-bottom:4px}
.premium-sub{font-size:11px;color:rgba(255,255,255,0.8)}
.premium-features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.premium-feature{background:rgba(255,255,255,0.1);border-radius:10px;padding:10px;text-align:center;font-size:11px;color:white}
.feature-icon{font-size:24px;display:block;margin-bottom:4px}
.otp-box{background:var(--bg-tertiary);border:3px solid var(--red);border-radius:16px;padding:20px;text-align:center;margin:16px 0;position:relative}
.otp-box::before{content:'🔐 KODE RAHASIA';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--red);color:white;padding:2px 12px;border-radius:10px;font-size:8px;font-weight:900;letter-spacing:2px}
.otp-code{font-size:42px;font-weight:900;color:var(--red);font-family:'Courier New',monospace;letter-spacing:12px;text-shadow:0 0 20px rgba(244,63,94,0.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.otp-timer{font-size:11px;color:var(--text-muted);margin-top:8px}
.otp-info{background:var(--bg-card);border-radius:8px;padding:12px;margin-top:12px;font-size:11px;line-height:1.6;text-align:left}
.otp-step{display:flex;align-items:center;gap:8px;margin:4px 0}
.otp-step-num{width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:white;flex-shrink:0}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal-content{background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:16px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;text-align:center}
.modal-title{font-size:20px;font-weight:900;margin-bottom:12px;color:var(--gold)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-tertiary);border:2px solid var(--green);color:var(--green);padding:12px 24px;border-radius:12px;font-weight:900;font-size:13px;transform:translateY(-100px);opacity:0;transition:all 0.3s;white-space:nowrap}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:var(--red);color:var(--red)}
.diamond-shop{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.diamond-item{background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:0.2s}
.diamond-item:hover{border-color:var(--gold);transform:translateY(-2px)}
.diamond-amount{font-size:28px;font-weight:900;color:var(--purple)}
.diamond-price{font-size:14px;font-weight:700;color:var(--gold);margin-top:4px}
.diamond-badge{background:var(--green);color:white;font-size:9px;padding:2px 6px;border-radius:8px;display:inline-block;margin-top:4px}
.hidden{display:none!important}
.footer{text-align:center;padding:8px;font-size:10px;color:var(--text-muted);background:var(--bg-tertiary);border-top:1px solid var(--border-primary);min-height:36px;display:flex;align-items:center;justify-content:center}
.admin-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
.admin-overlay.active{display:flex}
.admin-panel{background:var(--bg-tertiary);border:2px solid var(--red);border-radius:16px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:20px}
input,select,textarea{width:100%;padding:12px;background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:10px;color:var(--text-primary);font-size:14px;margin:4px 0}
input:focus,select:focus{outline:none;border-color:var(--gold)}
.battle-arena{background:var(--bg-tertiary);border:2px solid var(--border-secondary);border-radius:16px;padding:20px;margin:12px 0;text-align:center}
.battle-log{font-size:11px;color:var(--text-secondary);margin-top:12px;max-height:150px;overflow-y:auto;text-align:left;font-family:monospace;background:#0a0d14;border-radius:8px;padding:8px;line-height:1.6}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-card);border-radius:8px;margin:4px 0;font-size:11px;border-left:3px solid var(--border-secondary)}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo" id="logoBtn">
        ⚡ EVO CARDS v9.4
        <span class="logo-badge">SECURE</span>
      </div>
      <span class="premium-badge hidden" id="premiumBadge">👑 PREMIUM</span>
    </div>
    <div class="resource-bar">
      <div class="resource gold">💰 <span id="goldDisplay">0</span></div>
      <div class="resource gem">💎 <span id="gemDisplay">0</span></div>
      <div class="resource energy">⚡ <span id="energyDisplay">0</span>/<span id="maxEnergyDisplay">0</span></div>
    </div>
  </div>

  <nav class="nav" id="navBar">
    <div class="nav-item active" data-tab="cards">🃏 Kartu</div>
    <div class="nav-item" data-tab="feed">🍖 Feed</div>
    <div class="nav-item" data-tab="breed">🧬 Breed</div>
    <div class="nav-item" data-tab="battle">⚔️ Battle</div>
    <div class="nav-item" data-tab="market">🏪 Pasar</div>
    <div class="nav-item" data-tab="earn">💰 Earn</div>
    <div class="nav-item" data-tab="admin">🏦 Diamond</div>
    <div class="nav-item" data-tab="shop">🛒 Shop</div>
  </nav>

  <main class="content" id="content"></main>
  <div class="footer" id="footerLog">⏳ Loading...</div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-content" id="modalContent"></div></div>
<div class="toast-container" id="toastContainer"></div>

<!-- ADMIN PANEL (POPUP) -->
<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div style="text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--border-primary);">
      <div style="font-size:22px;font-weight:900;color:var(--red);">🔐 PANEL ADMIN</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Verifikasi Transaksi OTP</div>
    </div>
    <div id="adminLoginSection">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:64px;margin:20px 0;">🔒</div>
        <div style="font-size:16px;font-weight:900;margin-bottom:16px;">Autentikasi Diperlukan</div>
        <input type="password" id="adminPasswordInput" placeholder="Masukkan password..." style="text-align:center;font-size:20px;letter-spacing:6px;" maxlength="20">
        <button class="btn btn-otp" id="adminLoginBtn" style="margin-top:12px;">🔓 Buka Panel</button>
        <button class="btn btn-dark" id="adminCloseBtn" style="margin-top:8px;">❌ Tutup</button>
      </div>
    </div>
    <div id="adminDashboardSection" class="hidden">
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;">
        <h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">📨 OTP Aktif</h4>
        <div id="activeOtpList"><p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada OTP aktif</p></div>
      </div>
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;">
        <h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">⏳ Pending</h4>
        <div id="pendingTxList"><p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada transaksi pending</p></div>
      </div>
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;">
        <h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">✅ Verifikasi OTP</h4>
        <input type="text" id="otpVerifyInput" placeholder="6 digit OTP..." style="text-align:center;font-size:18px;letter-spacing:6px;" maxlength="6">
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-green" id="approveOtpBtn" style="flex:1;">✅ Approve</button>
          <button class="btn btn-red" id="rejectOtpBtn" style="flex:1;">❌ Reject</button>
        </div>
      </div>
      <button class="btn btn-red" id="adminLogoutBtn" style="margin-top:12px;">🚪 Logout</button>
    </div>
  </div>
</div>

<script>
// ===== CONFIG =====
var CONFIG = {
  MAX_ENERGY: 20, ENERGY_REGEN_MINUTES: 5, HUNGER_DECAY_MINUTES: 10, HUNGER_DECAY_AMOUNT: 5,
  MAX_BATTLE_DAY: 30, BATTLE_COST: 3, BATTLE_REWARD_BASE: 10,
  EVOLVE_COST: 50, EVOLVE_STARS_REQ: 5, BREED_COST_ENERGY: 3, BREED_MIN_HUNGER: 30,
  OTP_LENGTH: 6, OTP_EXPIRY_MINUTES: 5, ADMIN_PASSWORD: '727277',
  PREMIUM_PRICE: 50, PREMIUM_DURATION_DAYS: 30, PREMIUM_ENERGY_BONUS: 10, PREMIUM_REWARD_BONUS: 0.2,
  DIAMOND_PACKS: [
    { amount: 120, price: 15000, label: '120 💎', badge: '' },
    { amount: 300, price: 35000, label: '300 💎', badge: 'HEMAT' },
    { amount: 600, price: 65000, label: '600 💎', badge: 'BEST VALUE' },
    { amount: 1500, price: 150000, label: '1500 💎', badge: 'WHALE' },
  ],
};

var PETS = [
  { id: 'sprout', name: 'Sprout', emoji: '🌱', rarity: 'common', atk: 8, def: 3, hp: 35, stage: 1 },
  { id: 'bloom', name: 'Bloom', emoji: '🌸', rarity: 'common', atk: 15, def: 6, hp: 55, stage: 2 },
  { id: 'cactus', name: 'Cactus', emoji: '🌵', rarity: 'common', atk: 10, def: 10, hp: 45, stage: 1 },
  { id: 'treant', name: 'Treant', emoji: '🌳', rarity: 'rare', atk: 25, def: 15, hp: 90, stage: 3 },
  { id: 'wolf', name: 'Wolf', emoji: '🐺', rarity: 'rare', atk: 32, def: 10, hp: 75, stage: 2 },
  { id: 'dragon', name: 'Dragon', emoji: '🐉', rarity: 'epic', atk: 45, def: 22, hp: 130, stage: 4 },
  { id: 'phoenix', name: 'Phoenix', emoji: '🔥', rarity: 'epic', atk: 50, def: 18, hp: 120, stage: 3 },
  { id: 'zeus', name: 'Zeus', emoji: '⚡', rarity: 'legendary', atk: 70, def: 25, hp: 150, stage: 4 },
];

var RARITY_WEIGHTS = { common: 50, rare: 30, epic: 15, legendary: 4.5, mythic: 0.5 };

// ===== UTILS =====
function uid() { return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9); }
function txId() { return 'TX' + Date.now().toString(36).toUpperCase(); }
function clamp(val, min, max) { return Math.max(min, Math.min(max, val)); }
function fmtNum(num) { return (num||0).toLocaleString('id-ID'); }
function fmtRp(num) { return 'Rp' + (num||0).toLocaleString('id-ID'); }

// ===== GAME STATE =====
var state = {
  gold: 100, gem: 20, energy: 15, maxEnergy: CONFIG.MAX_ENERGY,
  cards: [], selected: [], market: [], battleCount: 0, battleDate: '',
  premium: false, premiumExpiry: 0, dailyStreak: 0, lastDailyClaim: '',
  totalSpent: 0, totalEarned: 0, txHistory: [], pendingTx: [], otpList: [],
};

// ===== ADMIN =====
var adminLoggedIn = false;
var adminClickCount = 0;
var adminLastClick = 0;

function handleLogoClick() {
  var now = Date.now();
  if (now - adminLastClick > 2000) adminClickCount = 0;
  adminLastClick = now;
  adminClickCount++;
  if (adminClickCount >= 5) {
    adminClickCount = 0;
    openAdminPanel();
  } else if (adminClickCount >= 3) {
    showToast((5 - adminClickCount) + 'x tap lagi untuk Admin Panel', 'warning');
  }
}

function openAdminPanel() {
  document.getElementById('adminOverlay').classList.add('active');
  document.getElementById('adminPasswordInput').value = '';
  document.getElementById('adminLoginSection').classList.remove('hidden');
  document.getElementById('adminDashboardSection').classList.add('hidden');
}

function closeAdminPanel() {
  document.getElementById('adminOverlay').classList.remove('active');
  adminLoggedIn = false;
}

function adminLogin() {
  var pass = document.getElementById('adminPasswordInput').value;
  if (pass === CONFIG.ADMIN_PASSWORD) {
    adminLoggedIn = true;
    document.getElementById('adminLoginSection').classList.add('hidden');
    document.getElementById('adminDashboardSection').classList.remove('hidden');
    refreshAdminDashboard();
  } else {
    showToast('❌ Password salah!', 'error');
  }
}

function adminLogout() {
  adminLoggedIn = false;
  closeAdminPanel();
}

function approveOtp() {
  var input = document.getElementById('otpVerifyInput').value.trim();
  if (input.length !== 6) return showToast('Masukkan 6 digit!', 'error');
  var found = state.otpList.find(function(o) { return o.otp === input && o.status === 'pending'; });
  if (!found) return showToast('OTP tidak ditemukan!', 'error');
  if (Date.now() > found.expiry) return showToast('OTP expired!', 'error');
  found.status = 'approved';
  var pending = state.pendingTx.find(function(t) { return t.id === found.id; });
  if (pending) { pending.status = 'approved'; if (pending.type === 'buy') { state.gem += pending.amount; log('✅ Beli ' + pending.amount + '💎 disetujui!'); } }
  saveState(); refreshAdminDashboard();
  document.getElementById('otpVerifyInput').value = '';
  showToast('✅ Transaksi APPROVED!', 'success');
}

function rejectOtp() {
  var input = document.getElementById('otpVerifyInput').value.trim();
  if (input.length !== 6) return showToast('Masukkan 6 digit!', 'error');
  var found = state.otpList.find(function(o) { return o.otp === input && o.status === 'pending'; });
  if (!found) return showToast('OTP tidak ditemukan!', 'error');
  found.status = 'rejected';
  var pending = state.pendingTx.find(function(t) { return t.id === found.id; });
  if (pending) { pending.status = 'rejected'; if (pending.type === 'sell') state.gem += pending.amount; }
  saveState(); refreshAdminDashboard();
  document.getElementById('otpVerifyInput').value = '';
  showToast('❌ Transaksi DITOLAK', 'error');
}

function refreshAdminDashboard() {
  var activeOTPs = state.otpList.filter(function(o) { return o.status === 'pending' && Date.now() < o.expiry; });
  var otpHTML = '';
  if (activeOTPs.length === 0) otpHTML = '<p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada OTP aktif</p>';
  else activeOTPs.forEach(function(o) { otpHTML += '<div style="padding:8px;background:var(--bg-tertiary);border-radius:8px;margin:4px 0;border-left:3px solid var(--red);"><b>' + o.otp + '</b> | ' + o.type + ' ' + o.amount + '💎 | Rp' + (o.rupiah||0).toLocaleString() + '</div>'; });
  document.getElementById('activeOtpList').innerHTML = otpHTML;

  var pending = state.pendingTx.filter(function(t) { return t.status === 'pending'; });

  if (pending.length === 0) pendHTML = '<p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada transaksi pending</p>';
  else pending.forEach(function(t) { pendHTML += '<div style="padding:8px;background:var(--bg-tertiary);border-radius:8px;margin:4px 0;"><b>' + t.type.toUpperCase() + '</b> ' + t.amount + '💎 | Rp' + (t.rupiah||0).toLocaleString() + '</div>'; });
  document.getElementById('pendingTxList').innerHTML = pendHTML;
}

// ===== SAVE/LOAD =====
function saveState() { localStorage.setItem('evocards_v94', JSON.stringify(state)); }
function log(msg) { document.getElementById('footerLog').textContent = msg; }
function showToast(msg, type) {
  type = type || 'success';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  toast.textContent = msg;
  container.appendChild(toast);
  setTimeout(function() { toast.classList.add('show'); }, 10);
  setTimeout(function() { toast.classList.remove('show'); setTimeout(function() { toast.remove(); }, 300); }, 2500);
}

function updateUI() {
  document.getElementById('goldDisplay').textContent = fmtNum(state.gold);
  document.getElementById('gemDisplay').textContent = fmtNum(state.gem);
  document.getElementById('energyDisplay').textContent = state.energy;
  document.getElementById('maxEnergyDisplay').textContent = state.maxEnergy;
  document.getElementById('premiumBadge').classList.toggle('hidden', !state.premium);
}

function createCard(baseId, level) {
  level = level || 1;
  var base = PETS.find(function(p) { return p.id === baseId; });
  if (!base) return null;
  var mult = 1 + (level - 1) * 0.1;
  return { uid: uid(), baseId: base.id, name: base.name, emoji: base.emoji, rarity: base.rarity, stage: base.stage, level: level, atk: Math.floor(base.atk * mult), def: Math.floor(base.def * mult), hp: Math.floor(base.hp * mult), maxHp: Math.floor(base.hp * mult), stars: 0, hunger: 100, xp: 0 };
}

function spend(g, dm, en, reason) {
  if (state.gold < g || state.gem < dm || state.energy < en) { showToast('❌ Resource tidak cukup!', 'error'); return false; }
  state.gold -= g; state.gem -= dm; state.energy -= en;
  if (dm > 0) state.totalSpent += dm;
  log(reason); updateUI(); saveState(); return true;
}

function earn(g, dm, en, reason) {
  var bonus = state.premium ? CONFIG.PREMIUM_REWARD_BONUS : 0;
  var tg = Math.floor(g * (1 + bonus)), tdm = Math.floor(dm * (1 + bonus));
  state.gold += tg; state.gem += tdm;
  state.energy = Math.min(state.maxEnergy, state.energy + en);
  if (tg > 0 || tdm > 0) showToast('+' + fmtNum(tg) + '💰 +' + tdm + '💎', 'success');
  log(reason); updateUI(); saveState(); return true;
}

// ===== RENDER =====
var currentTab = 'cards';

function renderTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.nav-item').forEach(function(item) { item.classList.toggle('active', item.dataset.tab === tab); });
  var c = document.getElementById('content');
  if (tab === 'cards') renderCards(c);
  else if (tab === 'feed') renderFeed(c);
  else if (tab === 'breed') renderBreed(c);
  else if (tab === 'battle') renderBattle(c);
  else if (tab === 'market') renderMarket(c);
  else if (tab === 'earn') renderEarn(c);
  else if (tab === 'admin') renderAdmin(c);
  else if (tab === 'shop') renderShop(c);
  updateUI();
}

function selectCard(i) {
  var p = state.selected.indexOf(i);
  if (p >= 0) state.selected.splice(p, 1);
  else if (state.selected.length < 2) state.selected.push(i);
  renderTab(currentTab);
}

// ===== ACTIONS =====
function evolveCard() {
  if (state.selected.length !== 1) return;
  var card = state.cards[state.selected[0]];
  if (card.stars < CONFIG.EVOLVE_STARS_REQ) return showToast('Butuh ' + CONFIG.EVOLVE_STARS_REQ + '⭐!', 'error');
  if (!spend(CONFIG.EVOLVE_COST, 0, 0, 'Evolve')) return;
  card.level = Math.min(10, card.level + 1); card.stars = 0; card.hunger = 100;
  var base = PETS.find(function(p) { return p.id === card.baseId; });
  var mult = 1 + (card.level - 1) * 0.1;
  if (base) { card.atk = Math.floor(base.atk * mult); card.def = Math.floor(base.def * mult); card.hp = Math.floor(base.hp * mult); card.maxHp = card.hp; }
  state.selected = []; saveState(); showToast('✨ ' + card.name + ' Lv' + card.level + '!'); renderTab('cards');
}

function sellCards() {
  if (!state.selected.length) return;
  var indices = state.selected.slice().sort(function(a, b) { return b - a; });
  var total = 0;
  indices.forEach(function(i) { total += Math.floor((state.cards[i].atk + state.cards[i].def) / 2); state.cards.splice(i, 1); });
  state.gold += total; state.selected = []; saveState(); showToast('💵 +' + total + '💰'); renderTab('cards');
}

function doFeed(type) {
  var idx = parseInt(document.getElementById('feedTarget')?.value);
  if (isNaN(idx)) return showToast('Pilih pet!', 'warning');
  var card = state.cards[idx];
  var foods = { bread: { cost: 10, hunger: 25, costType: 'gold' }, meat: { cost: 25, hunger: 50, costType: 'gold' }, premium: { cost: 2, hunger: 100, costType: 'gem' } };
  var food = foods[type]; if (!food) return;
  if (food.costType === 'gold' && !spend(food.cost, 0, 0, 'Feed')) return;
  if (food.costType === 'gem' && !spend(0, food.cost, 0, 'Feed')) return;
  card.hunger = Math.min(100, card.hunger + food.hunger);
  if (Math.random() < 0.25) card.stars = Math.min(5, card.stars + 1);
  saveState(); showToast('🍖 ' + card.name + ' +' + food.hunger + '%'); renderTab('feed');
}

function breedCards() {
  if (state.selected.length !== 2) return;
  if (!spend(0, 0, CONFIG.BREED_COST_ENERGY, 'Breed')) return;
  var indices = state.selected.slice().sort(function(a, b) { return b - a; });
  var p1 = state.cards[indices[0]], p2 = state.cards[indices[1]];
  if (p1.hunger < 30 || p2.hunger < 30) return showToast('Kartu terlalu lapar!', 'error');
  state.cards.splice(indices[0], 1); state.cards.splice(indices[1], 1);
  var ns = Math.min(5, Math.max(p1.stage, p2.stage) + 1);
  var pool = PETS.filter(function(p) { return p.stage === ns; });
  var base = pool.length ? pool[Math.floor(Math.random() * pool.length)] : PETS[0];
  var child = createCard(base.id, Math.floor((p1.level + p2.level) / 2));
  state.cards.push(child); state.selected = [];
  saveState(); showToast('🧬 ' + child.emoji + ' ' + child.name + '!'); renderTab('cards');
}

function doBattle() {
  var idx = parseInt(document.getElementById('battleTarget')?.value);
  if (isNaN(idx)) return showToast('Pilih petarung!', 'warning');
  var card = state.cards[idx];
  if (card.hunger < 20) return showToast('Kartu terlalu lapar!', 'error');
  if (!spend(0, 0, CONFIG.BATTLE_COST, 'Battle')) return;
  if (state.battleCount >= CONFIG.MAX_BATTLE_DAY) return showToast('Max ' + CONFIG.MAX_BATTLE_DAY + '/hari!', 'error');
  var playerPower = Math.floor(card.atk * 1.5 + card.def);
  var enemyPower = Math.floor(playerPower * (0.7 + Math.random() * 0.6));
  var pHp = card.hp, eHp = Math.floor(enemyPower * 0.6), round = 0, logs = [];
  while (pHp > 0 && eHp > 0 && round < 20) {
    round++;
    var pd = Math.max(1, Math.floor(card.atk * (0.8 + Math.random() * 0.4)));
    eHp -= pd; logs.push('R' + round + ': ⚔️ -' + pd);
    if (eHp <= 0) break;
    var ed = Math.max(1, Math.floor(enemyPower * 0.3 * (0.7 + Math.random() * 0.6)));
    pHp -= ed; logs.push('R' + round + ': 🛡️ +' + ed);
  }
  var win = pHp > 0;
  var rwG = win ? Math.floor(CONFIG.BATTLE_REWARD_BASE * (1 + card.level * 0.2)) : Math.floor(CONFIG.BATTLE_REWARD_BASE * 0.3);
  var rwDm = win ? Math.floor(1 + card.stars * 0.5) : 0;
  state.battleCount++; card.hunger = Math.max(0, card.hunger - 15);
  earn(rwG, rwDm, 0, win ? 'Menang!' : 'Kalah');
  if (win && Math.random() < 0.3 && card.stars < 5) { card.stars++; log('⭐ Battle Star!'); }
  saveState();
  document.getElementById('battleResult').innerHTML = '<div class="battle-arena" style="border-color:' + (win ? 'var(--green)' : 'var(--red)') + ';margin-top:12px;"><div style="font-size:20px;font-weight:900;color:' + (win ? 'var(--green)' : 'var(--red)') + ';">' + (win ? '🏆 MENANG!' : '💀 KALAH') + '</div><div>+' + rwG + '💰 ' + (rwDm > 0 ? '+' + rwDm + '💎' : '') + '</div><div class="battle-log">' + logs.map(function(l) { return '<div>' + l + '</div>'; }).join('') + '</div></div>';
}

function listToMarket() {
  var price = parseInt(document.getElementById('listPrice')?.value) || 10;
  var indices = state.selected.slice().sort(function(a, b) { return b - a; });
  indices.forEach(function(i) { state.market.push({ ...state.cards[i], price: clamp(price, 1, 999) }); state.cards.splice(i, 1); });
  state.selected = []; saveState(); showToast('📤 Terlisting!'); renderTab('market');
}

function buyFromMarket(i) {
  var item = state.market[i]; if (!item) return;
  if (!spend(0, item.price, 0, 'Beli')) return;
  state.market.splice(i, 1); state.cards.push({ ...item, uid: uid() });
  saveState(); showToast('🛒 Dibeli!'); renderTab('market');
}

function claimDaily() {
  var today = new Date().toDateString();
  if (state.lastDailyClaim === today) return showToast('Sudah diklaim!', 'warning');
  state.dailyStreak = Math.min(7, (state.dailyStreak || 0) + 1);
  state.lastDailyClaim = today;
  var rewards = [50, 75, 100, 150, 200, 300, 500];
  earn(rewards[Math.min(state.dailyStreak - 1, 6)], 0, 0, 'Streak Hari ' + state.dailyStreak);
  saveState(); renderTab('earn');
}

function buyPremium() {
  if (state.gem < CONFIG.PREMIUM_PRICE) return showToast('💎 Butuh ' + CONFIG.PREMIUM_PRICE + '!', 'error');
  state.gem -= CONFIG.PREMIUM_PRICE; state.premium = true;
  state.premiumExpiry = Date.now() + CONFIG.PREMIUM_DURATION_DAYS * 86400000;
  state.maxEnergy = CONFIG.MAX_ENERGY + CONFIG.PREMIUM_ENERGY_BONUS;
  state.energy = state.maxEnergy; state.totalSpent += CONFIG.PREMIUM_PRICE;
  document.getElementById('premiumBadge').classList.remove('hidden');
  saveState(); updateUI(); showToast('👑 Premium Aktif!'); renderTab('shop');
}

function buyDiamond(amount, price) {
  var playerName = prompt('Nama/ID:', 'Player'); if (!playerName) return;
  var otp = Math.floor(100000 + Math.random() * 900000).toString();
  var tId = txId(); var expiry = Date.now() + CONFIG.OTP_EXPIRY_MINUTES * 60000;
  state.otpList.unshift({ id: tId, otp: otp, type: 'buy', amount: amount, rupiah: price, note: playerName, expiry: expiry, status: 'pending' });
  state.pendingTx.unshift({ id: tId, type: 'buy', amount: amount, rupiah: price, note: playerName, status: 'pending', created: Date.now() });
  saveState();
  showModal('🔐 Kode OTP', '<div class="otp-box"><div class="otp-code">' + otp + '</div><div class="otp-timer">⏱️ Berlaku ' + CONFIG.OTP_EXPIRY_MINUTES + ' menit</div></div><div class="otp-info"><div class="otp-step"><span class="otp-step-num">1</span>Transfer <b>' + fmtRp(price) + '</b></div><div class="otp-step"><span class="otp-step-num">2</span>Kirim OTP ke WA Admin</div><div class="otp-step"><span class="otp-step-num">3</span>Tunggu verifikasi</div></div>');
}

function openPack(count, cost) {
  if (state.gem < cost) return showToast('💎 Kurang!', 'error');
  state.gem -= cost; var res = '';
  for (var i = 0; i < count; i++) {
    var r = Math.random() * 100, rarity = 'common', cum = 0;
    for (var rty in RARITY_WEIGHTS) { cum += RARITY_WEIGHTS[rty]; if (r <= cum) { rarity = rty; break; } }
    var pool = PETS.filter(function(p) { return p.rarity === rarity; });
    var base = pool.length ? pool[Math.floor(Math.random() * pool.length)] : PETS[0];
    var card = createCard(base.id); state.cards.push(card);
    res += '<span style="font-size:28px;margin:2px;">' + card.emoji + '</span> ';
  }
  if (count >= 5) {
    var rarePool = PETS.filter(function(p) { return p.rarity === 'epic' || p.rarity === 'legendary'; });
    var bonus = createCard(rarePool[Math.floor(Math.random() * rarePool.length)].id);
    state.cards.push(bonus); res += '<br><b>🎁 Bonus:</b> ' + bonus.emoji + ' ' + bonus.name;
  }
  document.getElementById('packResult').innerHTML = res;
  saveState(); showToast('🎁 ' + count + ' pet!');
}

function showModal(title, body) {
  var overlay = document.getElementById('modalOverlay');
  var content = document.getElementById('modalContent');
  content.innerHTML = '<div class="modal-title">' + title + '</div><div>' + body + '</div><button class="btn btn-primary" style="margin-top:8px;" onclick="document.getElementById(\'modalOverlay\').classList.remove(\'active\')">✅ Tutup</button>';
  overlay.classList.add('active');
  overlay.onclick = function(e) { if (e.target === overlay) overlay.classList.remove('active'); };
}

// ===== INIT =====
function init() {
  var saved = JSON.parse(localStorage.getItem('evocards_v94') || 'null');
  if (saved) { state = Object.assign({}, state, saved); log('✅ Data dimuat'); }
  else { state.cards = [createCard('sprout', 1), createCard('cactus', 1), createCard('sprout', 2)]; saveState(); }
  if (state.premium && Date.now() > state.premiumExpiry) { state.premium = false; state.maxEnergy = CONFIG.MAX_ENERGY; }
  if (state.premium) { state.maxEnergy = CONFIG.MAX_ENERGY + CONFIG.PREMIUM_ENERGY_BONUS; document.getElementById('premiumBadge').classList.remove('hidden'); }
  renderTab('cards'); updateUI();
  setInterval(function() { if (state.energy < state.maxEnergy) { state.energy++; saveState(); updateUI(); } }, CONFIG.ENERGY_REGEN_MINUTES * 60000);
  setInterval(function() { state.cards.forEach(function(c) { if (c.hunger > 0) c.hunger = Math.max(0, c.hunger - CONFIG.HUNGER_DECAY_AMOUNT); }); saveState(); }, CONFIG.HUNGER_DECAY_MINUTES * 60000);
  log('✅ Evo Cards v9.4 siap!');

  // Event listeners
  document.getElementById('logoBtn').addEventListener('click', handleLogoClick);
  document.getElementById('adminLoginBtn').addEventListener('click', adminLogin);
  document.getElementById('adminCloseBtn').addEventListener('click', closeAdminPanel);
  document.getElementById('adminLogoutBtn').addEventListener('click', adminLogout);
  document.getElementById('approveOtpBtn').addEventListener('click', approveOtp);
  document.getElementById('rejectOtpBtn').addEventListener('click', rejectOtp);
  
  // Auto admin via URL
  if (window.location.href.indexOf('?admin=true') >= 0) {
    setTimeout(function() { openAdminPanel(); }, 1000);
  }
}
