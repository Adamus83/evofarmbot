<style>

<script>
// ==================== CONFIG ====================
var ADMIN_CODE = '727277';
var SECRET = 'evo2026' + ADMIN_CODE;

var WA = '6288989727277';
var MAX_BATTLE_PER_DAY = 30;
var MAX_WD_PER_DAY = 500;

// ==================== TELEGRAM ====================
var tg = window.Telegram ? window.Telegram.WebApp : null;
if(tg) { tg.expand(); tg.ready(); }

// ==================== FIREBASE ====================
var db = null;
try {
  firebase.initializeApp({
    apiKey: "AIZaSyC2Gb6WtY1bn05fI_3K9x3",
    authDomain: "evo-farm-game.firebaseapp.com",

  });
  db = firebase.database();
  console.log('✅ Firebase connected');
} catch(e) {
  console.log('⚠️ Firebase offline');
}

// ==================== USER ID ====================
var uid = localStorage.getItem('evo_uid_v7');
if (!uid) {
  uid = 'user_' + Math.random().toString(36).substr(2, 9);
  localStorage.setItem('evo_uid_v7', uid);
}
try {
  if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.id) {
    uid = 'tg_' + tg.initDataUnsafe.user.id;
    localStorage.setItem('evo_uid_v7', uid);
  }
} catch(e) {}

// ==================== ADMIN TAP ====================
var tapCount = 0;
function tapLogo() {
  tapCount++;
  if (tapCount >= 5) {
    document.getElementById('gameApp').classList.add('hidden');
    document.getElementById('adminApp').classList.remove('hidden');
    tapCount = 0;

  }
  setTimeout(function() { tapCount = 0; }, 2000);
}
function closeAdmin() {
  document.getElementById('adminApp').classList.add('hidden');
  document.getElementById('gameApp').classList.remove('hidden');
  updateUI();
}

// ==================== GAME DATA ====================
var PETS = [
  { id: 'sprout', name: 'Sprout', emoji: '🌱', rarity: 'common', atk: 5, def: 2, hp: 30, stage: 1 },
  { id: 'bloom', name: 'Bloom', emoji: '🌸', rarity: 'common', atk: 12, def: 5, hp: 50, stage: 2 },
  { id: 'cactus', name: 'Cactus', emoji: '🌵', rarity: 'common', atk: 8, def: 8, hp: 40, stage: 1 },
  { id: 'treant', name: 'Treant', emoji: '🌳', rarity: 'rare', atk: 22, def: 12, hp: 80, stage: 3 },
  { id: 'wolf', name: 'Wolf', emoji: '🐺', rarity: 'rare', atk: 28, def: 8, hp: 70, stage: 2 },
  { id: 'dragon', name: 'Dragon', emoji: '🐉', rarity: 'epic', atk: 40, def: 18, hp: 120, stage: 4 },
  { id: 'phoenix', name: 'Phoenix', emoji: '🔥', rarity: 'epic', atk: 45, def: 15, hp: 110, stage: 3 },
  { id: 'zeus', name: 'Zeus', emoji: '⚡', rarity: 'legendary', atk: 65, def: 20, hp: 140, stage: 4 }
];

// ==================== STATE ====================
var state = {
  profit: 80,
  diamonds: 30,
  energy: 12,
  maxEnergy: 20,
  cards: [],
  selected: [],
  marketListings: [],
  battleCount: 0,
  battleDate: '',
  wdAmount: 0,
  wdDate: ''
};

function createCard(t, lvl) {
  lvl = lvl || 1;
  var m = 1 + (lvl - 1) * 0.08;
  return {
    id: t.id,
    name: t.name,
    emoji: t.emoji,
    rarity: t.rarity,
    stage: t.stage,
    level: lvl,
    atk: Math.floor(t.atk * m),
    def: Math.floor(t.def * m),
    hp: Math.floor(t.hp * m),
    uid: Math.random().toString(36).slice(2, 9),
    stars: 0,
    hunger: 80
  };
}

// ==================== SAVE / LOAD ====================
function saveData() {
  localStorage.setItem('evoV7', JSON.stringify(state));
  if (db) {
    try { db.ref('users/' + uid).set(state); } catch(e) {}
  }
  updateUI();
}

function loadFromLocal() {
  var local = JSON.parse(localStorage.getItem('evoV7') || 'null');
  if (local) state = local;
}

function fixState() {
  if (!state.cards || state.cards.length === 0) {
    state.cards = [createCard(PETS[0], 2), createCard(PETS[0], 2), createCard(PETS[1], 1), createCard(PETS[2], 1)];
  }
  if (!state.maxEnergy) state.maxEnergy = 20;
  if (state.energy > state.maxEnergy) state.energy = state.maxEnergy;
  if (!state.marketListings) state.marketListings = [];
  if (!state.selected) state.selected = [];
  if (!state.battleDate) state.battleDate = '';
  if (!state.wdDate) state.wdDate = '';
  if (!state.battleCount) state.battleCount = 0;
  if (!state.wdAmount) state.wdAmount = 0;
}

function loadData() {
  if (db) {
    db.ref('users/' + uid).once('value').then(function(snap) {
      if (snap.exists()) {
        state = snap.val();
      } else {
        loadFromLocal();
      }
      fixState();
      saveData();
      finishLoad();
    }).catch(function() {
      loadFromLocal();
      fixState();
      saveData();
      finishLoad();
    });
  } else {
    loadFromLocal();
    fixState();
    saveData();
    finishLoad();
  }
}

function finishLoad() {
  updateUI();
  switchTab('cards', document.querySelector('[data-tab="cards"]'));
  document.getElementById('ct').style.padding = '10px';
}

// ==================== UI ====================
function updateUI() {
  document.getElementById('pf').textContent = state.profit;
  document.getElementById('dm').textContent = state.diamonds;
  document.getElementById('en').textContent = state.energy;
  document.getElementById('me').textContent = state.maxEnergy;
}

function toast(msg) {
  document.getElementById('lg').textContent = msg;
}

// ==================== ENERGY RECHARGE ====================
setInterval(function() {
  if (state.energy < state.maxEnergy) {
    state.energy++;
    saveData();
  }
}, 300000);

// ==================== RATE LIMIT ====================
function canBattle() {
  var today = new Date().toDateString();
  if (state.battleDate !== today) {
    state.battleCount = 0;
    state.battleDate = today;
  }
  if (state.battleCount >= MAX_BATTLE_PER_DAY) return false;
  return true;
}

function canWithdraw() {
  var today = new Date().toDateString();
  if (state.wdDate !== today) {
    state.wdAmount = 0;
    state.wdDate = today;
  }
  if (state.wdAmount >= MAX_WD_PER_DAY) return false;
  return true;
}

// ==================== TAB NAVIGATION ====================
document.getElementById('tabBar').addEventListener('click', function(e) {
  if (e.target.classList.contains('tab')) {
    switchTab(e.target.dataset.tab, e.target);
  }
});

function switchTab(tab, el) {
  var tabs = document.querySelectorAll('.tab');
  for (var i = 0; i < tabs.length; i++) tabs[i].classList.remove('active');
  if (el) el.classList.add('active');
  else {
    var t = document.querySelector('[data-tab="' + tab + '"]');
    if (t) t.classList.add('active');
  }

  var content = document.getElementById('ct');
  if (tab === 'cards') renderCards(content);
  else if (tab === 'breed') content.innerHTML = '<p style="color:#94a3b8;font-size:10px;">Pilih 2 kartu di tab Kartu</p><button class="btn btn-primary" onclick="breedCards()">🧬 Breed (⚡2)</button>';
  else if (tab === 'feed') renderFeed(content);
  else if (tab === 'battle') renderBattle(content);
  else if (tab === 'market') renderMarket(content);
  else if (tab === 'shop') renderShop(content);
}

// ==================== RENDER FUNCTIONS ====================
function renderCards(c) {
  var h = '<p style="font-size:9px;color:#94a3b8;">Total: ' + state.cards.length + ' | Klik (max 2)</p><div class="grid">';
  for (var i = 0; i < state.cards.length; i++) {
    var cd = state.cards[i];
    var sel = state.selected.indexOf(i) >= 0 ? ' selected' : '';
    var sh = '';
    for (var s = 0; s < 5; s++) sh += '<span class="' + (s < (cd.stars || 0) ? 'on' : 'off') + '">' + (s < (cd.stars || 0) ? '⭐' : '☆') + '</span>';
    h += '<div class="card rarity-' + cd.rarity + sel + '" onclick="tapCard(' + i + ')"><div class="lvl">Lv' + cd.level + '</div><div class="emoji">' + cd.emoji + '</div><div class="name">' + cd.name + '</div><div class="stars">' + sh + '</div><div class="stats-row">⚔' + cd.atk + ' 🛡' + cd.def + '</div></div>';
  }
  h += '</div><button class="btn btn-green" onclick="evolveCard()">✨ Evolve (⭐5)</button><button class="btn btn-red" onclick="sellCard()">💵 Sell</button>';
  c.innerHTML = h;
}

function renderFeed(c) {
  var fo = '<option value="">Pilih makhluk...</option>';
  for (var i = 0; i < state.cards.length; i++) fo += '<option value="' + i + '">' + state.cards[i].emoji + ' ' + state.cards[i].name + '</option>';
  c.innerHTML = '<h4>🍖 Feeding</h4><select id="feedTarget">' + fo + '</select><div class="feed-opt"><button class="btn" onclick="doFeed(\'basic\')">🍞 💰5</button><button class="btn btn-primary" onclick="doFeed(\'meat\')">🥩 💰15</button><button class="btn btn-blue" onclick="doFeed(\'premium\')">🍰 💎1</button></div>';
}

function renderBattle(c) {
  var bo = '<option value="">Pilih kartu...</option>';
  for (var i = 0; i < state.cards.length; i++) bo += '<option value="' + i + '">' + state.cards[i].emoji + ' ' + state.cards[i].name + '</option>';
  c.innerHTML = '<h4>⚔️ Battle (' + state.battleCount + '/' + MAX_BATTLE_PER_DAY + ')</h4><select id="battleCard">' + bo + '</select><button class="btn btn-green" onclick="startBattle()">Battle (⚡3)</button><p style="font-size:9px;color:#94a3b8;">Menang +15💰 +2💎 +2⭐</p>';
}

function renderMarket(c) {
  c.innerHTML = '<h4>🏪 Pasar</h4><button class="btn btn-primary" onclick="listToMarket()">📤 Jual</button><input id="marketPrice" type="number" value="10" placeholder="Harga 💎"><div id="marketList">' + getMarketHTML() + '</div>';
}

function renderShop(c) {
  c.innerHTML = '<div class="pack-title">🎁 BOOSTER PACK</div>' +
    '<button class="btn btn-primary" onclick="buyPack(1,10)">🥉 Silver - 10💎 (1 Pet)</button>' +
    '<button class="btn btn-gold" onclick="buyPack(3,25)">🥈 Gold - 25💎 (3 Pet)</button>' +
    '<button class="btn btn-purple" onclick="buyPack(5,50)">🥇 Platinum - 50💎 (5+1 Bonus)</button>' +
    '<div id="packResult" style="text-align:center;margin:6px;font-size:20px"></div>' +
    '<hr style="border-color:#334155;margin:6px 0">' +
    '<button class="btn btn-blue" onclick="buyDiamond()">💰 Beli 120💎 (Rp15K)</button>' +
    '<button class="btn btn-green" onclick="buyEnergy()">⚡ 10 Energi (5💎)</button>' +
    '<button class="btn btn-gold" onclick="buyGold()">🪙 500 Profit (10💎)</button>' +
    '<button class="btn" onclick="redeemCode()">🎟️ Redeem</button>' +
    '<hr style="border-color:#334155;margin:6px 0">' +
    '<button class="btn btn-red" onclick="withdrawDiamond()">💸 WD 💎 → Rp<br><small>100💎 = Rp10K | Max 500/hari</small></button>';
}

// ==================== CARD ACTIONS ====================
function tapCard(i) {
  var p = state.selected.indexOf(i);
  if (p >= 0) state.selected.splice(p, 1);
  else if (state.selected.length < 2) state.selected.push(i);
  renderCards(document.getElementById('ct'));
}

function breedCards() {
  if (state.selected.length !== 2) return toast('⚠️ Pilih 2 kartu!');
  if (state.energy < 2) return toast('⚡ Energi kurang!');
  var s = state.selected.slice().sort(function(a, b)
