<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:#0b0f19;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:480px;background:#151b2b;min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:#0f172a;border-bottom:2px solid #1e293b;position:sticky;top:0;z-index:100}

.tabs{display:flex;background:#0f172a;border-bottom:1px solid #1e293b;overflow-x:auto;scrollbar-width:none}

.card{background:linear-gradient(160deg,#1e293b,#0f172a);border:2px solid;border-radius:14px;padding:8px;text-align:center;position:relative;cursor:pointer;transition:all .2s;overflow:hidden}

.rarity-common{border-color:#475569}.rarity-rare{border-color:#60a5fa;box-shadow:0 0 8px rgba(96,165,250,.2)}.rarity-epic{border-color:#a78bfa;box-shadow:0 0 10px rgba(167,139,250,.3)}.rarity-legendary{border-color:#facc15;box-shadow:0 0 15px rgba(250,204,21,.4)}.rarity-mythic{border-color:#f43f5e;box-shadow:0 0 20px rgba(244,63,94,.5);animation:pulse 2s infinite}

.stats-row{font-size:9px;color:#94a3b8;font-weight:600}.lvl{position:absolute;top:4px;left:4px;background:#0f172a;padding:2px 6px;border-radius:6px;font-size:9px;font-weight:900;border:1px solid #334155}

.btn{width:100%;padding:12px;border:none;border-radius:10px;font-weight:900;font-size:12px;cursor:pointer;background:#334155;color:#e2e8f0;margin:4px 0;transition:all .2s;position:relative;overflow:hidden}

.log{text-align:center;padding:8px;font-size:10px;color:#94a3b8;background:#0f172a;border-top:1px solid #1e293b;font-weight:600;min-height:36px;display:flex;align-items:center;justify-content:center}
.hidden{display:none!important}
.feed-opt{display:flex;gap:6px;margin:6px 0}.feed-opt button{flex:1;padding:10px 4px;font-size:10px}

.referral-box{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px dashed #facc15;border-radius:12px;padding:16px;text-align:center;margin:12px 0}

.battle-arena{background:#0f172a;border:2px solid #334155;border-radius:16px;padding:16px;margin:12px 0;text-align:center;position:relative;overflow:hidden}

@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-10px)}}
.vs{font-size:24px;font-weight:900;color:#ef4444;display:inline-block;vertical-align:middle;animation:pulse 1s infinite}
.battle-log{font-size:11px;color:#94a3b8;margin-top:12px;height:80px;overflow-y:auto;text-align:left;font-family:monospace;background:#0b0f19;border-radius:8px;padding:8px}
.battle-log .dmg{color:#ef4444}.battle-log .heal{color:#22c55e}.battle-log .crit{color:#facc15;font-weight:900}
.ad-banner{background:linear-gradient(135deg,#1e293b,#0f172a);border:2px solid #f59e0b;border-radius:12px;padding:12px;margin:8px 0;text-align:center;cursor:pointer;transition:all .2s}
.ad-banner:hover{transform:translateY(-2px);box-shadow:0 4px 12px rgba(245,158,11,.3)}
.ad-banner .ad-label{font-size:9px;color:#f59e0b;text-transform:uppercase;letter-spacing:1px;font-weight:900;margin-bottom:4px}
.ad-banner .ad-text{font-size:13px;font-weight:700;color:#fff}
.daily-streak{display:flex;justify-content:space-between;margin:12px 0;gap:4px}
.streak-day{flex:1;text-align:center;padding:8px 4px;background:#1e293b;border-radius:8px;font-size:10px;border:2px solid transparent;transition:all .2s}
.streak-day.active{border-color:#facc15;background:#0f172a}.streak-day.claimed{border-color:#22c55e;opacity:.6}.streak-day .day-num{font-weight:900;font-size:12px}.streak-day .day-reward{color:#facc15;font-size:9px}
.leaderboard-item{display:flex;align-items:center;gap:10px;padding:8px;background:#1e293b;border-radius:8px;margin:4px 0;font-size:12px}
.leaderboard-rank{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;font-size:12px;background:#334155;color:#94a3b8}
.leaderboard-rank.gold{background:linear-gradient(135deg,#facc15,#f59e0b);color:#0f172a}.leaderboard-rank.silver{background:linear-gradient(135deg,#94a3b8,#64748b);color:#0f172a}.leaderboard-rank.bronze{background:linear-gradient(135deg,#cd7f32,#a0522d);color:#fff}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:#0f172a;border:2px solid #22c55e;color:#22c55e;padding:12px 24px;border-radius:12px;font-weight:900;font-size:13px;z-index:2000;transition:transform .3s;box-shadow:0 4px 20px rgba(34,197,94,.3)}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:#ef4444;color:#ef4444;box-shadow:0 4px 20px rgba(239,68,68,.3)}
.pack-opening{display:flex;justify-content:center;gap:12px;margin:20px 0;min-height:80px;align-items:center}
.pack-card{font-size:48px;animation:packBounce .6s ease-out}
@keyframes packBounce{0%{transform:scale(0) rotate(-180deg);opacity:0}60%{transform:scale(1.2) rotate(10deg)}100%{transform:scale(1) rotate(0);opacity:1}}
input,select{width:100%;padding:10px;background:#1e293b;border:1px solid #334155;border-radius:8px;color:#fff;font-size:13px;margin:4px 0}
input:focus,select:focus{outline:none;border-color:#facc15}
.pity-counter{font-size:10px;color:#64748b;text-align:center;margin-top:4px}
.version-tag{position:fixed;bottom:4px;right:8px;font-size:9px;color:#334155;font-weight:700;z-index:50}
</style>

<div class="app" id="gameApp">

<script>
// ============================================
// EVO CARDS v9.0 — MONETIZED EDITION
// Architecture: Class-based, modular, anti-cheat ready
// ============================================

const CONFIG = {
  MAX_ENERGY: 20,
  ENERGY_REGEN_MINUTES: 5,
  HUNGER_DECAY_MINUTES: 10,
  HUNGER_DECAY_AMOUNT: 5,
  MAX_BATTLE_DAY: 30,
  BATTLE_COST: 3,
  BATTLE_REWARD_BASE: 10,
  EVOLVE_COST: 50,
  EVOLVE_STARS_REQ: 5,
  BREED_COST_ENERGY: 3,
  BREED_MIN_HUNGER: 30,
  MARKET_TAX_RATE: 0.1,
  AD_REWARD_ENERGY: 5,
  AD_REWARD_GOLD: 25,
  DAILY_STREAK_MAX: 7,
  PITY_LEGENDARY: 50,
  PITY_MYTHIC: 200,
  REFERRAL_REWARD_GEM: 10,
  REFERRAL_REWARD_GOLD: 100,
  QUEST_DAILY_RESET: 24 // hours
};

const PETS_BASE = [
  {id:'sprout',name:'Sprout',emoji:'🌱',rarity:'common',atk:8,def:3,hp:35,stage:1,evoTo:'bloom'},
  {id:'bloom',name:'Bloom',emoji:'🌸',rarity:'common',atk:15,def:6,hp:55,stage:2,evoTo:'treant'},
  {id:'cactus',name:'Cactus',emoji:'🌵',rarity:'common',atk:10,def:10,hp:45,stage:1,evoTo:null},
  {id:'treant',name:'Treant',emoji:'🌳',rarity:'rare',atk:25,def:15,hp:90,stage:3,evoTo:null},
  {id:'wolf',name:'Wolf',emoji:'🐺',rarity:'rare',atk:32,def:10,hp:75,stage:2,evoTo:null},
  {id:'dragon',name:'Dragon',emoji:'🐉',rarity:'epic',atk:45,def:22,hp:130,stage:4,evoTo:null},
  {id:'phoenix',name:'Phoenix',emoji:'🔥',rarity:'epic',atk:50,def:18,hp:120,stage:3,evoTo:null},
  {id:'zeus',name:'Zeus',emoji:'⚡',rarity:'legendary',atk:70,def:25,hp:150,stage:4,evoTo:null},
  {id:'inferno',name:'Inferno',emoji:'👹',rarity:'mythic',atk:95,def:35,hp:200,stage:5,evoTo:null}
];

const RARITY_WEIGHTS = {common:50,rare:30,epic:15,legendary:4.5,mythic:0.5};

class SecurityManager {
  static generateChecksum(obj) {
    const str = JSON.stringify(obj,(k,v)=>{if(k==='checksum')return undefined;return v});
    let hash = 0;
    for(let i=0;i<str.length;i++){const c=str.charCodeAt(i);hash=((hash<<5)-hash)+c;hash|=0}
    return Math.abs(hash).toString(36);
  }
  
  static verifyState(state) {
    if(!state||!state.checksum)return false;
    const expected = this.generateChecksum({...state,checksum:undefined});
    return state.checksum === expected;
  }
  
  static sanitizeState(state) {
    if(!state) return this.getDefaultState();
    // Anti-tamper: clamp values
    state.gold = Math.max(0,Math.min(999999,Math.floor(state.gold||0)));
    state.gem = Math.max(0,Math.min(99999,Math.floor(state.gem||0)));
    state.energy = Math.max(0,Math.min(CONFIG.MAX_ENERGY,Math.floor(state.energy||0)));
    state.maxEnergy = Math.max(10,Math.min(50,Math.floor(state.maxEnergy||CONFIG.MAX_ENERGY)));
    if(!Array.isArray(state.cards))state.cards=[];
    if(!Array.isArray(state.market))state.market=[];
    if(!Array.isArray(state.selected))state.selected=[];
    state.cards.forEach(c=>{
      c.level=Math.max(1,Math.min(10,Math.floor(c.level||1)));
      c.stars=Math.max(0,Math.min(5,Math.floor(c.stars||0)));
      c.hunger=Math.max(0,Math.min(100,Math.floor(c.hunger||100)));
      c.xp=Math.max(0,Math.min(c.level*100,Math.floor(c.xp||0)));
    });
    return state;
  }
  
  static getDefaultState() {
    return {
      gold:100,gem:20,energy:15,maxEnergy:CONFIG.MAX_ENERGY,
      cards:[],selected:[],market:[],
      battleCount:0,battleDate:'',lastEnergyRegen:Date.now(),
      lastHungerDecay:Date.now(),dailyStreak:0,lastDailyClaim:'',
      quests:[],questProgress:{},referralCode:'',referredBy:'',
      referrals:[],totalSpent:0,totalEarned:0,pityCounter:0,
      adWatchedToday:0,adDate:'',version:'9.0'
    };
  }
}

class EconomyManager {
  constructor(game){this.game=game;}
  
  canAfford(gold=0,gem=0,energy=0){
    const s=this.game.state;
    return s.gold>=gold&&s.gem>=gem&&s.energy>=energy;
  }
  
  spend(gold=0,gem=0,energy=0,reason=''){
    const s=this.game.state;
    if(!this.canAfford(gold,gem,energy))return false;
    s.gold-=gold;s.gem-=gem;s.energy-=energy;
    if(gem>0)s.totalSpent+=gem;
    this.game.log(`💸 ${reason}: -${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`);
    return true;
  }
  
  earn(gold=0,gem=0,energy=0,reason=''){
    const s=this.game.state;
    s.gold+=gold;s.gem+=gem;s.energy=Math.min(s.maxEnergy,s.energy+energy);
    if(gold>0)s.totalEarned+=gold;
    this.game.log(`🎉 ${reason}: +${gold>0?gold+'💰':''}${gem>0?gem+'💎':''}${energy>0?energy+'⚡':''}`);
    this.game.showToast(`+${gold+gem+energy>0?gold+'💰':''}${gem>0?gem+'💎':''}`,gem>0?'premium':'');
  }
  
  processMarketTax(price){
    const tax = Math.floor(price*CONFIG.MARKET_TAX_RATE);
    this.game.state.gold+=tax;
    return tax;
  }
}

class CardManager {
  constructor(game){this.game=game;}
  
  createCard(baseId,level=1,bonusStars=0){
    const base = PETS_BASE.find(p=>p.id===baseId);
    if(!base)return null;
    const mult = 1+(level-1)*0.1;
    return {
      uid: 'c_'+Math.random().toString(36).substr(2,9)+'_'+Date.now().toString(36),
      baseId:base.id,name:base.name,emoji:base.emoji,rarity:base.rarity,
      stage:base.stage,level:level,
      atk:Math.floor(base.atk*mult),def:Math.floor(base.def*mult),hp:Math.floor(base.hp*mult),
      maxHp:Math.floor(base.hp*mult),stars:bonusStars,hunger:100,xp:0,
      created:Date.now()
    };
  }
  
  getRarityRoll(){
    const s=this.game.state;
    s.pityCounter++;
    // Pity system for monetization
    if(s.pityCounter>=CONFIG.PITY_MYTHIC){
      s.pityCounter=0;
      return 'mythic';
    }
    if(s.pityCounter>=CONFIG.PITY_LEGENDARY&&Math.random()<0.3){
      s.pityCounter=0;
      return 'legendary';
    }
    const r=Math.random()*100;let cum=0;
    for(const[rar,w]of Object.entries(RARITY_WEIGHTS)){cum+=w;if(r<=cum)return rar}
    return 'common';
  }
  
  openPack(count,costGem,type='silver'){
    if(!this.game.economy.spend(0,costGem,0,`Pack ${type}`))return null;
    const results=[];
    for(let i=0;i<count;i++){
      const rarity=this.getRarityRoll();
      const pool=PETS_BASE.filter(p=>p.rarity===rarity);
      const base=pool.length?pool[Math.floor(Math.random()*pool.length)]:PETS_BASE[0];
      const bonus=Math.random()<0.15?1:0; // 15% chance bonus star
      const card=this.createCard(base.id,1,bonus);
      this.game.state.cards.push(card);
      results.push(card);
    }
    // Bonus card for premium packs
    if(type==='platinum'&&count>=5){
      const rarePool=PETS_BASE.filter(p=>['epic','legendary'].includes(p.rarity));
      const bonusBase=rarePool[Math.floor(Math.random()*rarePool.length)]||PETS_BASE[6];
      const bonusCard=this.createCard(bonusBase.id,Math.floor(Math.random()*2)+2,1);
      this.game.state.cards.push(bonusCard);
      results.push({...bonusCard,isBonus:true});
    }
    return results;
  }
  
  removeByIndex(indices){
    // FIX CRITICAL BUG: Sort descending to avoid index shift
    const sorted=[...indices].sort((a,b)=>b-a);
    const removed=[];
    sorted.forEach(idx=>{
      if(idx>=0&&idx<this.game.state.cards.length){
        removed.push(this.game.state.cards[idx]);
        this.game.state.cards.splice(idx,1);
      }
    });
    return removed;
  }
  
  breed(idx1,idx2){
    const s=this.game.state;
    if(idx1===idx2||idx1<0||idx2<0||idx1>=s.cards.length||idx2>=s.cards.length){
      this.game.log('❌ Pilih 2 kartu berbeda!');
      return null;
    }
    if(!this.game.economy.spend(0,0,CONFIG.BREED_COST_ENERGY,'Breed'))return null;
