<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Evo Cards v9.4 — Premium Shop</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
:root {
  --bg-primary: #0b0f19;
  --bg-secondary: #151b2b;
  --bg-tertiary: #0f172a;
  --bg-card: #1e293b;
  --border-primary: #1e293b;
  --border-secondary: #334155;
  --text-primary: #e2e8f0;
  --text-secondary: #94a3b8;
  --text-muted: #64748b;
  --gold: #facc15;
  --gold-dark: #f59e0b;
  --red: #f43f5e;
  --green: #22c55e;
  --blue: #3b82f6;
  --purple: #8b5cf6;
  --premium: #ec4899;
  --epic: #a78bfa;
  --legendary: #facc15;
  --mythic: #f43f5e;
  --rare: #60a5fa;
  --common: #475569;
}

*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{background:var(--bg-primary);color:var(--text-primary);display:flex;justify-content:center;min-height:100vh;overscroll-behavior:none;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none}
.app{width:100%;max-width:480px;background:var(--bg-secondary);min-height:100vh;display:flex;flex-direction:column;position:relative;overflow:hidden}
.header{background:linear-gradient(180deg,var(--bg-tertiary),var(--bg-secondary));padding:12px 16px;border-bottom:2px solid var(--border-primary);position:sticky;top:0;z-index:100}
.header-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.logo{font-weight:900;font-size:18px;background:linear-gradient(135deg,var(--gold),var(--gold-dark));-webkit-background-clip:text;-webkit-text-fill-color:transparent;cursor:pointer;position:relative}
.logo-badge{position:absolute;top:-8px;right:-12px;background:var(--red);color:white;font-size:8px;padding:1px 4px;border-radius:3px;font-weight:700;-webkit-text-fill-color:white}
.premium-badge{background:linear-gradient(135deg,var(--premium),#be185d);color:white;padding:2px 8px;border-radius:10px;font-size:8px;font-weight:900;margin-left:8px;-webkit-text-fill-color:white;display:inline-block}
.resource-bar{display:flex;gap:8px;flex-wrap:wrap}
.resource{background:var(--bg-card);padding:4px 10px;border-radius:20px;font-size:11px;font-weight:700;display:flex;align-items:center;gap:4px;border:1px solid var(--border-secondary);font-family:monospace}
.resource.gold{color:var(--gold)}
.resource.gem{background:linear-gradient(135deg,#4c1d95,#6d28d9);border-color:var(--purple);color:white}
.resource.energy{color:var(--blue)}
.resource span{color:var(--text-primary);font-family:monospace;font-weight:900}
.nav{display:flex;background:var(--bg-tertiary);border-bottom:1px solid var(--border-primary);overflow-x:auto;scrollbar-width:none}
.nav::-webkit-scrollbar{display:none}
.nav-item{flex:1;min-width:55px;padding:10px 6px;text-align:center;font-weight:800;font-size:10px;cursor:pointer;color:var(--text-muted);border-bottom:3px solid transparent;white-space:nowrap;transition:all 0.2s;position:relative}
.nav-item.active{color:var(--gold);border-color:var(--gold);background:var(--bg-card)}
.badge-notif{position:absolute;top:2px;right:2px;background:var(--red);color:white;font-size:8px;width:16px;height:16px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900}
.content{flex:1;overflow-y:auto;padding:12px;-webkit-overflow-scrolling:touch}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.card{background:linear-gradient(160deg,var(--bg-card),var(--bg-tertiary));border:2px solid var(--border-secondary);border-radius:14px;padding:8px;text-align:center;position:relative;cursor:pointer;transition:all 0.2s;overflow:hidden}
.card:active{transform:scale(0.95)}
.card.selected{border-color:var(--gold)!important;box-shadow:0 0 20px rgba(250,204,21,0.4);transform:translateY(-2px)}
.rarity-common{border-color:var(--common)}.rarity-rare{border-color:var(--rare)}.rarity-epic{border-color:var(--epic)}.rarity-legendary{border-color:var(--legendary);box-shadow:0 0 15px rgba(250,204,21,0.4)}.rarity-mythic{border-color:var(--mythic);box-shadow:0 0 20px rgba(244,63,94,0.5)}
.card-emoji{font-size:32px;display:block;margin:4px 0}
.card-name{font-size:10px;font-weight:900;margin:3px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-transform:uppercase;letter-spacing:0.5px}
.card-stats{font-size:9px;color:var(--text-secondary);font-weight:600}
.card-level{position:absolute;top:4px;left:4px;background:var(--bg-tertiary);padding:2px 6px;border-radius:6px;font-size:9px;font-weight:900;border:1px solid var(--border-secondary)}
.card-stars{display:flex;gap:2px;justify-content:center;margin-top:3px}
.card-stars span{font-size:9px}
.star-on{color:var(--gold)}.star-off{color:var(--border-secondary)}
.progress-bar{width:100%;height:4px;background:var(--border-secondary);border-radius:2px;margin-top:4px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width 0.3s}
.hunger-fill{background:var(--green)}.hunger-fill.warning{background:var(--gold-dark)}.hunger-fill.danger{background:var(--red)}
.btn{width:100%;padding:12px;border:none;border-radius:12px;font-weight:900;font-size:13px;cursor:pointer;background:var(--bg-card);color:var(--text-primary);margin:4px 0;transition:all 0.2s}
.btn:active{transform:scale(0.98)}.btn:disabled{opacity:0.5;cursor:not-allowed}
.btn-primary{background:linear-gradient(135deg,var(--gold),var(--gold-dark));color:var(--bg-tertiary)}
.btn-green{background:linear-gradient(135deg,#22c55e,#16a34a);color:white}
.btn-red{background:linear-gradient(135deg,#ef4444,#dc2626);color:white}
.btn-blue{background:linear-gradient(135deg,#3b82f6,#2563eb);color:white}
.btn-purple{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:white}
.btn-pink{background:linear-gradient(135deg,#ec4899,#db2777);color:white}
.btn-gold{background:linear-gradient(135deg,#f59e0b,#d97706);color:white}
.btn-otp{background:linear-gradient(135deg,var(--red),#e11d48);color:white;box-shadow:0 4px 12px rgba(244,63,94,0.3)}
.btn-dark{background:var(--bg-tertiary);border:2px solid var(--border-secondary);color:var(--text-muted)}
.panel{background:var(--bg-tertiary);border:1px solid var(--border-primary);border-radius:12px;padding:12px;margin:8px 0}
.section-title{font-size:14px;font-weight:900;margin:16px 0 8px;color:var(--gold);display:flex;align-items:center;gap:8px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border-primary)}
.premium-banner{background:linear-gradient(135deg,#ec4899,#be185d);border:2px solid var(--premium);border-radius:16px;padding:20px;margin:12px 0;text-align:center;cursor:pointer;transition:0.3s}
.premium-banner:hover{transform:scale(1.02)}
.premium-icon{font-size:48px;margin-bottom:8px}
.premium-title{font-size:18px;font-weight:900;color:white;margin-bottom:4px}
.premium-sub{font-size:11px;color:rgba(255,255,255,0.8)}
.premium-features{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin:12px 0}
.premium-feature{background:rgba(255,255,255,0.1);border-radius:10px;padding:10px;text-align:center;font-size:11px;color:white}
.feature-icon{font-size:24px;display:block;margin-bottom:4px}
.otp-box{background:var(--bg-tertiary);border:3px solid var(--red);border-radius:16px;padding:20px;text-align:center;margin:16px 0;position:relative}
.otp-box::before{content:'🔐 KODE RAHASIA';position:absolute;top:-10px;left:50%;transform:translateX(-50%);background:var(--red);color:white;padding:2px 12px;border-radius:10px;font-size:8px;font-weight:900;letter-spacing:2px}
.otp-code{font-size:42px;font-weight:900;color:var(--red);font-family:'Courier New',monospace;letter-spacing:12px;text-shadow:0 0 20px rgba(244,63,94,0.6);animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.otp-timer{font-size:11px;color:var(--text-muted);margin-top:8px}
.otp-info{background:var(--bg-card);border-radius:8px;padding:12px;margin-top:12px;font-size:11px;line-height:1.6;text-align:left}
.otp-step{display:flex;align-items:center;gap:8px;margin:4px 0}
.otp-step-num{width:20px;height:20px;background:var(--red);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:900;color:white;flex-shrink:0}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;align-items:center;justify-content:center;z-index:1000;padding:20px;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.active{opacity:1;pointer-events:all}
.modal-content{background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:16px;padding:20px;max-width:360px;width:100%;max-height:80vh;overflow-y:auto;text-align:center}
.modal-title{font-size:20px;font-weight:900;margin-bottom:12px;color:var(--gold)}
.toast-container{position:fixed;top:20px;left:50%;transform:translateX(-50%);z-index:2000;display:flex;flex-direction:column;gap:8px;pointer-events:none}
.toast{background:var(--bg-tertiary);border:2px solid var(--green);color:var(--green);padding:12px 24px;border-radius:12px;font-weight:900;font-size:13px;transform:translateY(-100px);opacity:0;transition:all 0.3s;white-space:nowrap}
.toast.show{transform:translateY(0);opacity:1}
.toast.error{border-color:var(--red);color:var(--red)}
.diamond-shop{display:grid;grid-template-columns:repeat(2,1fr);gap:10px;margin:12px 0}
.diamond-item{background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:14px;padding:16px;text-align:center;cursor:pointer;transition:0.2s}
.diamond-item:hover{border-color:var(--gold);transform:translateY(-2px)}
.diamond-amount{font-size:28px;font-weight:900;color:var(--purple)}
.diamond-price{font-size:14px;font-weight:700;color:var(--gold);margin-top:4px}
.diamond-badge{background:var(--green);color:white;font-size:9px;padding:2px 6px;border-radius:8px;display:inline-block;margin-top:4px}
.hidden{display:none!important}
.footer{text-align:center;padding:8px;font-size:10px;color:var(--text-muted);background:var(--bg-tertiary);border-top:1px solid var(--border-primary);min-height:36px;display:flex;align-items:center;justify-content:center}
.admin-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);z-index:3000;display:none;align-items:center;justify-content:center;padding:20px}
.admin-overlay.active{display:flex}
.admin-panel{background:var(--bg-tertiary);border:2px solid var(--red);border-radius:16px;width:100%;max-width:420px;max-height:90vh;overflow-y:auto;padding:20px}
input,select,textarea{width:100%;padding:12px;background:var(--bg-card);border:2px solid var(--border-secondary);border-radius:10px;color:var(--text-primary);font-size:14px;margin:4px 0}
input:focus,select:focus{outline:none;border-color:var(--gold)}
.battle-arena{background:var(--bg-tertiary);border:2px solid var(--border-secondary);border-radius:16px;padding:20px;margin:12px 0;text-align:center}
.battle-log{font-size:11px;color:var(--text-secondary);margin-top:12px;max-height:150px;overflow-y:auto;text-align:left;font-family:monospace;background:#0a0d14;border-radius:8px;padding:8px;line-height:1.6}
.tx-item{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:var(--bg-card);border-radius:8px;margin:4px 0;font-size:11px;border-left:3px solid var(--border-secondary)}
</style>
</head>
<body>

<div class="app" id="app">
  <div class="header">
    <div class="header-top">
      <div class="logo" id="logoBtn">
        ⚡ EVO CARDS v9.4
        <span class="logo-badge">SECURE</span>
      </div>
      <span class="premium-badge hidden" id="premiumBadge">👑 PREMIUM</span>
    </div>
    <div class="resource-bar">
      <div class="resource gold">💰 <span id="goldDisplay">0</span></div>
      <div class="resource gem">💎 <span id="gemDisplay">0</span></div>
      <div class="resource energy">⚡ <span id="energyDisplay">0</span>/<span id="maxEnergyDisplay">0</span></div>
    </div>
  </div>

  <nav class="nav" id="navBar">
    <div class="nav-item active" data-tab="cards">🃏 Kartu</div>
    <div class="nav-item" data-tab="feed">🍖 Feed</div>
    <div class="nav-item" data-tab="breed">🧬 Breed</div>
    <div class="nav-item" data-tab="battle">⚔️ Battle</div>
    <div class="nav-item" data-tab="market">🏪 Pasar</div>
    <div class="nav-item" data-tab="earn">💰 Earn</div>
    <div class="nav-item" data-tab="admin">
      🏦 Admin
      <span class="badge-notif hidden" id="pendingBadge">0</span>
    </div>
    <div class="nav-item" data-tab="shop">🛒 Shop</div>
  </nav>

  <main class="content" id="content"></main>
  <div class="footer" id="footerLog">⏳ Loading...</div>
</div>

<div class="modal-overlay" id="modalOverlay"><div class="modal-content" id="modalContent"></div></div>
<div class="toast-container" id="toastContainer"></div>

<div class="admin-overlay" id="adminOverlay">
  <div class="admin-panel">
    <div style="text-align:center;margin-bottom:20px;padding-bottom:16px;border-bottom:2px solid var(--border-primary);">
      <div style="font-size:22px;font-weight:900;color:var(--red);">🔐 PANEL ADMIN</div>
      <div style="font-size:11px;color:var(--text-muted);margin-top:4px;">Verifikasi Transaksi OTP</div>
    </div>
    <div id="adminLoginSection">
      <div style="text-align:center;padding:20px;">
        <div style="font-size:64px;margin:20px 0;">🔒</div>
        <div style="font-size:16px;font-weight:900;margin-bottom:16px;">Autentikasi Diperlukan</div>
        <input type="password" id="adminPasswordInput" placeholder="Masukkan password..." style="text-align:center;font-size:20px;letter-spacing:6px;" maxlength="20">
        <button class="btn btn-otp" onclick="Game.instance.admin.login()" style="margin-top:12px;">🔓 Buka Panel</button>
        <button class="btn btn-dark" onclick="Game.instance.admin.close()" style="margin-top:8px;">❌ Tutup</button>
      </div>
    </div>
    <div id="adminDashboardSection" class="hidden">
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;"><h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">📨 OTP Aktif</h4><div id="activeOtpList"></div></div>
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;"><h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">⏳ Pending</h4><div id="pendingTxList"></div></div>
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;"><h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">✅ Verifikasi OTP</h4><input type="text" id="otpVerifyInput" placeholder="6 digit OTP..." style="text-align:center;font-size:18px;letter-spacing:6px;" maxlength="6"><div style="display:flex;gap:8px;margin-top:8px;"><button class="btn btn-green" onclick="Game.instance.admin.approveOtp()" style="flex:1;">✅ Approve</button><button class="btn btn-red" onclick="Game.instance.admin.rejectOtp()" style="flex:1;">❌ Reject</button></div></div>
      <div style="background:var(--bg-card);border-radius:10px;padding:12px;margin:10px 0;"><h4 style="font-size:12px;font-weight:900;color:var(--gold);margin-bottom:8px;">📊 Statistik</h4><div id="adminStats"></div></div>
      <button class="btn btn-red" onclick="Game.instance.admin.logout()" style="margin-top:12px;">🚪 Logout</button>
    </div>
  </div>
</div>

<script>
// ============================================
// EVO CARDS v9.4 — FULL
// ============================================
const CONFIG = Object.freeze({
  MAX_ENERGY: 20, ENERGY_REGEN_MINUTES: 5, HUNGER_DECAY_MINUTES: 10, HUNGER_DECAY_AMOUNT: 5,
  MAX_BATTLE_DAY: 30, BATTLE_COST: 3, BATTLE_REWARD_BASE: 10,
  EVOLVE_COST: 50, EVOLVE_STARS_REQ: 5, BREED_COST_ENERGY: 3, BREED_MIN_HUNGER: 30,
  MARKET_TAX_RATE: 0.1, OTP_LENGTH: 6, OTP_EXPIRY_MINUTES: 5,
  ADMIN_PASSWORD: '727277', ADMIN_BUY_RATE: 15000, ADMIN_SELL_RATE: 10000,
  PREMIUM_PRICE: 50, PREMIUM_DURATION_DAYS: 30, PREMIUM_ENERGY_BONUS: 10, PREMIUM_REWARD_BONUS: 0.2,
  DIAMOND_PACKS: [
    { amount: 120, price: 15000, label: '120 💎', badge: '' },
    { amount: 300, price: 35000, label: '300 💎', badge: 'HEMAT' },
    { amount: 600, price: 65000, label: '600 💎', badge: 'BEST VALUE' },
    { amount: 1500, price: 150000, label: '1500 💎', badge: 'WHALE' },
  ],
});

const PETS = Object.freeze([
  { id: 'sprout', name: 'Sprout', emoji: '🌱', rarity: 'common', atk: 8, def: 3, hp: 35, stage: 1 },
  { id: 'bloom', name: 'Bloom', emoji: '🌸', rarity: 'common', atk: 15, def: 6, hp: 55, stage: 2 },
  { id: 'cactus', name: 'Cactus', emoji: '🌵', rarity: 'common', atk: 10, def: 10, hp: 45, stage: 1 },
  { id: 'treant', name: 'Treant', emoji: '🌳', rarity: 'rare', atk: 25, def: 15, hp: 90, stage: 3 },
  { id: 'wolf', name: 'Wolf', emoji: '🐺', rarity: 'rare', atk: 32, def: 10, hp: 75, stage: 2 },
  { id: 'dragon', name: 'Dragon', emoji: '🐉', rarity: 'epic', atk: 45, def: 22, hp: 130, stage: 4 },
  { id: 'phoenix', name: 'Phoenix', emoji: '🔥', rarity: 'epic', atk: 50, def: 18, hp: 120, stage: 3 },
  { id: 'zeus', name: 'Zeus', emoji: '⚡', rarity: 'legendary', atk: 70, def: 25, hp: 150, stage: 4 },
]);

const RARITY_WEIGHTS = Object.freeze({ common: 50, rare: 30, epic: 15, legendary: 4.5, mythic: 0.5 });

const Utils = {
  uid() { return 'c_' + Date.now().toString(36) + '_' + Math.random().toString(36).substr(2, 9); },
  txId() { return 'TX' + Date.now().toString(36).toUpperCase(); },
  clamp(val, min, max) { return Math.max(min, Math.min(max, val)); },
  formatNumber(num) { return (num||0).toLocaleString('id-ID'); },
  formatRupiah(num) { return 'Rp' + (num||0).toLocaleString('id-ID'); },
};

class Game {
  constructor() {
    this.state = this.getDefaultState();
    this.currentTab = 'cards';
    this.admin = {
      clickCount: 0, lastClickTime: 0, isLoggedIn: false,
      handleLogoClick: () => {
        const now = Date.now();
        if (now - this.lastClickTime > 2000) this.clickCount = 0;
        this.lastClickTime = now; this.clickCount++;
        if (this.clickCount >= 5) { this.clickCount = 0; this.open(); }
      },
      open: () => { document.getElementById('adminOverlay').classList.add('active'); document.getElementById('adminPasswordInput').value = ''; },
      close: () => { document.getElementById('adminOverlay').classList.remove('active'); },
      login: () => {
        if (document.getElementById('adminPasswordInput').value === CONFIG.ADMIN_PASSWORD) {
          this.isLoggedIn = true;
          document.getElementById('adminLoginSection').classList.add('hidden');
          document.getElementById('adminDashboardSection').classList.remove('hidden');
          Game.instance.admin.refreshDashboard();
        } else Game.instance.showToast('❌ Password salah!', 'error');
      },
      logout: () => {
        this.isLoggedIn = false;
        document.getElementById('adminLoginSection').classList.remove('hidden');
        document.getElementById('adminDashboardSection').classList.add('hidden');
        document.getElementById('adminOverlay').classList.remove('active');
      },
      approveOtp: () => {
        const input = document.getElementById('otpVerifyInput').value.trim();
        if (input.length !== 6) return Game.instance.showToast('Masukkan 6 digit OTP!', 'error');
        const found = Game.instance.state.otpList.find(o => o.otp === input && o.status === 'pending');
        if (!found) return Game.instance.showToast('OTP tidak ditemukan!', 'error');
        if (Date.now() > found.expiry) return Game.instance.showToast('OTP expired!', 'error');
        found.status = 'approved';
        const pending = Game.instance.state.pendingTx.find(t => t.id === found.id);
        if (pending) { pending.status = 'approved'; if (pending.type === 'buy') { Game.instance.state.gem += pending.amount; Game.instance.log(`✅ Beli ${pending.amount}💎 disetujui!`); } }
        Game.instance.saveState(); Game.instance.admin.refreshDashboard();
        document.getElementById('otpVerifyInput').value = '';
        Game.instance.showToast('✅ Transaksi APPROVED!', 'success');
      },
      rejectOtp: () => {
        const input = document.getElementById('otpVerifyInput').value.trim();
        if (input.length !== 6) return Game.instance.showToast('Masukkan 6 digit OTP!', 'error');
        const found = Game.instance.state.otpList.find(o => o.otp === input && o.status === 'pending');
        if (!found) return Game.instance.showToast('OTP tidak ditemukan!', 'error');
        found.status = 'rejected';
        const pending = Game.instance.state.pendingTx.find(t => t.id === found.id);
        if (pending) { pending.status = 'rejected'; if (pending.type === 'sell') Game.instance.state.gem += pending.amount; }
        Game.instance.saveState(); Game.instance.admin.refreshDashboard();
        document.getElementById('otpVerifyInput').value = '';
        Game.instance.showToast('❌ Transaksi DITOLAK', 'error');
      },
      refreshDashboard: () => {
        const activeOTPs = Game.instance.state.otpList.filter(o => o.status === 'pending' && Date.now() < o.expiry);
        document.getElementById('activeOtpList').innerHTML = activeOTPs.length === 0 ? '<p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada OTP aktif</p>' : activeOTPs.map(o => `<div style="padding:8px;background:var(--bg-tertiary);border-radius:8px;margin:4px 0;border-left:3px solid var(--red);"><b>${o.otp}</b> | ${o.type} ${o.amount}💎 | Rp${(o.rupiah||0).toLocaleString()}</div>`).join('');
        const pending = Game.instance.state.pendingTx.filter(t => t.status === 'pending');
        document.getElementById('pendingTxList').innerHTML = pending.length === 0 ? '<p style="font-size:11px;color:var(--text-muted);text-align:center;">Tidak ada transaksi pending</p>' : pending.map(t => `<div style="padding:8px;background:var(--bg-tertiary);border-radius:8px;margin:4px 0;"><b>${t.type.toUpperCase()}</b> ${t.amount}💎 | Rp${(t.rupiah||0).toLocaleString()}</div>`).join('');
        const totalApproved = Game.instance.state.otpList.filter(o => o.status === 'approved').length;
        const totalVolume = Game.instance.state.otpList.filter(o => o.status === 'approved').reduce((s, o) => s + (o.rupiah || 0), 0);
        document.getElementById('adminStats').innerHTML = `✅ Approved: <b>${totalApproved}</b> | 💰 Volume: <b>Rp${totalVolume.toLocaleString()}</b>`;
      },
    };
  }

  getDefaultState() {
    return {
      gold: 100, gem: 20, energy: 15, maxEnergy: CONFIG.MAX_ENERGY,
      cards: [], selected: [], market: [], battleCount: 0, battleDate: '',
      premium: false, premiumExpiry: 0, dailyStreak: 0, lastDailyClaim: '',
      totalSpent: 0, totalEarned: 0, txHistory: [], pendingTx: [], otpList: [],
    };
  }

  init() {
    const saved = JSON.parse(localStorage.getItem('evocards_v94') || 'null');
    if (saved) { this.state = { ...this.getDefaultState(), ...saved }; this.log('✅ Data dimuat'); }
    else { this.state.cards = [this.createCard('sprout', 1), this.createCard('cactus', 1), this.createCard('sprout', 2)]; this.saveState(); }
    if (this.state.premium && Date.now() > this.state.premiumExpiry) { this.state.premium = false; this.state.maxEnergy = CONFIG.MAX_ENERGY; }
    if (this.state.premium) { this.state.maxEnergy = CONFIG.MAX_ENERGY + CONFIG.PREMIUM_ENERGY_BONUS; document.getElementById('premiumBadge').classList.remove('hidden'); }
    this.renderTab('cards'); this.updateUI();
    setInterval(() => { if (this.state.energy < this.state.maxEnergy) { this.state.energy++; this.saveState(); this.updateUI(); } }, CONFIG.ENERGY_REGEN_MINUTES * 60000);
    setInterval(() => { this.state.cards.forEach(c => { if (c.hunger > 0) c.hunger = Math.max(0, c.hunger - CONFIG.HUNGER_DECAY_AMOUNT); }); this.saveState(); }, CONFIG.HUNGER_DECAY_MINUTES * 60000);
    this.log('✅ Evo Cards v9.4 siap!');
  }

  createCard(baseId, level = 1) {
    const base = PETS.find(p => p.id === baseId);
    if (!base) return null;
    const mult = 1 + (level - 1) * 0.1;
    return { uid: Utils.uid(), baseId: base.id, name: base.name, emoji: base.emoji, rarity: base.rarity, stage: base.stage, level, atk: Math.floor(base.atk * mult), def: Math.floor(base.def * mult), hp: Math.floor(base.hp * mult), maxHp: Math.floor(base.hp * mult), stars: 0, hunger: 100, xp: 0 };
  }

  saveState() { localStorage.setItem('evocards_v94', JSON.stringify(this.state)); }
  log(msg) { document.getElementById('footerLog').textContent = msg; }
  showToast(msg, type = 'success') {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast ${type}`; toast.textContent = msg;
    container.appendChild(toast);
    requestAnimationFrame(() => toast.classList.add('show'));
    setTimeout(() => { toast.classList.remove('show'); setTimeout(() => toast.remove(), 300); }, 2500);
  }
  updateUI() {
    document.getElementById('goldDisplay').textContent = Utils.formatNumber(this.state.gold);
    document.getElementById('gemDisplay').textContent = Utils.formatNumber(this.state.gem);
    document.getElementById('energyDisplay').textContent = this.state.energy;
    document.getElementById('maxEnergyDisplay').textContent = this.state.maxEnergy;
    document.getElementById('premiumBadge').classList.toggle('hidden', !this.state.premium);
  }
  showModal(title, body, buttons = [{ text: 'Tutup', style: 'dark', onClick: () => {} }]) {
    const overlay = document.getElementById('modalOverlay');
    const content = document.getElementById('modalContent');
    content.innerHTML = `<div class="modal-title">${title}</div><div>${body}</div>${buttons.map(b => `<button class="btn btn-${b.style||'primary'}" style="margin-top:8px;">${b.text}</button>`).join('')}`;
    overlay.classList.add('active');
    overlay.onclick = (e) => { if (e.target === overlay) overlay.classList.remove('active'); };
    buttons.forEach((b, i) => { const btn = content.querySelectorAll('button')[i]; if (btn) btn.onclick = () => { overlay.classList.remove('active'); if (b.onClick) b.onClick(); }; });
  }

  spend(g, dm, en, reason) {
    if (this.state.gold < g || this.state.gem < dm || this.state.energy < en) { this.showToast('❌ Resource tidak cukup!', 'error'); return false; }
    this.state.gold -= g; this.state.gem -= dm; this.state.energy -= en;
    if (dm > 0) this.state.totalSpent += dm;
    this.log(`${reason}`); this.updateUI(); this.saveState(); return true;
  }
  earn(g, dm, en, reason) {
    const bonus = this.state.premium ? CONFIG.PREMIUM_REWARD_BONUS : 0;
    const tg = Math.floor(g * (1 + bonus)), tdm = Math.floor(dm * (1 + bonus));
    this.state.gold += tg; this.state.gem += tdm;
    this.state.energy = Math.min(this.state.maxEnergy, this.state.energy + en);
    if (tg > 0 || tdm > 0) this.showToast(`+${Utils.formatNumber(tg)}💰 +${tdm}💎`, 'success');
    this.log(`${reason}`); this.updateUI(); this.saveState(); return true;
  }

  selectCard(i) { const p = this.state.selected.indexOf(i); if (p >= 0) this.state.selected.splice(p, 1); else if (this.state.selected.length < 2) this.state.selected.push(i); this.renderTab(this.currentTab); }

        h += `<div style="display:flex;gap:8px;margin-top:8px;"><button class="btn" onclick="Game.instance.doFeed('bread')">🍞 10💰</button><button class="btn btn-primary" onclick="Game.instance.doFeed('meat')">🥩 25💰</button><button class="btn btn-blue" onclick="Game.instance.doFeed('premium')">🍰 2💎</button></div>`;

        if (s.selected.length === 2) { const c1=s.cards[s.selected[0]],c2=s.cards[s.selected[1]]; h += `<div style="display:flex;justify-content:center;align-items:center;gap:20px;margin:20px 0;"><div style="text-align:center;"><div style="font-size:48px;">${c1.emoji}</div><div>${c1.name}</div></div><div style="font-size:28px;color:var(--gold);">+</div><div style="text-align:center;"><div style="font-size:48px;">${c2.emoji}</div><div>${c2.name}</div></div></div>`; }
        h += `<button class="btn btn-purple" onclick="Game.instance.breedCards()" ${s.selected.length!==2?'disabled':''}>🧬 Breed! (${CONFIG.BREED_COST_ENERGY}⚡)</button>`;
        c.innerHTML = h;
      },
      battle: () => {
        const s = this.state;
        const today = new Date().toDateString();

        let h = `<div class="section-title">⚔️ Battle Arena</div><div class="panel" style="display:flex;justify-content:space-around;text-align:center;"><div><div style="font-size:20px;font-weight:900;color:var(--gold);">${s.battleCount}/${CONFIG.MAX_BATTLE_DAY}</div><div style="font-size:10px;color:var(--text-muted);">Battle Hari Ini</div></div><div><div style="font-size:20px;font-weight:900;">${CONFIG.BATTLE_COST}⚡</div><div style="font-size:10px;color:var(--text-muted);">Biaya</div></div></div>`;
        if (s.cards.length) h += `<select id="battleTarget"><option value="">Pilih petarung...</option>${s.cards.map((cd,i)=>`<option value="${i}">${cd.emoji} ${cd.name} (⚔${cd.atk})</option>`).join('')}</select><button class="btn btn-green" onclick="Game.instance.doBattle()">⚔️ Bertarung! (${CONFIG.BATTLE_COST}⚡)</button><div id="battleResult"></div>`;
        else h += '<p style="text-align:center;padding:40px;color:var(--text-muted);">Tidak ada kartu!</p>';
        c.innerHTML = h;
      },
      market: () => {
        const s = this.state;
        let h = `<div class="section-title">🏪 Pasar</div><div class="panel"><p style="font-size:11px;color:var(--text-muted);">Jual kartu dengan 💎. Tax: ${CONFIG.MARKET_TAX_RATE*100}%</p></div>`;
        if (s.selected.length) h += `<input type="number" id="listPrice" placeholder="Harga 💎..." value="10"><button class="btn btn-primary" onclick="Game.instance.listToMarket()">📤 List ${s.selected.length} Kartu</button>`;
        h += `<div class="section-title" style="font-size:12px;">📦 Listing (${s.market.length})</div>`;
        if (!s.market.length) h += '<p style="text-align:center;color:var(--text-muted);padding:20px;">Market kosong.</p>';
        else s.market.forEach((item, i) => { h += `<div class="tx-item"><div><span style="font-size:20px;">${item.emoji}</span> <b>${item.name}</b> Lv${item.level}</div><div style="text-align:right;"><div style="color:var(--purple);font-weight:900;">${item.price}💎</div><button class="btn btn-green" style="padding:4px 12px;font-size:10px;width:auto;" onclick="Game.instance.buyFromMarket(${i})">Beli</button></div></div>`; });
        c.innerHTML = h;
      },
      earn: () => {
        const s = this.state;
        const today = new Date().toDateString();
        const canClaim = s.lastDailyClaim !== today;
        let h = `<div class="section-title">💰 Earn</div><div class="section-title" style="font-size:12px;">🔥 Daily Streak</div><div style="display:flex;gap:4px;margin:8px 0;">${Array.from({length:7},(_,i)=>{const day=i+1,isToday=day===(s.dailyStreak||1),claimed=day<(s.dailyStreak||1),rewards=[50,75,100,150,200,300,500];return`<div style="flex:1;text-align:center;padding:8px 4px;background:var(--bg-card);border-radius:8px;font-size:10px;border:2px solid ${isToday?'var(--gold)':claimed?'var(--green)':'transparent'};opacity:${claimed?0.6:1};"><div style="font-weight:900;">D${day}</div><div style="color:var(--gold);font-size:9px;">${rewards[i]}💰</div></div>`}).join('')}</div><button class="btn btn-gold" onclick="Game.instance.claimDaily()" ${!canClaim?'disabled':''}>🔥 Klaim Daily</button>`;
        c.innerHTML = h;
      },
      admin: () => {
        let h = `<div class="section-title">🏦 Admin Market</div><div class="diamond-shop">${CONFIG.DIAMOND_PACKS.map(p=>`<div class="diamond-item" onclick="Game.instance.buyDiamond(${p.amount},${p.price})"><div class="diamond-amount">${p.label}</div><div class="diamond-price">${Utils.formatRupiah(p.price)}</div>${p.badge?`<div class="diamond-badge">${p.badge}</div>`:''}</div>`).join('')}</div>`;
        c.innerHTML = h;
      },
      shop: () => {
        const s = this.state;
        let h = '<div class="section-title">🛒 Premium Shop</div>';
        if (!s.premium) h += `<div class="premium-banner" onclick="Game.instance.buyPremium()"><div class="premium-icon">👑</div><div class="premium-title">PREMIUM</div><div class="premium-sub">${CONFIG.PREMIUM_PRICE}💎/${CONFIG.PREMIUM_DURATION_DAYS} hari</div><div class="premium-features"><div class="premium-feature"><span class="feature-icon">⚡</span>+${CONFIG.PREMIUM_ENERGY_BONUS} Energy</div><div class="premium-feature"><span class="feature-icon">💎</span>+${CONFIG.PREMIUM_REWARD_BONUS*100}% Reward</div></div><div style="margin-top:8px;font-weight:900;">TAP UNTUK AKTIFKAN</div></div>`;
        else { const days = Math.ceil((s.premiumExpiry - Date.now())/86400000); h += `<div class="premium-banner" style="opacity:0.8;cursor:default;"><div class="premium-icon">👑</div><div class="premium-title">PREMIUM AKTIF</div><div class="premium-sub">${days} hari tersisa</div></div>`; }
        h += '<div class="section-title">💎 Beli Diamond</div><div class="diamond-shop">';
        CONFIG.DIAMOND_PACKS.forEach(p => { h += `<div class="diamond-item" onclick="Game.instance.buyDiamond(${p.amount},${p.price})"><div class="diamond-amount">${p.label}</div><div class="diamond-price">${Utils.formatRupiah(p.price)}</div>${p.badge?`<div class="diamond-badge">${p.badge}</div>`:''}</div>`; });

        h += '<button class="btn btn-gold" onclick="Game.instance.openPack(3,25)">🥈 Gold (3) 25💎</button>';
        h += '<button class="btn btn-purple" onclick="Game.instance.openPack(5,50)">🥇 Platinum (5+1) 50💎</button>';

  evolveCard() {
    if (this.state.selected.length !== 1) return;
    const card = this.state.cards[this.state.selected[0]];
    if (card.stars < CONFIG.EVOLVE_STARS_REQ) return this.showToast(`Butuh ${CONFIG.EVOLVE_STARS_REQ}⭐!`, 'error');
    if (!this.spend(CONFIG.EVOLVE_COST, 0, 0, 'Evolve')) return;
    card.level = Math.min(10, card.level + 1); card.stars = 0; card.hunger = 100;
    const base = PETS.find(p => p.id === card.baseId);
    const mult = 1 + (card.level - 1) * 0.1;
    if (base) { card.atk = Math.floor(base.atk * mult); card.def = Math.floor(base.def * mult); card.hp = Math.floor(base.hp * mult); card.maxHp = card.hp; }
    this.state.selected = []; this.saveState(); this.showToast(`✨ ${card.name} Lv${card.level}!`); this.renderTab('cards');
  }
  sellCards() {
    if (!this.state.selected.length) return;
    const indices = [...this.state.selected].sort((a,b)=>b-a); let total = 0;
    indices.forEach(i => { total += Math.floor((this.state.cards[i].atk + this.state.cards[i].def) / 2); this.state.cards.splice(i, 1); });
    this.state.gold += total; this.state.selected = []; this.saveState(); this.showToast(`💵 +${total}💰`); this.renderTab('cards');
  }
  doFeed(type) {
    const idx = parseInt(document.getElementById('feedTarget')?.value);
    if (isNaN(idx)) return this.showToast('Pilih pet!', 'warning');
    const card = this.state.cards[idx];
    const foods = { bread: { cost: 10, hunger: 25, costType: 'gold' }, meat: { cost: 25, hunger: 50, costType: 'gold' }, premium: { cost: 2, hunger: 100, costType: 'gem' } };
    const food = foods[type]; if (!food) return;
    if (food.costType === 'gold' && !this.spend(food.cost, 0, 0, 'Feed')) return;
    if (food.costType === 'gem' && !this.spend(0, food.cost, 0, 'Feed')) return;
    card.hunger = Math.min(100, card.hunger + food.hunger);
    if (Math.random() < 0.25) card.stars = Math.min(5, card.stars + 1);
    this.saveState(); this.showToast(`🍖 ${card.name} +${food.hunger}%`); this.renderTab('feed');
  }
  breedCards() {
    if (this.state.selected.length !== 2) return;
    if (!this.spend(0, 0, CONFIG.BREED_COST_ENERGY, 'Breed')) return;
    const [i1, i2] = [...this.state.selected].sort((a,b)=>b-a);
    const p1 = this.state.cards[i1], p2 = this.state.cards[i2];
    if (p1.hunger < 30 || p2.hunger < 30) return this.showToast('Kartu terlalu lapar!', 'error');
    this.state.cards.splice(i1, 1); this.state.cards.splice(i2, 1);
    const ns = Math.min(5, Math.max(p1.stage, p2.stage) + 1);
    const pool = PETS.filter(p => p.stage === ns);
    const base = pool.length ? pool[Math.floor(Math.random()*pool.length)] : PETS[0];
    const child = this.createCard(base.id, Math.floor((p1.level+p2.level)/2));
    this.state.cards.push(child); this.state.selected = [];
    this.saveState(); this.showToast(`🧬 ${child.emoji} ${child.name}!`); this.renderTab('cards');
  }
  doBattle() {
    const idx = parseInt(document.getElementById('battleTarget')?.value);
    if (isNaN(idx)) return this.showToast('Pilih petarung!', 'warning');
    const card = this.state.cards[idx];
    if (card.hunger < 20) return this.showToast('Kartu terlalu lapar!', 'error');
    if (!this.spend(0, 0, CONFIG.BATTLE_COST, 'Battle')) return;
    if (this.state.battleCount >= CONFIG.MAX_BATTLE_DAY) return this.showToast(`Max ${CONFIG.MAX_BATTLE_DAY}/hari!`, 'error');
    const playerPower = Math.floor(card.atk * 1.5 + card.def);
    const enemyPower = Math.floor(playerPower * (0.7 + Math.random() * 0.6));
    let pHp = card.hp, eHp = Math.floor(enemyPower * 0.6), round = 0, logs = [];
    while (pHp > 0 && eHp > 0 && round < 20) {
      round++;
      let pd = Math.max(1, Math.floor(card.atk * (0.8 + Math.random() * 0.4)));
      eHp -= pd; logs.push(`R${round}: ⚔️ -${pd}`);
      if (eHp <= 0) break;
      let ed = Math.max(1, Math.floor(enemyPower * 0.3 * (0.7 + Math.random() * 0.6)));
      pHp -= ed; logs.push(`R${round}: 🛡️ +${ed}`);
    }
    const win = pHp > 0;
    const rwG = win ? Math.floor(CONFIG.BATTLE_REWARD_BASE * (1 + card.level * 0.2)) : Math.floor(CONFIG.BATTLE_REWARD_BASE * 0.3);
    const rwDm = win ? Math.floor(1 + card.stars * 0.5) : 0;
    this.state.battleCount++; card.hunger = Math.max(0, card.hunger - 15);
    this.earn(rwG, rwDm, 0, win ? 'Menang!' : 'Kalah');
    if (win && Math.random() < 0.3 && card.stars < 5) { card.stars++; this.log(`⭐ Battle Star!`); }
    this.saveState();
    document.getElementById('battleResult').innerHTML = `<div class="battle-arena" style="border-color:${win?'var(--green)':'var(--red)'};margin-top:12px;"><div style="font-size:20px;font-weight:900;color:${win?'var(--green)':'var(--red)'};">${win?'🏆 MENANG!':'💀 KALAH'}</div><div>+${rwG}💰 ${rwDm>0?'+'+rwDm+'💎':''}</div><div class="battle-log">${logs.map(l=>`<div>${l}</div>`).join('')}</div></div>`;
  }
  listToMarket() {
    const price = parseInt(document.getElementById('listPrice')?.value) || 10;
    const indices = [...this.state.selected].sort((a,b)=>b-a);
    indices.forEach(i => { this.state.market.push({...this.state.cards[i],price:Utils.clamp(price,1,999)}); this.state.cards.splice(i,1); });
    this.state.selected = []; this.saveState(); this.showToast('📤 Terlisting!'); this.renderTab('market');
  }
  buyFromMarket(i) {
    const item = this.state.market[i]; if (!item) return;
    if (!this.spend(0, item.price, 0, 'Beli')) return;
    this.state.market.splice(i, 1); this.state.cards.push({...item,uid:Utils.uid()});
    this.saveState(); this.showToast('🛒 Dibeli!'); this.renderTab('market');
  }
  claimDaily() {
    const today = new Date().toDateString();
    if (this.state.lastDailyClaim === today) return this.showToast('Sudah diklaim!', 'warning');
    this.state.dailyStreak = Math.min(7, (this.state.dailyStreak || 0) + 1);
    this.state.lastDailyClaim = today;
    const rewards = [50, 75, 100, 150, 200, 300, 500];
    this.earn(rewards[Math.min(this.state.dailyStreak - 1, 6)], 0, 0, `Streak Hari ${this.state.dailyStreak}`);
    this.saveState(); this.renderTab('earn');
  }
  buyPremium() {
    if (this.state.gem < CONFIG.PREMIUM_PRICE) return this.showToast(`💎 Butuh ${CONFIG.PREMIUM_PRICE}!`, 'error');
    this.state.gem -= CONFIG.PREMIUM_PRICE; this.state.premium = true;
    this.state.premiumExpiry = Date.now() + CONFIG.PREMIUM_DURATION_DAYS * 86400000;
    this.state.maxEnergy = CONFIG.MAX_ENERGY + CONFIG.PREMIUM_ENERGY_BONUS;
    this.state.energy = this.state.maxEnergy; this.state.totalSpent += CONFIG.PREMIUM_PRICE;
    document.getElementById('premiumBadge').classList.remove('hidden');
    this.saveState(); this.updateUI(); this.showToast('👑 Premium Aktif!'); this.renderTab('shop');
  }
  buyDiamond(amount, price) {
    const playerName = prompt('Nama/ID:', 'Player'); if (!playerName) return;
    const otp = Math.floor(100000 + Math.random() * 900000).toString();
    const txId = Utils.txId(); const expiry = Date.now() + CONFIG.OTP_EXPIRY_MINUTES * 60000;
    this.state.otpList.unshift({ id: txId, otp, type: 'buy', amount, rupiah: price, note: playerName, expiry, status: 'pending' });
    this.state.pendingTx.unshift({ id: txId, type: 'buy', amount, rupiah: price, note: playerName, status: 'pending', created: Date.now() });
    this.saveState();
    this.showModal('🔐 Kode OTP', `<div class="otp-box"><div class="otp-code">${otp}</div><div class="otp-timer">⏱️ Berlaku ${CONFIG.OTP_EXPIRY_MINUTES} menit</div></div><div class="otp-info"><div class="otp-step"><span class="otp-step-num">1</span>Transfer <b>${Utils.formatRupiah(price)}</b></div><div class="otp-step"><span class="otp-step-num">2</span>Kirim OTP ke WA Admin</div><div class="otp-step"><span class="otp-step-num">3</span>Tunggu verifikasi</div></div>`, [{ text: '✅ Mengerti', style: 'green', onClick: () => {} }]);
  }
  openPack(count, cost) {
    if (this.state.gem < cost) return this.showToast('💎 Kurang!', 'error');
    this.state.gem -= cost; let res = '';
    for (let i = 0; i < count; i++) {
      const r = Math.random() * 100; let rarity = 'common', cum = 0;
      for (const [rty, w] of Object.entries(RARITY_WEIGHTS)) { cum += w; if (r <= cum) { rarity = rty; break; } }
      const pool = PETS.filter(p => p.rarity === rarity);
      const base = pool.length ? pool[Math.floor(Math.random()*pool.length)] : PETS[0];
      const card = this.createCard(base.id); this.state.cards.push(card);
      res += `<span style="font-size:28px;margin:2px;">${card.emoji}</span>`;
    }
    if (count >= 5) {
      const rarePool = PETS.filter(p => ['epic','legendary'].includes(p.rarity));
      const bonus = this.createCard(rarePool[Math.floor(Math.random()*rarePool.length)].id);
      this.state.cards.push(bonus); res += `<br><b>🎁 Bonus:</b> ${bonus.emoji} ${bonus.name}`;
    }
    document.getElementById('packResult').innerHTML = res;
    this.saveState(); this.showToast(`🎁 ${count} pet!`);
  }
}

  const game = new Game(); Game.instance = game;
  document.getElementById('navBar').addEventListener('click', (e) => { const tab = e.target.closest('.nav-item'); if (tab) game.renderTab(tab.dataset.tab); });
  document.getElementById('logoBtn').addEventListener('click', () => game.admin.handleLogoClick());
  document.getElementById('adminPasswordInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') game.admin.login(); });
  document.getElementById('otpVerifyInput')?.addEventListener('keypress', (e) => { if (e.key === 'Enter') game.admin.approveOtp(); });
  game.init();
});
