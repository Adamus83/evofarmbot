<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
body{background:#0f172a;color:#e2e8f0;display:flex;justify-content:center;min-height:100vh}
.app{width:100%;max-width:440px;background:#1e293b;min-height:100vh;display:flex;flex-direction:column}
.top{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;background:#0f172a;border-bottom:2px solid #334155;cursor:pointer}

.tab{flex:1;padding:8px 4px;text-align:center;font-weight:700;font-size:10px;cursor:pointer;color:#94a3b8;border-bottom:3px solid transparent;white-space:nowrap;min-width:45px}
.tab.active{color:#facc15;border-color:#facc15}
.content{flex:1;overflow-y:auto;padding:10px}
.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.card{background:linear-gradient(160deg,#1e293b,#0f172a);border:2px solid #475569;border-radius:12px;padding:6px;text-align:center;position:relative;cursor:pointer;transition:0.15s}
.card:active{transform:scale(0.93)}
.card.selected{border-color:#facc15!important;box-shadow:0 0 12px rgba(250,204,21,0.5)}
.rarity-common{border-color:#64748b}.rarity-rare{border-color:#60a5fa}.rarity-epic{border-color:#a78bfa}.rarity-legendary{border-color:#facc15}
.emoji{font-size:28px}.name{font-size:9px;font-weight:800;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.stats-row{font-size:8px;color:#94a3b8}.lvl{position:absolute;top:3px;left:3px;background:#0f172a;padding:1px 4px;border-radius:5px;font-size:8px}

.btn{width:100%;padding:10px;border:none;border-radius:8px;font-weight:800;font-size:11px;cursor:pointer;background:#334155;color:#e2e8f0;margin:3px 0}
.btn-primary{background:#facc15;color:#0f172a}.btn-green{background:#22c55e;color:#0f172a}.btn-red{background:#ef4444;color:white}.btn-blue{background:#3b82f6;color:white}.btn-gold{background:#f59e0b;color:white}.btn-purple{background:#8b5cf6;color:white}

.codebox{background:#0f172a;padding:8px;border-radius:8px;font-family:monospace;word-break:break-all;margin:5px 0;text-align:center;font-size:14px}
.hidden{display:none!important}

.feed-opt button{flex:1;padding:8px 4px;font-size:9px}

<!-- GAME APP -->
<div class="app" id="gameApp">
  <div class="top" onclick="tapLogo()"><div class="logo">⚡ EVO CARDS v6.0</div>
    <div class="stats">
      <div class="badge">💰<span id="pf">80</span></div>

  </div>
  <div class="tabs" id="tabBar">

</div>

<!-- ADMIN APP -->
<div class="app hidden" id="adminApp">
  <div class="top"><div class="logo">🔐 ADMIN</div><div class="badge" onclick="closeAdmin()" style="cursor:pointer">❌</div></div>
  <div class="content">
    <div id="adminLogin"><h3>🔑 Login</h3><input id="adminPass" type="password" placeholder="Kode"><button class="btn btn-primary" onclick="adminLogin()">Login</button></div>
    <div id="adminPanel" class="hidden">
      <h3>🎟️ Generate Kode</h3><input id="genDia" type="number" value="120"><input id="genNote" placeholder="Nama"><button class="btn btn-primary" onclick="genCode()">Generate</button><div id="genOut"></div>
      <h4 style="margin-top:14px">📜 Riwayat</h4><div id="histList" style="font-size:9px"></div>
      <h4 style="margin-top:14px">💸 Permintaan WD</h4><div id="wdList" style="font-size:9px"></div>
    </div>
  </div>
</div>
<div id="mod" style="display:none"></div>

<script>
// ===== CONFIG =====
var ADMIN_CODE='727277';
var SECRET='evo2026'+ADMIN_CODE;
var GOPAY='088989727277';
var WA='6288989727277';

// ===== TELEGRAM =====
var tg=window.Telegram?.WebApp;if(tg)tg.expand();

// ===== ADMIN TAP LOGO =====
var tapCount=0;
function tapLogo(){tapCount++;if(tapCount>=5){document.getElementById('gameApp').classList.add('hidden');document.getElementById('adminApp').classList.remove('hidden');tapCount=0;loadWithdrawList()}setTimeout(function(){tapCount=0},2000)}
function closeAdmin(){document.getElementById('adminApp').classList.add('hidden');document.getElementById('gameApp').classList.remove('hidden');updateUI()}

// ===== STATE =====
var state=JSON.parse(localStorage.getItem('evoV6')||'null')||{profit:80,diamonds:30,energy:12,maxEnergy:20,cards:[],selected:[],marketListings:[]};
var POOL=[{id:'sprout',name:'Sprout',emoji:'🌱',rarity:'common',atk:5,def:2,hp:30,stage:1},{id:'bloom',name:'Bloom',emoji:'🌸',rarity:'common',atk:12,def:5,hp:50,stage:2},{id:'cactus',name:'Cactus',emoji:'🌵',rarity:'common',atk:8,def:8,hp:40,stage:1},{id:'treant',name:'Treant',emoji:'🌳',rarity:'rare',atk:22,def:12,hp:80,stage:3},{id:'wolf',name:'Wolf',emoji:'🐺',rarity:'rare',atk:28,def:8,hp:70,stage:2},{id:'dragon',name:'Dragon',emoji:'🐉',rarity:'epic',atk:40,def:18,hp:120,stage:4},{id:'phoenix',name:'Phoenix',emoji:'🔥',rarity:'epic',atk:45,def:15,hp:110,stage:3},{id:'zeus',name:'Zeus',emoji:'⚡',rarity:'legendary',atk:65,def:20,hp:140,stage:4}];

function saveState(){localStorage.setItem('evoV6',JSON.stringify(state));updateUI()}
function newCard(t,lvl){lvl=lvl||1;var m=1+(lvl-1)*0.08;return{id:t.id,name:t.name,emoji:t.emoji,rarity:t.rarity,stage:t.stage,level:lvl,atk:Math.floor(t.atk*m),def:Math.floor(t.def*m),hp:Math.floor(t.hp*m),uid:Math.random().toString(36).slice(2,9),stars:0,hunger:80}}
if(!state.cards||state.cards.length===0){state.cards=[newCard(POOL[0],2),newCard(POOL[0],2),newCard(POOL[1],1),newCard(POOL[2],1)];saveState()}
if(!state.maxEnergy)state.maxEnergy=20;
if(state.energy>state.maxEnergy)state.energy=state.maxEnergy;
if(!state.marketListings)state.marketListings=[];
if(!state.selected)state.selected=[];

function updateUI(){document.getElementById('pf').textContent=state.profit;document.getElementById('dm').textContent=state.diamonds;document.getElementById('en').textContent=state.energy;document.getElementById('me').textContent=state.maxEnergy}
function toast(m){document.getElementById('lg').textContent=m}

// ===== ENERGI RECHARGE =====
setInterval(function(){if(state.energy<state.maxEnergy){state.energy++;saveState()}},300000);

// ===== TAB NAVIGATION =====
document.getElementById('tabBar').addEventListener('click',function(e){if(e.target.classList.contains('tab')){switchTab(e.target.dataset.tab,e.target)}});

function switchTab(tabName,el){
  var tabs=document.querySelectorAll('.tab');for(var i=0;i<tabs.length;i++)tabs[i].classList.remove('active');
  if(el)el.classList.add('active');else{document.querySelector('[data-tab="'+tabName+'"]').classList.add('active')}
  var c=document.getElementById('ct');
  if(tabName==='cards')renderCards(c);
  if(tabName==='breed')c.innerHTML='<p style="color:#94a3b8;font-size:10px;">Pilih 2 kartu di tab Kartu</p><button class="btn btn-primary" onclick="breedCards()">🧬 Breed (⚡2)</button>';
  if(tabName==='feed')renderFeed(c);
  if(tabName==='battle')renderBattle(c);
  if(tabName==='market')renderMarket(c);
  if(tabName==='shop')renderShop(c);
}

function renderCards(c){
  var h='<p style="font-size:9px;color:#94a3b8;">Total: '+state.cards.length+' | Klik (max 2)</p><div class="grid">';
  for(var i=0;i<state.cards.length;i++){var cd=state.cards[i],sel=state.selected.indexOf(i)>=0?' selected':'',sh='';for(var s=0;s<5;s++)sh+='<span class="'+(s<(cd.stars||0)?'on':'off')+'">'+(s<(cd.stars||0)?'⭐':'☆')+'</span>';h+='<div class="card rarity-'+cd.rarity+sel+'" onclick="tapCard('+i+')"><div class="lvl">Lv'+cd.level+'</div><div class="emoji">'+cd.emoji+'</div><div class="name">'+cd.name+'</div><div class="stars">'+sh+'</div><div class="stats-row">⚔'+cd.atk+' 🛡'+cd.def+'</div></div>'}
  h+='</div><button class="btn btn-green" onclick="evolveCard()">✨ Evolve (⭐5)</button><button class="btn btn-red" onclick="sellCard()">💵 Sell</button>';c.innerHTML=h
}
function renderFeed(c){var fo='<option value="">Pilih...</option>';for(var i=0;i<state.cards.length;i++)fo+='<option value="'+i+'">'+state.cards[i].emoji+' '+state.cards[i].name+'</option>';c.innerHTML='<h4>🍖 Feeding</h4><select id="feedTarget">'+fo+'</select><div class="feed-opt"><button class="btn" onclick="doFeed(\'basic\')">🍞💰5</button><button class="btn btn-primary" onclick="doFeed(\'meat\')">🥩💰15</button><button class="btn btn-blue" onclick="doFeed(\'premium\')">🍰💎1</button></div>'}
function renderBattle(c){var bo='<option value="">Pilih...</option>';for(var i=0;i<state.cards.length;i++)bo+='<option value="'+i+'">'+state.cards[i].emoji+' '+state.cards[i].name+'</option>';c.innerHTML='<h4>⚔️ Battle</h4><select id="battleCard">'+bo+'</select><button class="btn btn-green" onclick="startBattle()">Battle (⚡3)</button><p style="font-size:9px;color:#94a3b8;">Menang +15💰 +2💎 +2⭐</p>'}
function renderMarket(c){c.innerHTML='<h4>🏪 Pasar</h4><button class="btn btn-primary" onclick="listToMarket()">📤 Jual</button><input id="marketPrice" type="number" value="10" placeholder="Harga 💎"><div id="marketList">'+getMarketHTML()+'</div>'}
function renderShop(c){
  c.innerHTML='<div class="pack-title">🎁 BOOSTER PACK</div>'+
    '<button class="btn btn-primary" onclick="buyPack(1,10)">🥉 Silver - 10💎 (1 Pet)</button>'+
    '<button class="btn btn-gold" onclick="buyPack(3,25)">🥈 Gold - 25💎 (3 Pet)</button>'+
    '<button class="btn btn-purple" onclick="buyPack(5,50)">🥇 Platinum - 50💎 (5+1 Bonus)</button>'+
    '<div id="packResult" style="text-align:center;margin:6px;font-size:20px"></div>'+
    '<hr style="border-color:#334155;margin:6px 0">'+
    '<button class="btn btn-blue" onclick="buyDiamond()">💰 Beli 120💎 (Rp15K)</button>'+
    '<button class="btn btn-green" onclick="buyEnergy()">⚡ 10 Energi (5💎)</button>'+
    '<button class="btn btn-gold" onclick="buyGold()">🪙 500 Profit (10💎)</button>'+
    '<button class="btn" onclick="redeemCode()">🎟️ Redeem</button>'+
    '<hr style="border-color:#334155;margin:6px 0">'+
    '<button class="btn btn-red" onclick="withdrawDiamond()">💸 Tukar 💎 → Rp<br><small>100💎 = Rp10.000</small></button>';
}

// ===== CARD ACTIONS =====
function tapCard(i){var p=state.selected.indexOf(i);if(p>=0)state.selected.splice(p,1);else if(state.selected.length<2)state.selected.push(i);renderCards(document.getElementById('ct'))}
function breedCards(){if(state.selected.length!==2)return toast('⚠️ Pilih 2!');if(state.energy<2)return toast('⚡ Kurang!');var s=state.selected.slice().sort(function(a,b){return b-a}),p1=state.cards[s[0]],p2=state.cards[s[1]];state.cards.splice(s[0],1);state.cards.splice(s[1],1);var ns=Math.floor((p1.level+p2.level)/2)+1;if(ns>4)ns=4;var cand=POOL.filter(function(c){return c.stage===ns});if(!cand.length)cand=POOL;var baby=newCard(cand[Math.floor(Math.random()*cand.length)],ns);state.cards.push(baby);state.energy-=2;state.selected=[];saveState();toast('🧬 '+baby.emoji+' '+baby.name)}
function evolveCard(){if(state.selected.length!==1)return toast('⚠️ Pilih 1!');var i=state.selected[0],c=state.cards[i];if((c.stars||0)<5)return toast('⭐ '+(c.stars||0)+'/5');if(state.profit<10)return toast('💰 Kurang!');state.profit-=10;c.level=Math.min(4,c.level+1);c.atk=Math.floor(c.atk*1.15);c.def=Math.floor(c.def*1.15);c.hp=Math.floor(c.hp*1.15);c.stars=0;c.hunger=100;state.selected=[];saveState();toast('✨ Lv'+c.level+'!')}
function sellCard(){if(!state.selected.length)return toast('⚠️ Pilih!');var s=state.selected.slice().sort(function(a,b){return b-a}),tot=0;s.forEach(function(i){tot+=state.cards[i].atk+state.cards[i].def;state.cards.splice(i,1)});state.profit+=tot;state.selected=[];saveState();toast('💵 +'+tot)}

// ===== FEEDING =====
function doFeed(type){var i=parseInt(document.getElementById('feedTarget').value);if(isNaN(i)||!state.cards[i])return;var c=state.cards[i],cost,hg,sc;if(type==='basic'){cost=5;hg=30;sc=.25;if(state.profit<cost)return toast('💰Kurang');state.profit-=cost}else if(type==='meat'){cost=15;hg=60;sc=.45;if(state.profit<cost)return toast('💰Kurang');state.profit-=cost}else{cost=1;hg=100;sc=.7;if(state.diamonds<cost)return toast('💎Kurang');state.diamonds-=cost}c.hunger=Math.min(100,(c.hunger||50)+hg);if(Math.random()<sc&&(c.stars||0)<5){c.stars=(c.stars||0)+1;toast('⭐ +1')}if(state.energy>0)state.energy-=2;saveState();switchTab('feed')}

// ===== BATTLE =====
function startBattle(){var i=parseInt(document.getElementById('battleCard').value);if(isNaN(i)||!state.cards[i])return;if(state.energy<3)return toast('⚡ Kurang!');state.energy-=3;state.profit+=15;state.diamonds+=2;var c=state.cards[i];if((c.stars||0)<5)c.stars=Math.min(5,(c.stars||0)+2);saveState();toast('🏆 +15💰 +2💎')}

// ===== MARKET =====
function getMarketHTML(){if(!state.marketListings.length)return'<p style="font-size:9px;color:#94a3b8;">Kosong</p>';return state.marketListings.map(function(l,i){return'<div class="battle-card"><div>'+l.emoji+' '+l.name+' Lv'+l.level+'</div><div>💎'+l.price+' <button class="btn btn-green" style="padding:3px 6px;font-size:9px;width:auto" onclick="buyMarket('+i+')">Beli</button></div></div>'}).join('')}
function listToMarket(){if(!state.selected.length)return;var p=parseInt(document.getElementById('marketPrice').value)||10;var s=state.selected.slice().sort(function(a,b){return b-a});s.forEach(function(i){state.marketListings.push({...state.cards[i],price:p});state.cards.splice(i,1)});state.selected=[];saveState();switchTab('market');toast('📤 Terlisting!')}
function buyMarket(i){var l=state.marketListings[i];if(!l||state.diamonds<l.price)return toast('💎 Kurang!');state.diamonds-=l.price;state.cards.push({...l});state.marketListings.splice(i,1);saveState();switchTab('market')}

// ===== SHOP =====
function buyPack(n,cost){if(state.diamonds<cost)return toast('💎 Butuh '+cost);state.diamonds-=cost;var res='';for(var i=0;i<n;i++){var r=Math.random(),cand;if(r<0.4)cand=POOL.filter(function(c){return c.rarity==='common'});else if(r<0.7)cand=POOL.filter(function(c){return c.rarity==='rare'});else if(r<0.9)cand=POOL.filter(function(c){return c.rarity==='epic'});else if(r<0.97)cand=POOL.filter(function(c){return c.rarity==='legendary'});else cand=POOL.filter(function(c){return c.rarity==='mythic'});if(!cand.length)cand=POOL;var nc=newCard(cand[Math.floor(Math.random()*cand.length)]);state.cards.push(nc);res+='<span style="font-size:22px">'+nc.emoji+'</span> '}if(n>=5){var rare=POOL.filter(function(c){return c.rarity==='rare'||c.rarity==='epic'});var gc=newCard(rare[Math.floor(Math.random()*rare.length)]);state.cards.push(gc);res+='<br><b>🎁 Bonus:</b> '+gc.emoji+' '+gc.name+' ('+gc.rarity+')'}document.getElementById('packResult').innerHTML=res;saveState();toast('🎁 '+n+' pet!')}
function buyDiamond(){var code='EVO'+Math.floor(Math.random()*9000+1000);document.getElementById('mod').innerHTML='<div class="mod
